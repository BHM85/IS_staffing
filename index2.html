<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F8;--surface:#fff;--s2:#F7F8FC;
  --border:#E4E8F0;--border2:#CBD5E1;
  --text:#1E293B;--muted:#64748B;--subtle:#94A3B8;
  --accent:#4F46E5;--acc-l:#EEF2FF;--acc-h:#4338CA;
  --ok:#10B981;--ok-l:#ECFDF5;
  --warn:#F59E0B;--warn-l:#FFFBEB;
  --err:#EF4444;--err-l:#FEF2F2;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --r:10px;--r2:6px;
}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:10}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sb-logo h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-logo p{font-size:11px;color:var(--muted);margin-top:2px}
.sb-nav{flex:1;padding:12px 8px}
.nv{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r2);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--muted);transition:.15s;margin-bottom:2px;user-select:none}
.nv:hover{background:var(--bg);color:var(--text)}
.nv.on{background:var(--acc-l);color:var(--accent)}
.nv-icon{font-size:15px;width:18px;text-align:center}
.nv-badge{margin-left:auto;background:#FEF2F2;color:var(--err);font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px}
.sb-foot{padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--subtle);line-height:1.7}
.main{margin-left:230px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px}
.content{padding:24px 28px}
.view{display:none}.view.on{display:block}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:.15s;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--acc-h)}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border2)}.btn-s:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:transparent;color:var(--muted);border:none;font-family:inherit;cursor:pointer;font-size:12px;padding:3px 7px;border-radius:4px}.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-del{color:var(--err)!important}
.mtabs{display:flex;gap:4px;background:var(--surface);padding:3px;border-radius:var(--r2);border:1px solid var(--border);margin-bottom:18px;width:fit-content}
.mtab{padding:5px 14px;border-radius:4px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--muted);transition:.15s;user-select:none}
.mtab:hover{color:var(--text)}
.mtab.on{background:var(--accent);color:#fff}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh h2{font-size:14.5px;font-weight:600}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--s2);color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left}
thead th.wh{background:#F1F4FF;color:var(--accent);text-align:center;min-width:52px;font-size:11px;padding:8px 4px}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFBFE}
td{padding:8px 12px;vertical-align:middle}
td.wc{text-align:center;padding:4px;min-width:52px}
.ac{display:inline-flex;align-items:center;justify-content:center;width:42px;height:26px;border-radius:4px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.1s}
.ac-e{color:var(--subtle)}.ac-e:hover{background:var(--bg);border-color:var(--border)}
.ac-l{background:#EEF2FF;color:var(--accent);border-color:#C7D2FE}.ac-l:hover{background:#C7D2FE}
.ac-m{background:var(--warn-l);color:#D97706;border-color:#FDE68A}.ac-m:hover{background:#FDE68A}
.ac-h{background:#FEF2F2;color:var(--err);border-color:#FECACA}.ac-h:hover{background:#FECACA}
.ac-input{width:42px;height:26px;border:1.5px solid var(--accent);border-radius:4px;font-size:11.5px;font-weight:600;text-align:center;outline:none;background:#fff;font-family:inherit;color:var(--accent)}
.cc{display:inline-flex;align-items:center;justify-content:center;width:48px;height:26px;border-radius:4px;font-size:12px;font-weight:700}
.cc-ok{background:var(--ok-l);color:#059669}
.cc-md{background:var(--warn-l);color:#D97706}
.cc-ov{background:#FEF2F2;color:var(--err)}
.cc-zz{background:var(--bg);color:var(--subtle);font-weight:400}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-co{background:var(--ok-l);color:#059669}
.b-pr{background:#FFF7ED;color:#C2410C}
.b-pa{background:var(--bg);color:var(--muted)}
.b-fi{background:#F1F5F9;color:var(--subtle)}
.nb{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
.n-pr{background:#E0F2FE;color:#0369A1}
.n-tr{background:#F3E8FF;color:#7C3AED}
.n-mi{background:#ECFDF5;color:#059669}
.n-en{background:#FFF7ED;color:#C2410C}
.isel{border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:inherit;padding:0;outline:none;max-width:115px}
.stats-row{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;flex:1;min-width:140px;box-shadow:var(--sh)}
.stat-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11.5px;color:var(--muted);margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pb-wrap{flex:1;background:#F1F5F9;border-radius:4px;height:7px;overflow:hidden}
.pb{height:100%;border-radius:4px;transition:width .4s}
.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.ld{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted)}
.ld-dot{width:10px;height:10px;border-radius:2px}
.alert-err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:13px;color:#991B1B;display:flex;align-items:center;gap:8px}
.add-bar{display:flex;gap:8px;padding:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:flex-end}
.cnt-badge{background:var(--acc-l);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:700}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--border2);border-radius:var(--r2);font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;background:var(--surface)}
.fi:focus{border-color:var(--accent)}
.fi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.18);width:500px;max-width:90vw;max-height:92vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:600}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

var currentView='dashboard';
var currentMonth='MARCH';

function mc(){return MONTHS.filter(function(m){return m.name===currentMonth;})[0];}
function wkeys(){var m=mc();return m.weeks.map(function(w){return m.abbr+'_'+w;});}

function computeCap(){
  var cap={};
  teamMembers.forEach(function(m){cap[m]={};ALL_WEEKS.forEach(function(w){cap[m][w]=0;});});
  assignments.forEach(function(a){
    if(!a.member||!cap[a.member])return;
    Object.keys(a.allocations).forEach(function(w){
      if(cap[a.member][w]!==undefined)cap[a.member][w]=+(cap[a.member][w]+a.allocations[w]).toFixed(4);
    });
  });
  return cap;
}

function overloadedCount(){
  var cap=computeCap();var wk=wkeys();
  return teamMembers.filter(function(m){return wk.some(function(w){return (cap[m][w]||0)>1.005;});}).length;
}

function pct(v){if(v==null)return'';if(v===0)return'0%';return Math.round(v*100)+'%';}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function statusBadge(s){
  var cls={Confirmed:'b-co',Probable:'b-pr',Paused:'b-pa',Finished:'b-fi'}[s]||'b-pa';
  var dot={Confirmed:'&#9679;',Probable:'&#9681;',Paused:'&#9208;',Finished:'&#10005;'};
  return '<span class="badge '+cls+'">'+(dot[s]||'&middot;')+' '+esc(s)+'</span>';
}

function natureBadge(n){
  if(!n)return'';
  var cls={Product:'n-pr',Transformation:'n-tr',Mixed:'n-mi',Enterprise:'n-en'}[n]||'';
  return '<span class="nb '+cls+'">'+esc(n)+'</span>';
}

function monthTabs(){
  return '<div class="mtabs">'+MONTHS.map(function(m){
    return '<div class="mtab'+(m.name===currentMonth?' on':'')+'" onclick="setMonth(\''+m.name+'\')">'+m.name.slice(0,3)+'</div>';
  }).join('')+'</div>';
}

function acCls(v){
  if(v==null)return'ac-e';
  if(v>1.005)return'ac-h';
  if(v>=0.8)return'ac-m';
  if(v>0)return'ac-l';
  return'ac-e';
}

function startEdit(el){
  var id=parseInt(el.dataset.id);var wk=el.dataset.wk;
  var asgn=null;for(var i=0;i<assignments.length;i++){if(assignments[i].id===id){asgn=assignments[i];break;}}
  var cur=asgn?(asgn.allocations[wk]!=null?asgn.allocations[wk]:null):null;
  var inp=document.createElement('input');
  inp.type='text';inp.className='ac-input';
  inp.value=cur!=null?String(Math.round(cur*100)):'';
  inp.placeholder='%';
  el.parentNode.replaceChild(inp,el);
  inp.focus();inp.select();
  var committed=false;
  function commit(){
    if(committed)return;committed=true;
    var raw=inp.value.trim();var v=null;
    if(raw!==''){var n=parseFloat(raw);if(!isNaN(n))v=Math.min(2,Math.max(0,n/100));}
    var a2=null;for(var j=0;j<assignments.length;j++){if(assignments[j].id===id){a2=assignments[j];break;}}
    if(a2){if(v===null)delete a2.allocations[wk];else a2.allocations[wk]=v;}
    render();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){inp.removeEventListener('blur',commit);commit();}
    if(e.key==='Escape'){committed=true;render();}
  });
}

    +'<div class="modal-foot"><button class="btn btn-s" onclick="this.closest(\'.overlay\').remove()">Cancelar</button><button class="btn btn-p" onclick="submitAdd()">Crear asignaci&oacute;n</button></div>'
    +'</div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
  syncNature();
}

function syncNature(){
  var pname=document.getElementById('m-proj');if(!pname)return;
  var p=null;for(var i=0;i<projects.length;i++){if(projects[i].name===pname.value){p=projects[i];break;}}
  if(p){
    var nat=document.getElementById('m-nat');var st=document.getElementById('m-st');
    if(nat)nat.value=p.nature||'';
    if(st)st.value=p.status||'Confirmed';
  }
}

function submitAdd(){
  var row={id:mkid(),project:document.getElementById('m-proj').value,nature:document.getElementById('m-nat').value,status:document.getElementById('m-st').value,member:document.getElementById('m-mem').value,comment:document.getElementById('m-com').value,allocations:{}};
  assignments.push(row);
  var ov=document.querySelector('.overlay');if(ov)ov.remove();
  render();
}

function updField(id,field,val){
  for(var i=0;i<assignments.length;i++){if(assignments[i].id===id){assignments[i][field]=val;break;}}
  renderTopbar();renderSidebar();
}

function delAsgn(id){
  assignments=assignments.filter(function(a){return a.id!==id;});render();
}

function addMember(){
  var el=document.getElementById('inp-member');var v=el.value.trim();
  if(v&&teamMembers.indexOf(v)===-1){teamMembers.push(v);el.value='';render();}
}

function delMember(btn){
  var m=btn.getAttribute('data-m');
  if(!confirm('&#191;Eliminar a "'+m+'" del equipo? Se borrar&#225;n sus asignaciones.'))return;
  teamMembers=teamMembers.filter(function(x){return x!==m;});
  assignments=assignments.filter(function(a){return a.member!==m;});
  render();
}

function addProject(){
  var n=document.getElementById('inp-proj').value.trim();
  var exists=false;for(var i=0;i<projects.length;i++){if(projects[i].name===n){exists=true;break;}}
  if(n&&!exists){
    projects.push({name:n,nature:document.getElementById('inp-nature').value,status:document.getElementById('inp-status').value});
    document.getElementById('inp-proj').value='';render();
  }
}

function delProject(btn){
  var name=btn.getAttribute('data-name');
  if(!confirm('&#191;Eliminar "'+name+'"? Se borrar&#225;n todas sus asignaciones.'))return;
  projects=projects.filter(function(p){return p.name!==name;});
  assignments=assignments.filter(function(a){return a.project!==name;});
  render();
}

function updProjStatus(sel){
  var name=sel.getAttribute('data-name');var status=sel.value;
  for(var i=0;i<projects.length;i++){if(projects[i].name===name){projects[i].status=status;break;}}
  assignments.forEach(function(a){if(a.project===name)a.status=status;});
  renderTopbar();renderSidebar();
}

function updProjNature(sel){
  var name=sel.getAttribute('data-name');var nature=sel.value;
  for(var i=0;i<projects.length;i++){if(projects[i].name===name){projects[i].nature=nature;break;}}
}

function setView(v){currentView=v;render();}
function setMonth(m){currentMonth=m;render();}

function render(){
  renderSidebar();renderTopbar();
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('on');});
  var t=document.getElementById('view-'+currentView);if(t)t.classList.add('on');
  if(currentView==='dashboard')renderDashboard();
  if(currentView==='byproject')renderByProject();
  if(currentView==='bymember')renderByMember();
  if(currentView==='master')renderMaster();
}

render();
</script>
</body>
</html>
