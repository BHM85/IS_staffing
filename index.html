<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medusa — Capacity Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F8;--surface:#fff;--s2:#F7F8FC;
  --border:#E4E8F0;--border2:#CBD5E1;
  --text:#1E293B;--muted:#64748B;--subtle:#94A3B8;
  --accent:#4F46E5;--acc-l:#EEF2FF;--acc-h:#4338CA;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --r:10px;--r2:6px;
}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;min-height:100vh}
/* login */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 48px rgba(79,70,229,.12);width:100%;max-width:380px;padding:44px 40px 36px;display:flex;flex-direction:column;align-items:center}
.login-err{background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:9px 14px;font-size:12.5px;color:#991B1B;width:100%;text-align:center}
/* sidebar */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:10}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sb-nav{flex:1;padding:12px 8px}
.nv{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r2);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--muted);transition:.15s;margin-bottom:2px;user-select:none}
.nv:hover{background:var(--bg);color:var(--text)}
.nv.on{background:var(--acc-l);color:var(--accent)}
.nv-badge{margin-left:auto;background:#FEF2F2;color:#EF4444;font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px}
.sb-foot{padding:10px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--subtle);line-height:1.7}
.sb-actions{padding:8px 12px 14px;display:flex;flex-direction:column;gap:2px}
/* main */
.main{margin-left:230px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px}
.content{padding:24px 28px}
.view{display:none}.view.on{display:block}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:.15s;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--acc-h)}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border2)}.btn-s:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:transparent;color:var(--muted);border:none;font-family:inherit;cursor:pointer;font-size:12px;padding:3px 7px;border-radius:4px}.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-del{color:#EF4444!important}
/* month tabs */
.mtabs{display:flex;gap:4px;background:var(--surface);padding:3px;border-radius:var(--r2);border:1px solid var(--border);margin-bottom:18px;width:fit-content;flex-wrap:wrap}
.mtab{padding:5px 12px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:.15s;user-select:none}
.mtab:hover{color:var(--text)}
.mtab.on{background:var(--accent);color:#fff}
/* section header */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh h2{font-size:14.5px;font-weight:600}
/* card */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh)}
.tscroll{overflow-x:auto}
/* table */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--s2);color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left}
thead th.wh{background:#F1F4FF;color:var(--accent);text-align:center;min-width:52px;font-size:11px;padding:8px 4px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFBFE}
td{padding:8px 12px;vertical-align:middle}
td.wc{text-align:center;padding:4px;min-width:52px;vertical-align:middle}
/* By Project: equal row height within a project group */
.bp-table tr{height:38px}
/* alloc cell */
.ac{display:inline-flex;align-items:center;justify-content:center;width:42px;height:26px;border-radius:4px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.1s}
.ac-e{color:var(--subtle)}.ac-e:hover{background:var(--bg);border-color:var(--border)}
.ac-l{background:#ECFDF5;color:#059669;border-color:#6EE7B7}.ac-l:hover{background:#D1FAE5}
.ac-m{background:#F1F5F9;color:#64748B;border-color:var(--border2)}.ac-m:hover{background:#E2E8F0}
.ac-h{background:#FEF2F2;color:#EF4444;border-color:#FECACA}.ac-h:hover{background:#FECACA}
.ac-input{width:42px;height:26px;border:1.5px solid var(--accent);border-radius:4px;font-size:11.5px;font-weight:600;text-align:center;outline:none;background:#fff;font-family:inherit;color:var(--accent)}
/* capacity chip */
.cc{display:inline-flex;align-items:center;justify-content:center;width:48px;height:26px;border-radius:4px;font-size:12px;font-weight:700}
.cc-ok{background:#ECFDF5;color:#059669}
.cc-md{background:#F1F5F9;color:#64748B}
.cc-ov{background:#FEF2F2;color:#EF4444}
.cc-zz{background:var(--bg);color:var(--subtle);font-weight:400}
/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-co{background:#ECFDF5;color:#059669}
.b-pr{background:#FFF7ED;color:#C2410C}
.b-pa{background:var(--bg);color:var(--muted)}
.b-fi{background:#F1F5F9;color:var(--subtle)}
.nb{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
.n-pr{background:#E0F2FE;color:#0369A1}
.n-tr{background:#F3E8FF;color:#7C3AED}
.n-mi{background:#ECFDF5;color:#059669}
.n-en{background:#FFF7ED;color:#C2410C}
/* inline select */
.isel{border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:inherit;padding:0;outline:none}
/* stats */
.stats-row{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;flex:1;min-width:140px}
.stat-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11.5px;color:var(--muted);margin-top:4px}
/* grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
/* progress bar */
.pb-wrap{flex:1;background:#F1F5F9;border-radius:4px;height:7px;overflow:hidden}
.pb{height:100%;border-radius:4px;transition:width .4s}
/* legend */
.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.ld{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted)}
.ld-dot{width:10px;height:10px;border-radius:2px}
/* alert */
.alert-err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:13px;color:#991B1B;display:flex;align-items:center;gap:8px}
/* add bar */
.add-bar{display:flex;gap:8px;padding:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:stretch}
.add-bar .fi{height:38px;box-sizing:border-box}
.cnt-badge{background:var(--acc-l);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:700}
/* form */
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--border2);border-radius:var(--r2);font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;background:var(--surface)}
.fi:focus{border-color:var(--accent)}
.fi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.18);width:500px;max-width:90vw;max-height:92vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:600}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
/* export table */
.exp-wrap{overflow:auto;max-height:72vh}
.exp-table{border-collapse:collapse;font-size:12px;white-space:nowrap}
.exp-table th,.exp-table td{border:1px solid var(--border);padding:0}
.exp-table thead th{background:var(--s2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);position:sticky;top:0;z-index:2}
.exp-table thead th.proj-h{writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;padding:10px 6px;max-width:36px;min-width:36px;font-size:10px;font-weight:600;color:var(--text)}
.exp-table th.sticky-corner{position:sticky;left:0;z-index:3;background:var(--s2);min-width:150px;text-align:left;padding:6px 12px}
.exp-table td.member-cell{font-weight:500;font-size:12px;padding:6px 12px;background:var(--s2);position:sticky;left:0;z-index:1;border-right:2px solid var(--border2);min-width:150px}
.exp-chip{display:flex;align-items:center;justify-content:center;width:100%;height:32px;font-size:11px;font-weight:700}
.exp-chip-ok{background:#ECFDF5;color:#059669}
.exp-chip-md{background:#F1F5F9;color:#64748B}
.exp-chip-ov{background:#FEF2F2;color:#EF4444}
.exp-chip-zz{background:transparent;color:var(--subtle)}
.exp-total{background:#F8FAFF!important;font-weight:700;color:var(--accent)}
/* login dots */
.login-dots{display:flex;gap:5px;margin-top:24px;margin-bottom:32px}
.login-dot{width:5px;height:5px;border-radius:50%;background:var(--border2)}
.login-dot.on{background:var(--accent)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* gantt sticky header */
.gantt-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);border:1px solid var(--border);border-radius:var(--r)}
.gantt-wrap table{border-collapse:collapse;min-width:100%}
.gantt-wrap thead th{position:sticky;top:0;z-index:3;background:var(--s2)}
.gantt-wrap thead tr:nth-child(2) th{top:31px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="14.5" stroke="#4F46E5" stroke-width="1" stroke-dasharray="2.5 2.5" opacity=".4"/>
      <circle cx="16" cy="16" r="9" stroke="#4F46E5" stroke-width="1" opacity=".25"/>
      <line x1="16" y1="2" x2="16" y2="7" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="16" y1="25" x2="16" y2="30" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="2" y1="16" x2="7" y2="16" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="25" y1="16" x2="30" y2="16" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="5.1" y1="5.1" x2="8.6" y2="8.6" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity=".6"/>
      <line x1="23.4" y1="23.4" x2="26.9" y2="26.9" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity=".6"/>
      <line x1="26.9" y1="5.1" x2="23.4" y2="8.6" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity=".6"/>
      <line x1="8.6" y1="23.4" x2="5.1" y2="26.9" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity=".6"/>
      <polygon points="16,10.5 20.5,13 20.5,19 16,21.5 11.5,19 11.5,13" stroke="#4F46E5" stroke-width="1.2" fill="#EEF2FF" opacity=".9"/>
      <circle cx="16" cy="16" r="2" fill="#4F46E5"/>
      <circle cx="16" cy="7" r=".9" fill="#4F46E5" opacity=".5"/>
      <circle cx="16" cy="25" r=".9" fill="#4F46E5" opacity=".5"/>
      <circle cx="7" cy="16" r=".9" fill="#4F46E5" opacity=".5"/>
      <circle cx="25" cy="16" r=".9" fill="#4F46E5" opacity=".5"/>
    </svg>
    <div style="font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-top:10px;line-height:1">Medusa</div>
    <div style="font-size:11px;color:var(--subtle);letter-spacing:.7px;text-transform:uppercase;margin-top:4px">Capacity Platform</div>
    <div class="login-dots">
      <div class="login-dot on"></div>
      <div class="login-dot on"></div>
      <div class="login-dot"></div>
    </div>
    <div style="width:100%;display:flex;flex-direction:column;gap:12px">
      <div>
        <label class="fl">Email</label>
        <input class="fi" id="login-email" type="email" placeholder="your@company.com" autocomplete="username"
          onkeydown="if(event.key==='Enter')document.getElementById('login-pwd').focus()">
      </div>
      <div>
        <label class="fl">Password</label>
        <div style="position:relative">
          <input class="fi" id="login-pwd" type="password" placeholder="Password"
            autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"
            style="padding-right:42px">
          <button onclick="togglePwd()" tabindex="-1" id="pwd-eye"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--subtle);font-size:13px;padding:4px">&#128065;</button>
        </div>
      </div>
      <div id="login-err" style="display:none"></div>
      <button class="btn btn-p" onclick="doLogin()"
        style="width:100%;justify-content:center;padding:11px;font-size:14px;margin-top:4px;border-radius:8px">Sign in</button>
    </div>
    <div style="margin-top:20px;font-size:11px;color:var(--subtle);text-align:center;line-height:1.8">
      Medusa &mdash; internal use only<br>
      <span style="color:var(--border2)">Product created by <strong style="color:var(--muted)">Impact Studios</strong></span>
    </div>
  </div>
</div>

<!-- AUTH SCRIPT (independent block, runs before main app) -->
<script>
(function(){
  var AK='medusa_auth_hash', SK='medusa_session';
  function qh(s){
    var h1=5381,h2=52711,i=s.length;
    while(i--){var c=s.charCodeAt(i);h1=(h1*33)^c;h2=(h2*33)^c;}
    return (h1>>>0).toString(36)+'_'+(h2>>>0).toString(36);
  }
  window.isLoggedIn=function(){return sessionStorage.getItem(SK)==='1';};
  window.doLogin=function(){
    var em=(document.getElementById('login-email').value||'').trim().toLowerCase();
    var pw=document.getElementById('login-pwd').value||'';
    document.getElementById('login-err').style.display='none';
    if(!em||!pw){return _le('Please enter your email and password.');}
    var h=qh(em+'::'+pw),stored=localStorage.getItem(AK);
    if(!stored){if(h===qh('admin@medusa.app::Medusa2026!')){_ok();}else{_le('Incorrect email or password.');}}
    else{if(h===stored){_ok();}else{_le('Incorrect email or password.');}}
  };
  function _ok(){
    sessionStorage.setItem(SK,'1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-root').style.display='flex';
    if(typeof render==='function')render();
  }
  function _le(msg){
    var el=document.getElementById('login-err');
    el.className='login-err';el.textContent=msg;el.style.display='block';
    document.getElementById('login-pwd').value='';
    setTimeout(function(){document.getElementById('login-pwd').focus();},0);
  }
  window.togglePwd=function(){
    var inp=document.getElementById('login-pwd'),eye=document.getElementById('pwd-eye');
    if(inp.type==='password'){inp.type='text';eye.style.color='var(--accent)';}
    else{inp.type='password';eye.style.color='var(--subtle)';}
  };
  window.doLogout=function(){
    sessionStorage.removeItem(SK);
    document.getElementById('app-root').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('login-email').value='';
    document.getElementById('login-pwd').value='';
    document.getElementById('login-err').style.display='none';
    setTimeout(function(){var e=document.getElementById('login-email');if(e)e.focus();},80);
  };
  window.openChangePwd=function(){
    var ov=document.createElement('div');ov.className='overlay';
    ov.innerHTML='<div class="modal" style="max-width:420px"><div class="modal-head"><h3>Change credentials</h3><button class="btn-ghost" onclick="this.closest(\'.overlay\').remove()" style="font-size:16px">&#10005;</button></div><div class="modal-body" style="display:flex;flex-direction:column;gap:12px"><div><label class="fl">Login email</label><input class="fi" id="cp-email" type="email"></div><div><label class="fl">New password (min 8)</label><input class="fi" id="cp-pwd1" type="password"></div><div><label class="fl">Confirm password</label><input class="fi" id="cp-pwd2" type="password"></div><div id="cp-err" style="display:none"></div></div><div class="modal-foot"><button class="btn btn-s" onclick="this.closest(\'.overlay\').remove()">Cancel</button><button class="btn btn-p" onclick="saveNewPwd()">Save</button></div></div>';
    ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
    document.body.appendChild(ov);
  };
  window.saveNewPwd=function(){
    var em=(document.getElementById('cp-email').value||'').trim().toLowerCase();
    var p1=document.getElementById('cp-pwd1').value;
    var p2=document.getElementById('cp-pwd2').value;
    var err=document.getElementById('cp-err');
    function ce(m){err.className='login-err';err.textContent=m;err.style.display='block';}
    if(!em||!p1)return ce('Email and password are required.');
    if(8>p1.length)return ce('Password must be at least 8 characters.');
    if(p1!==p2)return ce('Passwords do not match.');
    localStorage.setItem(AK,qh(em+'::'+p1));
    document.querySelector('.overlay').remove();
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1E293B;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999';
    t.textContent='Credentials updated';
    document.body.appendChild(t);
    setTimeout(function(){t.remove();},3000);
  };
  if(isLoggedIn()){
    document.addEventListener('DOMContentLoaded',function(){
      var ls=document.getElementById('login-screen'),ar=document.getElementById('app-root');
      if(ls)ls.style.display='none';
      if(ar){ar.style.display='flex';if(typeof render==='function')render();}
    });
  }else{
    setTimeout(function(){var e=document.getElementById('login-email');if(e)e.focus();},80);
  }
})();
</script>

<!-- APP ROOT -->
<div id="app-root" class="app" style="display:none">
  <aside class="sidebar">
    <div class="sb-logo" style="padding:18px 20px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:11px">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14.5" stroke="#4F46E5" stroke-width="1" stroke-dasharray="2.5 2.5" opacity=".4"/>
          <circle cx="16" cy="16" r="9" stroke="#4F46E5" stroke-width="1" opacity=".25"/>
          <line x1="16" y1="2" x2="16" y2="7" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>

// Load: try Supabase first, fall back to localStorage
async function loadFromSupabase(){
  var sb=_getSb();if(!sb)return false;
  try{
    var [pr,tm,as,mm,nt,ap]=await Promise.all([
      sb.from('projects').select('*'),
      sb.from('team_members').select('*'),
      sb.from('assignments').select('*'),
      sb.from('member_meta').select('*'),
      sb.from('notes').select('*'),
      sb.from('archived_projects').select('*')
    ]);
    if(pr.error||tm.error||as.error)return false;
    if(pr.data.length===0&&tm.data.length===0)return false; // empty DB, use localStorage seed

    projects=pr.data.map(function(p){return{name:p.name,category:p.category||'',status:p.status||'',owner:p.owner||'',desc:p.description||'',startDate:p.start_date||'',endDate:p.end_date||''};});
    teamMembers=tm.data.map(function(m){return m.name;});
    assignments=as.data.map(function(a){return{id:a.id,project:a.project,member:a.member||'',role:a.role||'',status:a.status||'',comment:a.comment||'',category:a.category||'',allocations:a.allocations||{}};});
    memberMeta={};
    mm.data.forEach(function(m){memberMeta[m.member_name]={role:m.role||'',active:m.active!==false,memberStatus:m.member_status||'Active',unavailFrom:m.unavail_from||'',unavailTo:m.unavail_to||'',unavailReason:m.unavail_reason||''};});
    notes=nt.data.map(function(n){return{id:n.id,text:n.text,owner:n.owner||'',ts:n.ts};});
    archivedProjects=ap.data.map(function(p){return{name:p.name,category:p.category||'',status:p.status||'',owner:p.owner||'',archivedOn:p.archived_on||'',members:p.members||[]};});
    return true;
  }catch(e){console.warn('Supabase load failed',e);return false;}
}

// Sync all localStorage data up to Supabase
async function syncToSupabase(){
  var sb=_getSb();if(!sb){alert('Supabase not available');return;}
  _showToast('Syncing to Supabase...');
  try{
    // Upsert all data
    await sb.from('projects').upsert(projects.map(function(p){return{id:p.name,name:p.name,category:p.category||'',status:p.status||'',owner:p.owner||'',description:p.desc||'',start_date:p.startDate||'',end_date:p.endDate||''};}));
    await sb.from('team_members').upsert(teamMembers.map(function(m){var meta=memberMeta[m]||{};return{id:m,name:m,role:meta.role||'',member_status:meta.memberStatus||'Active',unavail_from:meta.unavailFrom||'',unavail_to:meta.unavailTo||'',unavail_reason:meta.unavailReason||'',active:meta.active!==false};}));
    await sb.from('assignments').upsert(assignments.map(function(a){return{id:String(a.id),project:a.project,member:a.member||'',role:a.role||'',status:a.status||'',comment:a.comment||'',category:a.category||'',allocations:a.allocations||{}};}));
    await sb.from('member_meta').upsert(Object.keys(memberMeta).map(function(k){var m=memberMeta[k];return{member_name:k,role:m.role||'',active:m.active!==false,member_status:m.memberStatus||'Active',unavail_from:m.unavailFrom||'',unavail_to:m.unavailTo||'',unavail_reason:m.unavailReason||''};}));
    await sb.from('notes').upsert(notes.map(function(n){return{id:String(n.id),text:n.text,owner:n.owner||'',ts:n.ts};}));
    await sb.from('archived_projects').upsert(archivedProjects.map(function(p){return{id:p.name,name:p.name,category:p.category||'',status:p.status||'',owner:p.owner||'',archived_on:p.archivedOn||'',members:p.members||[]};}));
    _showToast('✓ Synced to Supabase successfully');
  }catch(e){console.error('Sync error',e);_showToast('Sync failed — check console');}
}

function mc(){
  var r=null;
  MONTH_DEFS.forEach(function(m){if(m.name===currentMonth)r=m;});
  return r;
}
function wkeys(){
  var m=mc();
  return m.weeks.map(function(w){return currentYear+'_'+m.abbr+'_'+w;});
}

function computeCap(){
  var cap={};
  teamMembers.forEach(function(m){cap[m]={};ALL_WEEKS.forEach(function(w){cap[m][w]=0;});});
  assignments.forEach(function(a){
    if(!a.member||!cap[a.member])return;
    Object.keys(a.allocations).forEach(function(w){
      if(cap[a.member][w]!==undefined)cap[a.member][w]=+(cap[a.member][w]+a.allocations[w]).toFixed(4);
    });
  });
  return cap;
}

function overloadedCount(){
  var cap=computeCap(),wk=wkeys();
  return teamMembers.filter(function(m){return wk.some(function(w){return (cap[m][w]||0)>1.005;});}).length;
}

      +'<div class="pb-wrap"><div class="pb" style="width:'+w+'%;background:'+sbar[x.s]+'"></div></div>'
      +'<span style="font-size:14px;font-weight:700;min-width:22px;text-align:right">'+x.n+'</span></div>';
  }).join('');
  // Load alerts
  var alerts=[];
  teamMembers.forEach(function(mb){
    var vals=wk.map(function(w){return cap[mb][w]||0;});
    if(!vals.some(function(v){return v>0;}))return;
    var maxV=Math.max.apply(null,vals);
    var avgV=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    if(maxV>1.005||!(avgV>=0.8))alerts.push({m:mb,role:(memberMeta[mb]||{}).role||'',maxV:maxV,avgV:avgV,isOver:maxV>1.005});
  });
  var alertHtml=alerts.length===0
    ?'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80px;gap:6px"><span style="font-size:20px">&#10003;</span><span style="font-size:12px;color:var(--muted)">No alerts for '+mLabel+'</span></div>'
    :alerts.map(function(x){
      var col=x.isOver?'#EF4444':'#94A3B8';
      var tag=x.isOver
        ?'<span style="background:#FEF2F2;color:#EF4444;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap">OVERLOAD '+Math.round(x.maxV*100)+'%</span>'
        :'<span style="background:#F1F5F9;color:#64748B;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap">UNDERUSED '+Math.round(x.avgV*100)+'%</span>';
      return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        +'<div style="width:120px;min-width:0">'
        +'<div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(x.m)+'</div>'
        +(x.role?'<div style="font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(x.role)+'</div>':'')
        +'</div>'
        +'<div class="pb-wrap"><div class="pb" style="width:'+Math.min(x.isOver?x.maxV:x.avgV,1.5)/1.5*100+'%;background:'+col+'"></div></div>'
        +tag+'</div>';
    }).join('');
  var overStyle=over>0?'border-color:#FECACA;background:#FFF8F8':'';
  // ── Unassigned flags for current month ──
  var unassignedByProj={};
  assignments.forEach(function(a){
    if(a.member)return;
    var hasThisMonth=wk.some(function(w){return a.allocations[w]>0;});
    if(!hasThisMonth)return;
    if(!unassignedByProj[a.project])unassignedByProj[a.project]=[];
    // collect role, avg % and week count for this unassigned row
    var wkVals=wk.filter(function(w){return a.allocations[w]>0;}).map(function(w){return a.allocations[w];});
    var avgPct=wkVals.length?Math.round(wkVals.reduce(function(s,v){return s+v;},0)/wkVals.length*100):0;
    unassignedByProj[a.project].push({role:a.role||'',pct:avgPct,weeks:wkVals.length});
  });
  var totalFlags=0;
  Object.keys(unassignedByProj).forEach(function(k){totalFlags+=unassignedByProj[k].length;});
  var flagEntries=Object.keys(unassignedByProj).sort(function(a,b){return unassignedByProj[b].length-unassignedByProj[a].length;});
  var flagHtml=flagEntries.length===0
    ?'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60px;gap:6px"><span style="font-size:18px;color:#10B981">&#10003;</span><span style="font-size:12px;color:var(--muted)">No unassigned roles in '+mLabel+'</span></div>'
    :flagEntries.map(function(proj){
      var rows=unassignedByProj[proj];
      var rolePills=rows.map(function(r){
        return'<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px dashed var(--border)">'
          +'<span style="color:#EF4444;font-size:10px">&#9671;</span>'
          +'<span style="font-size:11px;font-weight:600;color:var(--text);flex:1">'+(r.role?esc(r.role):'<span style="font-style:italic;color:var(--muted)">Role TBD</span>')+'</span>'
          +(r.pct?'<span style="font-size:10px;font-weight:700;color:#C2410C;background:#FFF7ED;padding:1px 6px;border-radius:10px">'+r.pct+'%</span>':'')
          +(r.weeks?'<span style="font-size:10px;color:var(--muted)">'+r.weeks+'w</span>':'')
          +'</div>';
      }).join('');
      return'<div style="margin-bottom:12px;background:var(--s2);border-radius:6px;overflow:hidden">'
        +'<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#FEF2F2">'
        +'<span style="color:#EF4444;font-size:13px;flex-shrink:0">&#9873;</span>'
        +'<span style="font-size:12px;font-weight:700;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(proj)+'</span>'
        +'<span style="background:#EF4444;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0">'+rows.length+' open</span>'
        +'</div>'
        +'<div style="padding:4px 10px 6px">'+rolePills+'</div>'
        +'</div>';
    }).join('');
  document.getElementById('view-dashboard').innerHTML=
    '<div class="sh"><h2>Team overview</h2>'+monthTabs()+'</div>'
    +'<div class="stats-row">'
    +'<div class="stat"><div class="stat-lbl">Team</div><div class="stat-val">'+teamMembers.length+'</div><div class="stat-sub">active members</div></div>'
    +'<div class="stat"><div class="stat-lbl">Confirmed projects</div><div class="stat-val">'+confirmed+'</div><div class="stat-sub">of '+allP.length+' total</div></div>'
    +'<div class="stat" style="'+overStyle+'"><div class="stat-lbl" style="'+(over>0?'color:#B91C1C':'')+'">&#9888; Overload</div><div class="stat-val" style="color:'+(over>0?'#EF4444':'#10B981')+'">'+over+'</div><div class="stat-sub">in '+mLabel+'</div></div>'
    +'<div class="stat"><div class="stat-lbl">Avg capacity ('+mLabel+')</div><div class="stat-val" style="color:'+avgCol+'">'+Math.round(avg*100)+'%</div><div class="stat-sub">team average</div></div>'
    +'<div class="stat" style="'+(totalFlags>0?'border-color:#FECACA;background:#FFF8F8':'')+'"><div class="stat-lbl" style="'+(totalFlags>0?'color:#B91C1C':'')+'">&#9873; Unassigned</div><div class="stat-val" style="color:'+(totalFlags>0?'#EF4444':'#10B981')+'">'+totalFlags+'</div><div class="stat-sub">in '+mLabel+'</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px">'
    +'<div class="card" style="padding:20px;grid-column:1/2"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:14px">Project status</div>'+barRows+'</div>'
    +'<div class="card" style="padding:20px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Load alerts &mdash; '+mLabel+'</span>'
    +(alerts.length>0?'<span style="background:'+(alerts.some(function(x){return x.isOver;})?'#FEF2F2':'#F1F5F9')+';color:'+(alerts.some(function(x){return x.isOver;})?'#EF4444':'#64748B')+';font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px">'+alerts.length+' alert'+(alerts.length>1?'s':'')+'</span>':'')
    +'</div>'+alertHtml+'</div>'
    +'<div class="card" style="padding:20px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Unassigned flags &mdash; '+mLabel+'</span>'
    +(totalFlags>0?'<span style="background:#FEF2F2;color:#EF4444;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px">'+totalFlags+' flag'+(totalFlags>1?'s':'')+'</span>':'')
    +'</div>'+flagHtml+'</div>'
    +'</div>';
}

// ── BY PROJECT ───────────────────────────────────────────────
function renderByProject(){
  var wk=wkeys(),m=mc();
  // collect unique filter options
  var ownerSet={},catSet={};
  assignments.forEach(function(a){
    if(a.member)ownerSet[a.project]=1;
    var p=null;projects.forEach(function(x){if(x.name===a.project)p=x;});
    if(p&&p.owner)ownerSet[p.owner]=1;
    if(p&&p.category)catSet[p.category]=1;
  });
  var allOwners=[];
  projects.forEach(function(p){if(p.owner&&allOwners.indexOf(p.owner)===-1)allOwners.push(p.owner);});
  allOwners.sort(function(a,b){return a.localeCompare(b);});
  var allCategories=NATURES.slice();
  // build filtered assignment list
  var allMembers=[];
  assignments.forEach(function(a){if(a.member&&allMembers.indexOf(a.member)===-1)allMembers.push(a.member);});
  allMembers.sort(function(a,b){return a.localeCompare(b);});
  var filtered=assignments.filter(function(a){
    if(filterProjStatus&&a.status!==filterProjStatus)return false;
    if(filterProjCategory){
      var p=null;projects.forEach(function(x){if(x.name===a.project)p=x;});
      if(!p||p.category!==filterProjCategory)return false;
    }
    if(filterProjMember&&a.member!==filterProjMember)return false;
    if(filterProjOwner){
      var p=null;projects.forEach(function(x){if(x.name===a.project)p=x;});
      if(!p||p.owner!==filterProjOwner)return false;
    }
    return true;
  });
  var ordered=[],seen={};
  filtered.forEach(function(a){if(!seen[a.project]){seen[a.project]=[];ordered.push(a.project);}seen[a.project].push(a);});
  // also include projects that have no assignments yet (so newly added projects are visible)
  projects.forEach(function(p){
    if(seen[p.name])return; // already included
    if(filterProjStatus||filterProjCategory||filterProjMember||filterProjOwner){
      if(filterProjStatus&&p.status!==filterProjStatus)return;
      if(filterProjCategory&&p.category!==filterProjCategory)return;
      if(filterProjOwner&&p.owner!==filterProjOwner)return;
    }
    seen[p.name]=[];ordered.push(p.name);
  });
  if(sortProjAlpha)ordered.sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
  var rows=[],bgs=['#ffffff','#FAFBFF'],pi=-1,pSeen={};
  ordered.forEach(function(proj){
    var group=seen[proj];
    if(!pSeen[proj]){pSeen[proj]=1;pi++;}
    var bg=bgs[pi%2];
    var pObj=null;projects.forEach(function(p){if(p.name===proj)pObj=p;});
    // project with no assignments: show a placeholder row
    if(!group||group.length===0){
      var ncol2={Product:'#0369A1',Transformation:'#7C3AED',Mixed:'#059669',Enterprise:'#C2410C',Agentic:'#0891B2'}[(pObj&&pObj.category)||'']||'#64748B';
      var sOpts2=STATUSES.map(function(s){return'<option value="'+s+'"'+((pObj&&pObj.status===s)?' selected':'')+'>'+s+'</option>';}).join('');
      rows.push('<tr style="background:'+bg+';opacity:.6">'
        +'<td style="font-weight:600;font-size:13px;border-right:1px solid var(--border);background:'+bg+';vertical-align:top;padding-top:10px">'
        +esc(proj)
        +(pObj&&pObj.desc?'<div style="font-size:11px;font-weight:400;color:var(--muted);margin-top:3px;line-height:1.4;white-space:normal;max-width:200px">'+esc(pObj.desc)+'</div>':'')
        +'</td>'
        +'<td style="font-size:12px;color:var(--muted)">'+(pObj&&pObj.owner?esc(pObj.owner):'')+'</td>'
        +'<td>'+(pObj&&pObj.category?categoryBadge(pObj.category):'')+'</td>'
        +'<td><select class="isel" style="color:'+(SCOL[(pObj&&pObj.status)||'']||'#64748B')+'" onchange="updProjStatusByName(\''+esc(proj)+'\',this)">'+sOpts2+'</select></td>'
        +'<td colspan="'+(4+wk.length)+'" style="color:var(--muted);font-size:12px;font-style:italic">No assignments yet — use + to add one</td>'
        +'</tr>');
      return;
    }
    group.forEach(function(row,ri){
      // project date range from all assignments
      var projDateRange='';
      if(ri===0){
        // Prefer explicitly set dates on the project
        if(pObj&&(pObj.startDate||pObj.endDate)){
          projDateRange=(pObj.startDate||'')+(pObj.startDate&&pObj.endDate?' &rarr; ':'')+(pObj.endDate||'');
        } else {
          // Fall back to computed range from allocations
          var allWks=[];
          assignments.forEach(function(a){
            if(a.project!==proj)return;
            Object.keys(a.allocations).forEach(function(w){if(a.allocations[w]>0)allWks.push(w);});
          });
          if(allWks.length){
            allWks.sort(function(a,b){return ALL_WEEKS.indexOf(a)-ALL_WEEKS.indexOf(b);});
            projDateRange=wkLabel(allWks[0])+' &rarr; '+wkLabel(allWks[allWks.length-1]);
          }
        }
      }
      var projCell=ri===0?'<td rowspan="'+group.length+'" style="font-weight:600;font-size:13px;border-right:1px solid var(--border);background:'+bg+';vertical-align:top;padding-top:10px">'
        +esc(row.project)
        +(pObj&&pObj.desc?'<div style="font-size:11px;font-weight:400;color:var(--muted);margin-top:3px;line-height:1.4;white-space:normal;max-width:200px">'+esc(pObj.desc)+'</div>':'')
        +(projDateRange?'<div style="font-size:10px;color:var(--accent);margin-top:4px;font-weight:500">'+projDateRange+'</div>':'')
        +'</td>':'';
      var ownerCell='';
      if(ri===0){
        var ow=pObj&&pObj.owner?pObj.owner:'';
        var owHtml=ow
          ?'<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:20px;height:20px;border-radius:50%;background:var(--acc-l);color:var(--accent);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">'+esc(ow.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase())+'</span>'+esc(ow)+'</span>'
          :'<span style="color:var(--subtle);font-style:italic;font-size:11px">No owner</span>';
        ownerCell='<td rowspan="'+group.length+'" style="font-size:12px;color:var(--muted);border-right:2px solid var(--border);background:'+bg+';vertical-align:top;padding-top:10px">'+owHtml+'</td>';
      }
      var stOpts=STATUSES.map(function(s){return'<option value="'+s+'"'+(row.status===s?' selected':'')+'>'+s+'</option>';}).join('');
      var assignedRole=row.role||'';
      var roleOpts2='<option value="">&mdash;</option>'+ROLES.map(function(r){return'<option value="'+esc(r)+'"'+(assignedRole===r?' selected':'')+'>'+esc(r)+'</option>';}).join('');
      var roleCell='<select class="isel" style="color:var(--accent);font-size:11px" onchange="updField('+row.id+',\'role\',this.value)">'+roleOpts2+'</select>';
      var memMeta=row.member?memberMeta[row.member]:null;
      // Check if member is unavailable in the CURRENT VIEW weeks (not globally)
      var isUnavailNow=row.member&&memberIsUnavailInWeeks(row.member,wk);
      var memOpts2='<option value="">&#9873; Unassigned</option>'+teamMembers.map(function(mb){return'<option value="'+esc(mb)+'"'+(row.member===mb?' selected':'')+'>'+esc(mb)+'</option>';}).join('');
      var memberCell=row.member
        ?(isUnavailNow
          ?'<span style="text-decoration:line-through;color:#94A3B8">'+esc(row.member)+'</span><br><span style="background:#FFF7ED;color:#C2410C;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;white-space:nowrap" title="'+(memMeta&&memMeta.unavailReason||'Unavailable')+(memMeta&&memMeta.unavailFrom?' | '+memMeta.unavailFrom+' to '+memMeta.unavailTo:'')+'">&#9888; UNAVAILABLE</span>'
          :esc(row.member))
        :'<span style="display:inline-flex;align-items:center;gap:4px;background:#FEF2F2;border:1px solid #FECACA;padding:2px 8px;border-radius:20px"><span style="color:#EF4444;font-size:12px">&#9873;</span><span style="font-size:11px;font-weight:700;color:#EF4444">Unassigned</span></span>';
      // week cells: grey out + hatch the unavail weeks specifically
      var wkCells=wk.map(function(wkey){
        var v=row.allocations[wkey]!=null?row.allocations[wkey]:null;
        var cellUnavail=row.member&&wkInUnavail(row.member,wkey);
        if(cellUnavail){
          return'<td class="wc"><div style="display:flex;align-items:center;justify-content:center;width:42px;height:26px;border-radius:4px;background:repeating-linear-gradient(45deg,#FFF7ED,#FFF7ED 3px,#FFE4C4 3px,#FFE4C4 6px);color:#C2410C;font-size:10px;font-weight:700" title="Unavailable">&#9888;</div></td>';
        }
        return'<td class="wc"><div class="ac '+acCls(v)+'" data-id="'+row.id+'" data-wk="'+wkey+'" onclick="startEdit(this)">'+(v==null?'+':pct(v))+'</div></td>';
      }).join('');
      rows.push('<tr style="background:'+bg+';'+(isUnavailNow?'opacity:.7':'')+'">'+projCell+ownerCell
        +'<td>'+categoryBadge(pObj?pObj.category||'':'')+'</td>'
        +'<td><select class="isel" style="color:'+(SCOL[row.status]||'#64748B')+'" onchange="updFieldStatus('+row.id+',this)">'+stOpts+'</select></td>'
        +'<td style="font-size:13px">'+memberCell+'</td>'
        +'<td style="min-width:100px">'+roleCell+'</td>'
        +'<td style="font-size:12px;color:#94A3B8;cursor:pointer;min-width:110px" onclick="startEditComment(this,'+row.id+')" title="Click to edit">'+(row.comment?esc(row.comment):'<span style="color:var(--border2);font-style:italic">Add note...</span>')+'</td>'
        +wkCells
        +'<td><button class="btn-ghost btn-del" onclick="delAsgn('+row.id+')">&#10005;</button></td>'
        +'</tr>');
    });
  });
  var sortBtn='<button class="btn btn-s btn-sm" onclick="sortProjAlpha=!sortProjAlpha;renderByProject()">'+(sortProjAlpha?'&#8593; A&ndash;Z on':'&#8661; Sort A&ndash;Z')+'</button>';
  // filter bar
  var fStyle='font-family:inherit;font-size:12px;padding:5px 10px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--surface);';
  var ownerSel='<select onchange="filterProjOwner=this.value;renderByProject()" style="'+fStyle+'color:'+(filterProjOwner?'var(--text)':'var(--muted)')+'"><option value="">All owners</option>'+allOwners.map(function(o){return'<option value="'+esc(o)+'"'+(filterProjOwner===o?' selected':'')+'>'+esc(o)+'</option>';}).join('')+'</select>';
  var natureSel='<select onchange="filterProjCategory=this.value;renderByProject()" style="'+fStyle+'color:'+(filterProjCategory?'var(--text)':'var(--muted)')+'"><option value="">All categories</option>'+allCategories.map(function(n){return'<option value="'+n+'"'+(filterProjCategory===n?' selected':'')+'>'+n+'</option>';}).join('')+'</select>';
  var statusSel='<select onchange="filterProjStatus=this.value;renderByProject()" style="'+fStyle+'color:'+(filterProjStatus?'var(--text)':'var(--muted)')+'"><option value="">All statuses</option>'+STATUSES.map(function(s){return'<option value="'+s+'"'+(filterProjStatus===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select>';
  var memberSel='<select onchange="filterProjMember=this.value;renderByProject()" style="'+fStyle+'color:'+(filterProjMember?'var(--text)':'var(--muted)')+'"><option value="">All members</option>'+allMembers.map(function(mem){return'<option value="'+esc(mem)+'"'+(filterProjMember===mem?' selected':'')+'>'+esc(mem)+'</option>';}).join('')+'</select>';
  var hasFilter=filterProjOwner||filterProjCategory||filterProjStatus||filterProjMember;
  var clearBtn=hasFilter?'<button class="btn btn-s btn-sm" onclick="filterProjOwner=\'\';filterProjCategory=\'\';filterProjStatus=\'\';filterProjMember=\'\';renderByProject()" style="color:#EF4444;border-color:#FECACA">&#10005; Clear</button>':'';
  // count unassigned rows (no member) in all assignments for current month
  var wkSet={};wk.forEach(function(w){wkSet[w]=1;});
  var flagCount=assignments.filter(function(a){
    return !a.member&&Object.keys(a.allocations).some(function(w){return wkSet[w]&&a.allocations[w]>0;});
  }).length;
  // also count role-only rows that have no member at all (regardless of month)
  var totalFlagCount=assignments.filter(function(a){return !a.member;}).length;
  var flagBadge='<span style="display:inline-flex;align-items:center;gap:5px;background:'+(totalFlagCount>0?'#FEF2F2':'#F1F5F9')+';border:1px solid '+(totalFlagCount>0?'#FECACA':'var(--border)')+';padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:'+(totalFlagCount>0?'#EF4444':'var(--muted)')+'"><span>&#9873;</span>'+totalFlagCount+' unassigned</span>';
  document.getElementById('view-byproject').innerHTML=
    '<div class="sh"><h2>Assignments by project</h2><div style="display:flex;gap:8px;align-items:center">'+flagBadge+sortBtn+'<button class="btn btn-p btn-sm" onclick="openModal()">+ New assignment</button></div></div>'
    +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">'
    +'<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Filter:</span>'
    +ownerSel+natureSel+statusSel+memberSel+clearBtn
    +(hasFilter?'<span style="font-size:11px;color:var(--muted)">'+rows.length+' row'+(rows.length!==1?'s':'')+'</span>':'')
    +'</div>'
    +monthTabs()
    +'<div class="card"><div class="tscroll"><table class="bp-table"><thead><tr>'
    +'<th style="min-width:150px">Project</th><th style="min-width:130px">Owner</th>'
    +'<th style="min-width:90px">Category</th><th style="min-width:105px">Status</th>'
    +'<th style="min-width:140px">Member</th><th style="min-width:100px">Role assigned</th><th style="min-width:110px">Comment</th>'
    +m.weeks.map(function(w){return'<th class="wh">'+w+'</th>';}).join('')
    +'<th style="width:36px"></th></tr></thead><tbody>'+(rows.length?rows.join(''):'<tr><td colspan="'+(8+m.weeks.length)+'" style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No assignments match the current filters.</td></tr>')+'</tbody></table></div></div>';
}

// ── BY MEMBER ────────────────────────────────────────────────
function renderByMember(){
  var wk=wkeys(),m=mc(),cap=computeCap();
  var over=teamMembers.filter(function(mb){return wk.some(function(w){return (cap[mb][w]||0)>1.005;});}).length;
  var list=teamMembers.slice();
  if(sortMemberAlpha)list.sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
  var rows=list.map(function(member){
    var vals=wk.map(function(w){return cap[member][w]||0;});
    var avgV=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    var hasAct=vals.some(function(v){return v>0;});
    var meta=memberMeta[member]||{};
    var isUnavail=meta.memberStatus==='Unavailable';
    var cells=vals.map(function(v,wi){
      var wkey=wk[wi];
      var cellUnavail=wkInUnavail(member,wkey);
      if(cellUnavail){
        return'<td class="wc"><div class="cc" '+_oc('showUnavailCard',member,wkey)+' style="background:repeating-linear-gradient(45deg,#FFF7ED,#FFF7ED 3px,#FFE4C4 3px,#FFE4C4 6px);color:#C2410C;font-size:11px;cursor:pointer" title="Unavailable">&#9888;</div></td>';
      }
      if(!(v>=0.005))return'<td class="wc"><div class="cc cc-zz">&mdash;</div></td>';
      return'<td class="wc"><div class="cc '+ccls(v)+'" style="cursor:pointer" '+_oc('showCapBreakdown',member,wkey)+' title="Click to see breakdown">'+Math.round(v*100)+'%</div></td>';
    }).join('');
    var anyUnavailNow=wk.some(function(w){return wkInUnavail(member,w);});
    var nameCell='<td style="font-weight:500">'+esc(member)
      +(anyUnavailNow?'<span style="margin-left:6px;background:#FFF7ED;color:#C2410C;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px" title="'+(meta.unavailReason||'')+(meta.unavailFrom?' | '+meta.unavailFrom.replace(/_/g,' ')+' to '+meta.unavailTo.replace(/_/g,' '):'')+'">UNAVAIL</span>':'')
      +'</td>';
    return'<tr style="'+(hasAct?'':'opacity:.4')+'">'
      +nameCell
      +cells
      +'<td class="wc"><div class="cc '+ccls(avgV)+'" style="font-weight:700">'+(avgV>=0.005?Math.round(avgV*100)+'%':'&mdash;')+'</div></td>'
      +'</tr>';
  }).join('');
  var sortBtn='<button class="btn btn-s btn-sm" onclick="sortMemberAlpha=!sortMemberAlpha;renderByMember()">'+(sortMemberAlpha?'&#8593; A&ndash;Z on':'&#8661; Sort A&ndash;Z')+'</button>';
  document.getElementById('view-bymember').innerHTML=
    '<div class="sh"><h2>Capacity by team member</h2>'
    +'<div style="display:flex;align-items:center;gap:12px">'+sortBtn
    +'<div class="legend">'
    +'<span class="ld"><span class="ld-dot" style="background:#F1F5F9;border:1px solid var(--border2)"></span>Under 80%</span>'
    +'<span class="ld"><span class="ld-dot" style="background:#DCFCE7;border:1px solid #86EFAC"></span>80&ndash;100%</span>'
    +'<span class="ld"><span class="ld-dot" style="background:#FEF2F2;border:1px solid #FECACA"></span>Over 100%</span>'
    +'</div></div></div>'
    +(over>0?'<div class="alert-err">&#9888; <strong>'+over+' member'+(over>1?'s':'')+'</strong> over capacity in at least one week of '+m.name+' '+currentYear+'</div>':'')
    +monthTabs()
    +'<div class="card"><div class="tscroll"><table><thead><tr>'
    +'<th style="min-width:160px">Team member</th>'
    +m.weeks.map(function(w){return'<th class="wh">'+w+'</th>';}).join('')
    +'<th class="wh" style="font-weight:700;color:#334155">AVG</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

// ── SETTINGS ─────────────────────────────────────────────────
function sortMembers(col){
  if(memberSortCol===col){memberSortDir=-memberSortDir;}else{memberSortCol=col;memberSortDir=1;}
  renderMaster();
}
function sortProjs(col){
  if(projSortCol===col){projSortDir=-projSortDir;}else{projSortCol=col;projSortDir=1;}
  renderMaster();
}

function renderMaster(){
  function memberCapAvg(mb){
    var vals=[];
    assignments.forEach(function(a){if(a.member!==mb)return;Object.keys(a.allocations).forEach(function(w){vals.push(a.allocations[w]);});});
    if(!vals.length)return null;
    return vals.reduce(function(a,b){return a+b;},0)/vals.length;
  }
  function projCapAvg(name){
    var vals=[];
    assignments.forEach(function(a){if(a.project!==name)return;Object.keys(a.allocations).forEach(function(w){vals.push(a.allocations[w]);});});
    if(!vals.length)return null;
    return vals.reduce(function(a,b){return a+b;},0)/vals.length;
  }
  function numericSort(a,b){return isNaN(a)?1:isNaN(b)?-1:b-a;}

  // ── MEMBER TABLE ──
  var memberData=teamMembers.map(function(mb){
    var meta=memberMeta[mb]||{role:'',active:true};
    return{name:mb,role:meta.role||'',active:meta.active!==false,n:assignments.filter(function(a){return a.member===mb;}).length,avg:memberCapAvg(mb)};
  });
  if(memberSortCol){
    memberData.sort(function(a,b){
      var r=0;
      if(memberSortCol==='name')r=a.name.toLowerCase().localeCompare(b.name.toLowerCase());
      else if(memberSortCol==='n')r=(b.n-a.n);
      else if(memberSortCol==='avg')r=numericSort(a.avg,b.avg);
      else if(memberSortCol==='role')r=(a.role||'').toLowerCase().localeCompare((b.role||'').toLowerCase());
      else if(memberSortCol==='active')r=(a.active===b.active?0:a.active?-1:1);
      return r*memberSortDir;
    });
  }
  var roleOpts=ROLES.map(function(r){return'<option>'+r+'</option>';}).join('');
  var memberRows=memberData.map(function(d){
    var mb=d.name;
    var meta=memberMeta[mb]||{role:'',active:true};
    var statusVal=meta.memberStatus||(meta.active===false?'Inactive':'Active');
    var rOpts='<option value="">&mdash;</option>'+ROLES.map(function(r){return'<option value="'+esc(r)+'"'+(d.role===r?' selected':'')+'>'+esc(r)+'</option>';}).join('');
    var sBg={Active:'#ECFDF5',Unavailable:'#FFF7ED',Inactive:'#F1F5F9'}[statusVal]||'#F1F5F9';
    var sCol={Active:'#059669',Unavailable:'#C2410C',Inactive:'#64748B'}[statusVal]||'#64748B';
    var statusOpts=MEMBER_STATUSES.map(function(s){return'<option value="'+s+'"'+(statusVal===s?' selected':'')+'>'+s+'</option>';}).join('');
    return'<tr style="'+(statusVal==='Inactive'?'opacity:.6':'')+'">'
      +'<td style="font-weight:500">'+esc(mb)+'</td>'
      +'<td><select style="font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid var(--border2);border-radius:4px;background:var(--surface);color:var(--text);width:100%" onchange="updMemberRole(this)" data-m="'+esc(mb)+'">'+rOpts+'</select></td>'
      +'<td style="text-align:center"><select onchange="updMemberStatus(this)" data-m="'+esc(mb)+'" style="font-family:inherit;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;border:none;background:'+sBg+';color:'+sCol+';cursor:pointer">'+statusOpts+'</select></td>'
      +'<td style="text-align:center"><span style="background:#EEF2FF;color:#4F46E5;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700">'+d.n+'</span></td>'
      +'<td style="text-align:center">'+capChip(d.avg)+'</td>'
      +'<td><button class="btn-ghost btn-del" onclick="delMember(this)" data-m="'+esc(mb)+'">&#10005;</button></td></tr>';
  }).join('');

  // ── PROJECT TABLE ──
  var ownerBaseOpts='<option value="">&mdash;</option>'+teamMembers.map(function(m){return'<option value="'+esc(m)+'">'+esc(m)+'</option>';}).join('');
  var projData=projects.map(function(p){return{p:p,avg:projCapAvg(p.name)};});
  if(projSortCol){
    projData.sort(function(a,b){
      var r=0;
      if(projSortCol==='name')r=a.p.name.toLowerCase().localeCompare(b.p.name.toLowerCase());
      else if(projSortCol==='category')r=(a.p.category||'').toLowerCase().localeCompare((b.p.category||'').toLowerCase());
      else if(projSortCol==='status')r=(a.p.status||'').toLowerCase().localeCompare((b.p.status||'').toLowerCase());
      else if(projSortCol==='owner')r=(a.p.owner||'').toLowerCase().localeCompare((b.p.owner||'').toLowerCase());
      else if(projSortCol==='avg')r=numericSort(a.avg,b.avg);
      return r*projSortDir;
    });
  }
  var projRows=projData.map(function(d){
    var p=d.p;
    var nOpts='<option value="">-- Category --</option>'+NATURES.map(function(n){return'<option value="'+n+'"'+(p.category===n?' selected':'')+'>'+n+'</option>';}).join('');
    var sOpts='<option value="">-- Status --</option>'+STATUSES.map(function(s){return'<option value="'+s+'"'+(p.status===s?' selected':'')+'>'+s+'</option>';}).join('');
    var oOpts=ownerBaseOpts.replace('value="'+esc(p.owner||'')+'"','value="'+esc(p.owner||'')+'" selected');
    var ncol={Product:'#0369A1',Transformation:'#7C3AED',Mixed:'#059669',Enterprise:'#C2410C',Agentic:'#0891B2'}[p.category]||'#64748B';
    var descLen=(p.desc||'').length;
    return'<tr>'
      +'<td style="min-width:140px"><div style="position:relative">'
      +'<input value="'+esc(p.name)+'" onblur="renameProject(this)" onkeydown="if(event.key===\'Enter\')this.blur()" data-original="'+esc(p.name)+'" style="font-weight:600;font-size:13px;width:100%;border:1px solid transparent;border-radius:4px;padding:2px 4px;font-family:inherit;background:transparent;color:var(--text);outline:none" onfocus="this.style.border=\'1px solid var(--accent)\';this.style.background=\'var(--surface)\'" onblur="this.style.border=\'1px solid transparent\';this.style.background=\'transparent\';renameProject(this)">'
      +'</div>'
      +'<div style="position:relative"><input maxlength="200" value="'+esc(p.desc||'')+'" placeholder="Description..." onchange="updProjDesc(this)" data-name="'+esc(p.name)+'" style="width:100%;font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-family:inherit;color:var(--muted);background:var(--s2)"><span style="position:absolute;right:4px;bottom:4px;font-size:9px;color:var(--subtle)">'+(p.desc||'').length+'/200</span></div>'
      +'</td>'
      +'<td><select class="isel" style="color:'+ncol+'" onchange="updProjCategory(this)" data-name="'+esc(p.name)+'">'+nOpts+'</select></td>'
      +'<td><select class="isel" style="color:'+(SCOL[p.status]||'#64748B')+'" onchange="updProjStatus(this)" data-name="'+esc(p.name)+'">'+sOpts+'</select></td>'
      +'<td style="white-space:nowrap"><select class="isel" style="color:#334155;width:100%;white-space:nowrap" onchange="updProjOwner(this)" data-name="'+esc(p.name)+'">'+oOpts+'</select></td>'
      +'<td style="min-width:120px">'+mkDateSel('updProjDate',p.name,'startDate',p.startDate||'')+'</td>'
      +'<td style="min-width:120px">'+mkDateSel('updProjDate',p.name,'endDate',p.endDate||'')+'</td>'
      +'<td style="text-align:center;min-width:70px">'+capChip(d.avg)+'</td>'
      +'<td><button class="btn-ghost btn-del" onclick="delProject(this)" data-name="'+esc(p.name)+'">&#10005;</button></td></tr>';
  }).join('');

  var wkOpts=ALL_WEEKS.map(function(w){return'<option value="'+w+'">'+w.replace('_',' ')+'</option>';}).join('');
  var memOptsBA='<option value="">-- Member --</option>'+teamMembers.map(function(m){return'<option value="'+esc(m)+'">'+esc(m)+'</option>';}).join('');
  var projOptsBA='<option value="">-- Project --</option>'+projects.map(function(p){return'<option value="'+esc(p.name)+'">'+esc(p.name)+'</option>';}).join('');
  var ownerOptsAdd='<option value="">-- Owner --</option>'+teamMembers.map(function(m){return'<option value="'+esc(m)+'">'+esc(m)+'</option>';}).join('');

  // sort header helpers
  function mth(col,label){var a=memberSortCol===col;var arr=a?(memberSortDir===1?'&#8593;':'&#8595;'):'&#8645;';return'<th style="cursor:pointer;white-space:nowrap;user-select:none'+(a?';color:var(--accent)':'')+'" onclick="sortMembers(\''+col+'\')">'+arr+' '+label+'</th>';}
  function pth(col,label,extra){var a=projSortCol===col;var arr=a?(projSortDir===1?'&#8593;':'&#8595;'):'&#8645;';return'<th style="cursor:pointer;white-space:nowrap;user-select:none'+(a?';color:var(--accent)':'')+'"'+(extra?' '+extra:'')+' onclick="sortProjs(\''+col+'\')">'+arr+' '+label+'</th>';}

  // month/year picker options: Jan 2025 – Dec 2028
  function monthYearOpts(placeholder){
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var opts='<option value="">'+placeholder+'</option>';
    for(var yr=2025;yr<=2028;yr++){
      months.forEach(function(mn){opts+='<option>'+mn+' '+yr+'</option>';});
    }
    return opts;
  }
  // Select with pre-selected value for project date fields in table rows
  function mkDateSel(fn,projName,field,current){
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var label=field==='startDate'?'-- Start --':'-- End --';
    var sel='<select onchange="'+fn+'(this,\''+field+'\')" data-name="'+esc(projName)+'" style="font-family:inherit;font-size:11px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;color:var(--text);background:var(--s2);width:100%">';
    sel+='<option value=""'+(current?'':' selected')+'>'+label+'</option>';
    for(var yr=2025;yr<=2028;yr++){
      months.forEach(function(mn){
        var val=mn+' '+yr;
        sel+='<option'+(val===current?' selected':'')+'>'+val+'</option>';

    }
    sel+='</select>';
    return sel;

  document.getElementById('view-master').innerHTML=
    '<div style="margin-bottom:20px">'
    // PROJECTS (first)
    +'<div style="margin-bottom:20px"><div class="sh" style="margin-bottom:12px"><h2><svg width="14" height="14" viewBox="0 0 20 20" fill="none" style="margin-right:6px;vertical-align:-2px"><rect x="2" y="3" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M6 7h8M6 11h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Projects</h2><div style="display:flex;align-items:center;gap:8px"><span class="cnt-badge">'+projects.length+'</span>'+(_undoProject?'<button class="btn btn-s btn-sm" onclick="undoProject()" style="color:var(--accent);border-color:var(--accent)">&#8630; Undo</button>':'')+'</div></div>'

    +'<select class="fi" id="inp-status" style="flex:1;min-width:105px"><option value="">-- Status --</option>'+STATUSES.map(function(s){return'<option>'+s+'</option>';}).join('')+'</select>'
    +'<select class="fi" id="inp-owner" style="flex:1;min-width:140px">'+ownerOptsAdd+'</select>'
    +'<select class="fi" id="inp-start" style="flex:1;min-width:130px">'+monthYearOpts('-- Start --')+'</select>'
    +'<select class="fi" id="inp-end" style="flex:1;min-width:130px">'+monthYearOpts('-- End --')+'</select>'
    +'<input class="fi" id="inp-desc" placeholder="Description (optional, max 200)..." maxlength="200" style="flex:3;min-width:200px">'
    +'<button class="btn btn-p btn-sm" onclick="addProject()">+ Add</button></div>'
    +'<div style="max-height:380px;overflow-y:auto"><table style="width:100%"><thead><tr>'
    +pth('name','Project')+pth('category','Category')+pth('status','Status')+pth('owner','Owner','style="width:100%"')+pth('start','Start','style="min-width:90px"')+pth('end','End','style="min-width:90px"')+pth('avg','Cap. avg','style="text-align:center;min-width:70px"')+'<th style="width:44px"></th>'
    +'</tr></thead><tbody>'+projRows+'</tbody></table></div></div></div>'
    // TEAM MEMBERS (third)
    +'<div><div class="sh" style="margin-bottom:12px"><h2><svg width="14" height="14" viewBox="0 0 20 20" fill="none" style="margin-right:6px;vertical-align:-2px"><circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 17c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="15" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M15 13c1.657 0 3 .895 3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Team members</h2><div style="display:flex;align-items:center;gap:8px"><span class="cnt-badge">'+teamMembers.length+'</span>'+(_undoMember?'<button class="btn btn-s btn-sm" onclick="undoMember()" style="color:var(--accent);border-color:var(--accent)">&#8630; Undo</button>':'')+'</div></div>'

function renderExport(){
  var wkOpts=ALL_WEEKS.map(function(w){return'<option value="'+w+'">'+w.replace('_',' ')+'</option>';}).join('');
  document.getElementById('view-export').innerHTML=
    '<div class="sh"><h2>Capacity export matrix</h2></div>'
    +'<div class="card" style="padding:20px;margin-bottom:18px">'
    +'<div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">'
    +'<div><label class="fl">From week</label><select class="fi" id="ex-from" style="min-width:130px">'+wkOpts+'</select></div>'
    +'<div><label class="fl">To week</label><select class="fi" id="ex-to" style="min-width:130px">'+wkOpts+'</select></div>'
    +'<button class="btn btn-p" onclick="generateMatrix()">&#9654; Generate</button>'
    +'<button class="btn btn-s" id="ex-csv-btn" onclick="exportCSV()" style="display:none">&#8659; CSV</button>'
    +'<button class="btn btn-s" id="ex-xlsx-btn" onclick="exportXLSX()" style="display:none;border-color:#217346;color:#217346">&#8659; Excel (.xlsx)</button>'
    +'</div></div>'

  var f=document.getElementById('ex-from'),t=document.getElementById('ex-to');
  if(f&&ALL_WEEKS.length){f.value=ALL_WEEKS[0];t.value=ALL_WEEKS[Math.min(3,ALL_WEEKS.length-1)];}
}

function generateMatrix(){
  var fromWk=document.getElementById('ex-from').value;
  var toWk=document.getElementById('ex-to').value;
  var fromIdx=ALL_WEEKS.indexOf(fromWk);
  var toIdx=ALL_WEEKS.indexOf(toWk);
  var result=document.getElementById('ex-result');
  var hide=function(){document.getElementById('ex-csv-btn').style.display='none';document.getElementById('ex-xlsx-btn').style.display='none';};
  if(0>fromIdx||0>toIdx||fromIdx>toIdx){result.innerHTML='<div class="alert-err">&#9888; Invalid range.</div>';hide();return;}
  var rangeWeeks=ALL_WEEKS.slice(fromIdx,toIdx+1);
  var label=fromWk.replace('_',' ')+' &rarr; '+toWk.replace('_',' ');
  var projSet={};
  assignments.forEach(function(a){
    rangeWeeks.forEach(function(w){if(a.allocations[w]!=null&&a.allocations[w]>0)projSet[a.project]=1;});
  });
  var activeProjNames=Object.keys(projSet).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
  if(!activeProjNames.length){result.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No assignments found for this range.</div>';hide();return;}
  var matrix={};
  teamMembers.forEach(function(m){matrix[m]={};activeProjNames.forEach(function(p){matrix[m][p]=null;});});
  assignments.forEach(function(a){
    if(!a.member||!matrix[a.member])return;
    if(!(a.project in matrix[a.member]))return;
    var vals=rangeWeeks.map(function(w){return a.allocations[w]!=null?a.allocations[w]:null;}).filter(function(v){return v!==null;});
    if(!vals.length)return;
    var avg=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    matrix[a.member][a.project]=(matrix[a.member][a.project]||0)+avg;
  });
  _exMatrix={members:teamMembers,projects:activeProjNames,data:matrix,range:fromWk.replace('_',' ')+' to '+toWk.replace('_',' '),weeks:rangeWeeks};
  function chip(v){
    if(v===null||v===0)return'<div class="exp-chip exp-chip-zz">&mdash;</div>';
    var cls=v>1.005?'exp-chip-ov':v>=0.8?'exp-chip-ok':'exp-chip-md';
    return'<div class="exp-chip '+cls+'">'+Math.round(v*100)+'%</div>';
  }
  var thead='<tr><th class="sticky-corner">Member &nbsp;<span style="font-weight:400;color:var(--subtle)">'+label+'</span></th>'
    +activeProjNames.map(function(p){return'<th class="proj-h" title="'+esc(p)+'"><span>'+esc(p)+'</span></th>';}).join('')
    +'<th style="position:sticky;top:0;background:#F1F4FF;color:var(--accent);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;text-align:center;min-width:56px;z-index:2">TOTAL</th></tr>';
  var tbody=teamMembers.map(function(member){
    var rowVals=activeProjNames.map(function(p){return matrix[member][p];});
    var nonNull=rowVals.filter(function(v){return v!==null&&v>0;});
    if(!nonNull.length)return'';
    var total=nonNull.reduce(function(a,b){return a+b;},0);
    var tcls=total>1.005?'exp-chip-ov':total>=0.8?'exp-chip-ok':'exp-chip-md';
    return'<tr><td class="member-cell">'+esc(member)+'</td>'
      +rowVals.map(function(v){return'<td style="padding:0;min-width:54px">'+chip(v)+'</td>';}).join('')
      +'<td style="padding:0;min-width:56px"><div class="exp-chip exp-total '+tcls+'">'+Math.round(total*100)+'%</div></td></tr>';
  }).filter(Boolean).join('');
  if(!tbody){result.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No member has allocations in this range.</div>';hide();return;}
  var activeMemCount=teamMembers.filter(function(m){return activeProjNames.some(function(p){return (matrix[m][p]||0)>0;});}).length;
  result.innerHTML='<div style="font-size:11px;color:var(--muted);margin-bottom:10px">'+activeProjNames.length+' projects &middot; '+activeMemCount+' members active in range</div>'
    +'<div class="exp-wrap card"><table class="exp-table"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
  document.getElementById('ex-csv-btn').style.display='';
  document.getElementById('ex-xlsx-btn').style.display='';
}

function exportCSV(){
  if(!_exMatrix)return;
  var rows=[['Member'].concat(_exMatrix.projects).concat(['TOTAL'])];
  _exMatrix.members.forEach(function(member){
    var rowVals=_exMatrix.projects.map(function(p){return _exMatrix.data[member][p];});
    var nonNull=rowVals.filter(function(v){return v!==null&&v>0;});
    if(!nonNull.length)return;
    var total=nonNull.reduce(function(a,b){return a+b;},0);
    rows.push([member].concat(rowVals.map(function(v){return (v===null||v===0)?'':Math.round(v*100)+'%';})).concat([Math.round(total*100)+'%']));
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='medusa_capacity_'+_exMatrix.range.replace(/ /g,'_')+'.csv';
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

function exportXLSX(){
  if(!_exMatrix||!window.XLSX)return;
  var headerRow=['Member'].concat(_exMatrix.projects).concat(['TOTAL']);
  var dataRows=[];
  _exMatrix.members.forEach(function(member){
    var rowVals=_exMatrix.projects.map(function(p){return _exMatrix.data[member][p];});
    var nonNull=rowVals.filter(function(v){return v!==null&&v>0;});
    if(!nonNull.length)return;
    var total=nonNull.reduce(function(a,b){return a+b;},0);
    dataRows.push([member]
      .concat(rowVals.map(function(v){return (v===null||v===0)?'':Math.round(v*100)+'%';}))
      .concat([Math.round(total*100)+'%']));
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([headerRow].concat(dataRows));
  var cols=[{wch:22}];
  _exMatrix.projects.forEach(function(p){cols.push({wch:Math.max(12,Math.min(p.length,28))});});
  cols.push({wch:10});
  ws['!cols']=cols;
  var metaWs=XLSX.utils.aoa_to_sheet([
    ['Medusa - Capacity Platform'],
    ['Range',_exMatrix.range],
    ['Generated',new Date().toLocaleDateString('en-GB')],
    ['Members',dataRows.length],
    ['Projects',_exMatrix.projects.length]
  ]);
  metaWs['!cols']=[{wch:16},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'Capacity Matrix');
  XLSX.utils.book_append_sheet(wb,metaWs,'Info');
  XLSX.writeFile(wb,'medusa_capacity_'+_exMatrix.range.replace(/ /g,'_')+'.xlsx');
}

// ── INLINE EDIT ──────────────────────────────────────────────
function startEdit(el){
  var id=parseInt(el.dataset.id),wk=el.dataset.wk;
  var asgn=null;assignments.forEach(function(a){if(a.id===id)asgn=a;});
  var cur=asgn?(asgn.allocations[wk]!=null?asgn.allocations[wk]:null):null;
  var inp=document.createElement('input');
  inp.type='text';inp.className='ac-input';
  inp.value=cur!=null?String(Math.round(cur*100)):'';inp.placeholder='%';
  el.parentNode.replaceChild(inp,el);inp.focus();inp.select();
  var done=false;
  function commit(){
    if(done)return;done=true;
    var raw=inp.value.trim(),v=null;
    if(raw!==''){var n=parseFloat(raw);if(!isNaN(n)&&n>0)v=Math.min(2,Math.max(0,n/100));}
    var a2=null;assignments.forEach(function(a){if(a.id===id)a2=a;});
    if(a2){if(v===null)delete a2.allocations[wk];else a2.allocations[wk]=v;}
    saveState();spSaveAssignment(a2);render();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){inp.removeEventListener('blur',commit);commit();}
    if(e.key==='Escape'){done=true;render();}
  });
}

function startEditComment(td,id){
  var asgn=null;assignments.forEach(function(a){if(a.id===id)asgn=a;});
  if(!asgn)return;
  var inp=document.createElement('input');
  inp.type='text';inp.value=asgn.comment||'';inp.placeholder='Add note...';
  inp.style.cssText='width:100%;border:1.5px solid var(--accent);border-radius:4px;padding:4px 7px;font-size:12px;font-family:inherit;outline:none;color:var(--text);background:#fff';
  td.innerHTML='';td.appendChild(inp);inp.focus();inp.select();
  var done=false;
  function commit(){
    if(done)return;done=true;
    asgn.comment=inp.value.trim();
    saveState();spSaveAssignment(asgn);renderByProject();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){inp.removeEventListener('blur',commit);commit();}
    if(e.key==='Escape'){done=true;renderByProject();}
  });
}

function submitAdd(){
  var fromEl=document.getElementById('m-from');
  var toEl=document.getElementById('m-to');
  var pctEl=document.getElementById('m-pct');
  var errEl=document.getElementById('m-period-err');
  var fromWk=fromEl?fromEl.value:'';
  var toWk=toEl?toEl.value:'';
  var pctRaw=pctEl?parseFloat(pctEl.value):100;
  var fi=ALL_WEEKS.indexOf(fromWk),ti=ALL_WEEKS.indexOf(toWk);
  if(fromWk&&toWk&&fi>ti){
    if(errEl){errEl.textContent='"From" week must be before or equal to "To" week.';errEl.style.display='block';}
    return;
  }
  var pct=isNaN(pctRaw)?1:Math.min(2,Math.max(0,pctRaw/100));
  var allocs={};
  if(fromWk&&toWk&&fi>=0&&ti>=0){
    ALL_WEEKS.slice(fi,ti+1).forEach(function(w){allocs[w]=pct;});
  }
  var roleEl=document.getElementById('m-role');
  var row={id:mkid(),project:document.getElementById('m-proj').value,category:document.getElementById('m-nat').value,
    status:document.getElementById('m-st').value,member:document.getElementById('m-mem').value,
    role:roleEl?roleEl.value:'',
    comment:document.getElementById('m-com').value,allocations:allocs};
  assignments.push(row);
  var ov=document.querySelector('.overlay');if(ov)ov.remove();
  saveState();spSaveAssignment(row);render();
  _showToast('Assignment created'+(fromWk&&toWk?' — '+fromWk.replace(/_/g,' ')+' to '+toWk.replace(/_/g,' '):''));
}

// ── ACTIONS ──────────────────────────────────────────────────
function wkInUnavail(member, wkey){
  var meta=memberMeta[member];
  if(!meta||meta.memberStatus!=='Unavailable'||!meta.unavailFrom||!meta.unavailTo)return false;
  var fi=ALL_WEEKS.indexOf(meta.unavailFrom),ti=ALL_WEEKS.indexOf(meta.unavailTo),wi=ALL_WEEKS.indexOf(wkey);
  if(fi<0||ti<0||wi<0)return false;
  return wi>=fi&&wi<=ti;
}

function memberIsUnavailInWeeks(member, wkArr){
  // returns true if ANY of the weeks in wkArr falls in the member's unavail range
  if(!wkArr||!wkArr.length)return false;
  return wkArr.some(function(w){return wkInUnavail(member,w);});
}

function updProjStatusByName(name,sel){
  var p=null;projects.forEach(function(x){if(x.name===name){x.status=sel.value;p=x;}});
  sel.style.color=SCOL[sel.value]||'#64748B';
  if(p)spSaveProject(p);saveState();renderTopbar();renderSidebar();
}

function updField(id,field,val){
  var a=null;assignments.forEach(function(x){if(x.id===id){x[field]=val;a=x;}});
  if(a)spSaveAssignment(a);saveState();renderTopbar();renderSidebar();
}

function updFieldStatus(id,sel){
  // update color immediately, then save
  sel.style.color=SCOL[sel.value]||'#64748B';
  updField(id,'status',sel.value);
}

function delAsgn(id){
  // Only removes this specific assignment row — other members on the same project are unaffected
  var a=null;assignments.forEach(function(x){if(x.id===id)a=x;});
  if(!a)return;
  _confirmModal(
    'Remove this assignment?',
    'This will remove <strong>'+(a.member?esc(a.member):'(unassigned)')+'</strong> from <strong>'+esc(a.project)+'</strong>. Other team members on this project will not be affected.',
    'Remove',
    function(){
      spDeleteAssignment(a._spId);
      assignments=assignments.filter(function(x){return x.id!==id;});
      saveState();render();
    }
  );
}

function updMemberRole(sel){
  var m=sel.getAttribute('data-m'),role=sel.value;
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].role=role;saveState();
}

function updMemberStatus(sel){
  var m=sel.getAttribute('data-m'),status=sel.value;
  if(status==='Unavailable'){
    _showUnavailModal(m,sel);
    return;
  }
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].memberStatus=status;
  memberMeta[m].active=(status==='Active');
  delete memberMeta[m].unavailFrom;
  delete memberMeta[m].unavailTo;
  delete memberMeta[m].unavailReason;
  saveState();renderMaster();
}

function confirmUnavail(m){
  var from=document.getElementById('unavail-from').value;
  var to=document.getElementById('unavail-to').value;
  var reason=document.getElementById('unavail-reason').value;
  var err=document.getElementById('unavail-err');
  var fi=ALL_WEEKS.indexOf(from),ti=ALL_WEEKS.indexOf(to);
  if(fi>ti){err.textContent='"From" week must be before "To" week.';err.style.display='block';return;}
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].memberStatus='Unavailable';
  memberMeta[m].active=false;
  memberMeta[m].unavailFrom=from;
  memberMeta[m].unavailTo=to;
  memberMeta[m].unavailReason=reason;
  var ov=document.querySelector('.overlay');if(ov)ov.remove();

  _showToast(esc(m)+' marked unavailable: '+reason);

function toggleMemberActive(el){
  var m=el.getAttribute('data-m');
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].active=!memberMeta[m].active;
  saveState();renderMaster();
}

function updProjDesc(inp){
  var name=inp.getAttribute('data-name'),desc=inp.value.slice(0,200);
  projects.forEach(function(p){if(p.name===name)p.desc=desc;});
  saveState();
}

function renameProject(inp){
  var oldName=inp.getAttribute('data-original');
  var newName=inp.value.trim();
  if(!newName||newName===oldName)return;
  // check duplicate
  var exists=false;projects.forEach(function(p){if(p.name===newName)exists=true;});
  if(exists){inp.value=oldName;_showToast('A project with that name already exists');return;}
  projects.forEach(function(p){if(p.name===oldName)p.name=newName;});
  assignments.forEach(function(a){if(a.project===oldName)a.project=newName;});
  inp.setAttribute('data-original',newName);
  saveState();renderMaster();
}

function addMember(){
  var el=document.getElementById('inp-member'),v=el.value.trim();
  var roleEl=document.getElementById('inp-role');
  var role=roleEl?roleEl.value:'';
  if(v&&teamMembers.indexOf(v)===-1){
    _undoMember={member:v,wasAdd:true};
    teamMembers.push(v);
    memberMeta[v]={role:role,active:true};
    el.value='';if(roleEl)roleEl.value='';
    saveState();spSaveMember(v);render();
  }
}

function undoMember(){
  if(!_undoMember)return;
  if(_undoMember.wasAdd){
    // undo add: remove the member that was just added
    var m=_undoMember.member;
    teamMembers=teamMembers.filter(function(x){return x!==m;});
    assignments=assignments.filter(function(a){return a.member!==m;});
  } else {
    // undo delete: restore member and their assignments
    var m2=_undoMember.member;
    if(teamMembers.indexOf(m2)===-1)teamMembers.push(m2);
    _undoMember.assignments.forEach(function(a){
      var exists=false;assignments.forEach(function(x){if(x.id===a.id)exists=true;});
      if(!exists)assignments.push(a);
    });
  }
  _undoMember=null;saveState();render();
}

function undoProject(){
  if(!_undoProject)return;
  if(_undoProject.wasAdd){
    var n=_undoProject.project.name;
    projects=projects.filter(function(x){return x.name!==n;});
    assignments=assignments.filter(function(a){return a.project!==n;});
  } else {
    // restore project and assignments, remove from archive
    var rp=_undoProject.project;
    var exists=false;projects.forEach(function(x){if(x.name===rp.name)exists=true;});
    if(!exists)projects.push(rp);
    _undoProject.assignments.forEach(function(a){
      var ex=false;assignments.forEach(function(x){if(x.id===a.id)ex=true;});
      if(!ex)assignments.push(a);
    });
    archivedProjects=archivedProjects.filter(function(x){return x.name!==rp.name;});
  }
  _undoProject=null;saveState();render();
}

      +'<svg width="10" height="10" viewBox="0 0 20 20" fill="none"><path d="M6 2h8M3 5h14M5 5l1 12h8l1-12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Delete permanently</button>'
      +'</div>'
      +'</div>'
