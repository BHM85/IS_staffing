function deleteArchivedProject(name){
  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="modal" style="max-width:420px">'
    +'<div class="modal-head">'
    +'<h3>Permanently delete project?</h3>'
    +'</div>'
    +'<div class="modal-body">'
    +'<p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">This will permanently remove <strong style="color:var(--text)">'+esc(name)+'</strong> from the archive. This action <strong>cannot be undone</strong>.</p>'
    +'<div class="fg">'
    +'<label class="fl" style="color:#EF4444">Type DELETE to confirm</label>'
    +'<input id="del-confirm-inp" class="fi" type="text" placeholder="DELETE" autocomplete="off" style="letter-spacing:1px;font-weight:600">'
    +'</div>'
    +'<div id="del-confirm-err" style="display:none;font-size:12px;color:#EF4444;margin-top:6px"></div>'
    +'</div>'
    +'<div class="modal-foot">'
    +'<button class="btn btn-s" onclick="this.closest(\'.overlay\').remove()">Cancel</button>'
    +'<button class="btn" style="background:#EF4444;color:#fff" onclick="confirmDeleteArchived(\''+esc(name)+'\')">Delete permanently</button>'
    +'</div>'
    +'</div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
  setTimeout(function(){var inp=document.getElementById('del-confirm-inp');if(inp){inp.focus();}},60);

function confirmDeleteArchived(name){
  var inp=document.getElementById('del-confirm-inp');
  var err=document.getElementById('del-confirm-err');
  if(!inp)return;
  if(inp.value.trim()!=='DELETE'){
    err.textContent='Please type DELETE exactly (case-sensitive) to confirm.';
    err.style.display='block';
    inp.focus();inp.select();
    return;
  }
  archivedProjects=archivedProjects.filter(function(p){return p.name!==name;});
  var ov=document.querySelector('.overlay');if(ov)ov.remove();
  saveState();renderArchive();
  _showToast('"'+name+'" permanently deleted');
}
function delMember(btn){
  var m=btn.getAttribute('data-m');
  _confirmModal(
    'Remove team member?',
    'This will permanently delete <strong>'+esc(m)+'</strong> and all their assignments. This action can be undone once.',
    'Remove',
    function(){
      _undoMember={member:m,assignments:assignments.filter(function(a){return a.member===m;}).map(function(a){return JSON.parse(JSON.stringify(a));})};
      assignments.filter(function(a){return a.member===m;}).forEach(function(a){spDeleteAssignment(a._spId);});
      teamMembers=teamMembers.filter(function(x){return x!==m;});
      assignments=assignments.filter(function(a){return a.member!==m;});
      spDeleteMember(m);saveState();render();
    }
  );
}

function addProject(){
  var n=document.getElementById('inp-proj').value.trim();
  var exists=false;projects.forEach(function(p){if(p.name===n)exists=true;});
  if(n&&!exists){
    var descEl=document.getElementById('inp-desc');
    var startEl=document.getElementById('inp-start');
    var endEl=document.getElementById('inp-end');
    var np={name:n,
      category:document.getElementById('inp-category').value,
      status:document.getElementById('inp-status').value,
      owner:document.getElementById('inp-owner').value,
      startDate:startEl?startEl.value.trim():'',
      endDate:endEl?endEl.value.trim():'',
      desc:descEl?(descEl.value.slice(0,200)):''};
    _undoProject={project:JSON.parse(JSON.stringify(np)),assignments:[],wasAdd:true};
    projects.push(np);
    document.getElementById('inp-proj').value='';
    if(descEl)descEl.value='';
    if(startEl)startEl.value='';
    if(endEl)endEl.value='';
    saveState();spSaveProject(np);render();
  }
}

function delProject(btn){
  var name=btn.getAttribute('data-name');
  _confirmModal(
    'Archive project?',
    'This will move <strong>'+esc(name)+'</strong> to the Archive tab with full member history. This action can be undone once.',
    'Archive',
    function(){
      var p=null;projects.forEach(function(x){if(x.name===name)p=x;});
      var projAsgns=assignments.filter(function(a){return a.project===name;});
      var memberStats={};
      projAsgns.forEach(function(a){
        if(!a.member)return;
        if(!memberStats[a.member])memberStats[a.member]={weeks:0,first:null,last:null};
        Object.keys(a.allocations).forEach(function(wk){
          if(!(a.allocations[wk]>0))return;
          memberStats[a.member].weeks++;
          var idx=ALL_WEEKS.indexOf(wk);
          if(memberStats[a.member].first===null||idx!==-1&&ALL_WEEKS.indexOf(memberStats[a.member].first)>idx)memberStats[a.member].first=wk;
          if(memberStats[a.member].last===null||idx!==-1&&ALL_WEEKS.indexOf(memberStats[a.member].last)<=idx)memberStats[a.member].last=wk;
        });
      });
      var members=[];
      Object.keys(memberStats).forEach(function(m){
        var s=memberStats[m];
        members.push({name:m,weeks:s.weeks,period:s.first&&s.last?wkLabel(s.first)+' - '+wkLabel(s.last):''});
      });
      _undoProject={project:JSON.parse(JSON.stringify(p||{name:name})),assignments:projAsgns.map(function(a){return JSON.parse(JSON.stringify(a));})};
      var now=new Date();
      var ts=now.toLocaleDateString('en-GB')+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      archivedProjects.push({name:name,category:p?p.category:'',status:p?p.status:'',owner:p?p.owner:'',archivedOn:ts,members:members});
      if(p)spDeleteProject(p._spId);
      projAsgns.forEach(function(a){spDeleteAssignment(a._spId);});
      projects=projects.filter(function(x){return x.name!==name;});
      assignments=assignments.filter(function(a){return a.project!==name;});
      saveState();render();
      _showToast('"'+name+'" moved to Archive');
    }
  );
}

function updProjStatus(sel){

function updProjOwner(sel){

function bulkAssign(){
  var member=document.getElementById('ba-member').value;
  var proj=document.getElementById('ba-proj').value;
  var roleEl=document.getElementById('ba-role');
  var role=roleEl?roleEl.value:'';
  var fromWk=document.getElementById('ba-from').value;
  var toWk=document.getElementById('ba-to').value;
  var pctRaw=parseFloat(document.getElementById('ba-pct').value);
  var msg=document.getElementById('ba-msg');
  if(!proj||!fromWk||!toWk||isNaN(pctRaw)){
    msg.innerHTML='<span style="color:#EF4444">&#9888; Please fill in project, week range and percentage.</span>';return;
  }
  if(!member&&!role){
    msg.innerHTML='<span style="color:#EF4444">&#9888; Please fill in at least Member or Role.</span>';return;
  }
  var v=Math.min(2,Math.max(0,pctRaw/100));
  var fromIdx=ALL_WEEKS.indexOf(fromWk),toIdx=ALL_WEEKS.indexOf(toWk);
  if(0>fromIdx||0>toIdx||fromIdx>toIdx){
    msg.innerHTML='<span style="color:#EF4444">&#9888; "From" must be before "To".</span>';return;
  }
  var rangeWeeks=ALL_WEEKS.slice(fromIdx,toIdx+1);
  var existing=null;
  assignments.forEach(function(a){if(a.member===member&&a.project===proj)existing=a;});
  if(!existing){
    var p=null;projects.forEach(function(x){if(x.name===proj)p=x;});
    existing={id:mkid(),project:proj,category:p?p.category:'',status:p?p.status:'Confirmed',member:member,role:role,comment:'',allocations:{}};
    assignments.push(existing);
  } else if(role){
    existing.role=role;
  }
  rangeWeeks.forEach(function(w){existing.allocations[w]=v;});
  var label=fromWk.replace('_',' ')+' to '+toWk.replace('_',' ');
  msg.innerHTML='<span style="color:#059669">&#10003; Assigned <strong>'+esc(member)+'</strong> to <strong>'+esc(proj)+'</strong>'+(role?' as <strong>'+esc(role)+'</strong>':'')+' at <strong>'+Math.round(pctRaw)+'%</strong> from '+label+' ('+rangeWeeks.length+' weeks).</span>';
  saveState();spSaveAssignment(existing);render();
}

// ── GANTT ─────────────────────────────────────────────────────
var ganttYear=2026;
var ganttMode='projects'; // 'projects' or 'members'

function renderGantt(){
  // Build month columns for the selected year
  var startIdx=(ganttYear===2026)?2:0;
  var yearMonths=MONTH_DEFS.slice(startIdx);

  // Collect all week keys for this year
  var yearWeeks=[];
  yearMonths.forEach(function(m){
    m.weeks.forEach(function(w){yearWeeks.push(ganttYear+'_'+m.abbr+'_'+w);});
  });

  // Color scale for allocation %
  function barColor(v){
    if(!(v>0))return'transparent';
    if(v>1.005)return'#EF4444';
    if(v>=0.8)return'#10B981';
    return'#94A3B8';
  }
  function barOpacity(v){
    if(!(v>0))return 0;
    return Math.min(0.9,0.4+v*0.5);
  }

  // ── PROJECT GANTT ──────────────────────────────────────────
  if(ganttMode==='projects'){
    // For each project find first and last active week across all members
    var projActivity={};
    assignments.forEach(function(a){
      if(!a.project)return;
      yearWeeks.forEach(function(wk){
        if(a.allocations[wk]>0){
          if(!projActivity[a.project])projActivity[a.project]={first:yearWeeks.length,last:-1,members:{}};
          var idx=yearWeeks.indexOf(wk);
          if(idx>=0){
            if(idx<projActivity[a.project].first)projActivity[a.project].first=idx;
            if(idx>projActivity[a.project].last)projActivity[a.project].last=idx;
          }
          if(a.member)projActivity[a.project].members[a.member]=1;
        }
      });
    });

    var sortedProjs=projects.slice().sort(function(a,b){return a.name.toLowerCase().localeCompare(b.name.toLowerCase());});
    var COL_W=28; // px per week column
    var ROW_H=36;
    var LABEL_W=180;

    // Month header spans
    var monthHeaders=yearMonths.map(function(m){
      return'<th colspan="'+m.weeks.length+'" style="text-align:center;padding:5px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--s2);border-bottom:1px solid var(--border);border-right:1px solid var(--border)">'+m.name.slice(0,3)+'</th>';
    }).join('');
    var weekHeaders=yearMonths.map(function(m){
      return m.weeks.map(function(w){return'<th style="min-width:'+COL_W+'px;max-width:'+COL_W+'px;padding:3px 0;font-size:9px;text-align:center;color:var(--subtle);background:var(--s2);font-weight:400">'+w+'</th>';}).join('');
    }).join('');

    var projRows=sortedProjs.map(function(p){
      var act=projActivity[p.name];
      var ncol={Product:'#0369A1',Transformation:'#7C3AED',Mixed:'#059669',Enterprise:'#C2410C',Agentic:'#0891B2'}[p.category]||'#CBD5E1';
      var cells=yearWeeks.map(function(wk,idx){
        var hasActivity=false;
        var totalAlloc=0,memberCount=0;
        assignments.forEach(function(a){
          if(a.project===p.name&&a.allocations[wk]>0){hasActivity=true;totalAlloc+=a.allocations[wk];memberCount++;}
        });
        if(!hasActivity)return'<td style="min-width:'+COL_W+'px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:0;height:'+ROW_H+'px"></td>';
        var intensity=Math.min(1,totalAlloc/memberCount||0);
        var bg=barColor(intensity);
        return'<td '+_oc('showGanttProjBreakdown',p.name,wk)+' title="'+esc(p.name)+' &mdash; '+memberCount+' member'+(memberCount!==1?'s':'')+'" style="cursor:pointer;min-width:'+COL_W+'px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:0;height:'+ROW_H+'px;background:'+bg+';opacity:'+(0.3+intensity*0.7)+'">'+'</td>';
      }).join('');
      var memCount=act?Object.keys(act.members).length:0;
      // count total active weeks for this project
      var projWkSet={};
      assignments.forEach(function(a){
        if(a.project!==p.name)return;
        Object.keys(a.allocations).forEach(function(w){if(a.allocations[w]>0)projWkSet[w]=1;});
      });
      var projWks=Object.keys(projWkSet).length;
      return'<tr>'
        +'<td style="padding:6px 10px;border-bottom:1px solid var(--border);border-right:2px solid var(--border2);position:sticky;left:0;background:var(--surface);z-index:1;min-width:'+LABEL_W+'px">'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="width:8px;height:8px;border-radius:2px;background:'+ncol+';flex-shrink:0"></span>'
        +'<div><div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px">'+esc(p.name)+'</div>'
        +'<div style="font-size:10px;color:var(--muted)">'
        +(memCount>0?memCount+' member'+(memCount!==1?'s':''):'')
        +(memCount>0&&projWks>0?' &middot; ':'')
        +(projWks>0?projWks+' wk'+(projWks!==1?'s':''):'')
        +'</div>'
        +'</div></div>'
        +'</td>'+cells+'</tr>';
    }).join('');

    var html='<div class="sh" style="margin-bottom:0">'
      +'<h2>Capacity Overview &mdash; '+ganttYear+'</h2>'
      +'<div style="display:flex;gap:8px;align-items:center">'
      +'<div style="display:flex;gap:2px">'
      +YEARS.map(function(yr){var on=yr===ganttYear;return'<button onclick="ganttYear='+yr+';renderGantt()" style="padding:4px 12px;border-radius:4px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;border:'+(on?'none':'1px solid var(--border)')+';background:'+(on?'var(--accent)':'var(--surface)')+';color:'+(on?'#fff':'var(--muted)')+'">'+yr+'</button>';}).join('')
      +'</div>'
      +'<div style="display:flex;gap:2px;border-left:1px solid var(--border);padding-left:8px">'
      +'<button onclick="ganttMode=\'projects\';renderGantt()" style="padding:4px 12px;border-radius:4px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--accent);color:#fff">Projects</button>'
      +'<button onclick="ganttMode=\'members\';renderGantt()" style="padding:4px 12px;border-radius:4px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted)">Members</button>'
      +'</div>'
      +'<div class="legend" style="padding-left:8px;border-left:1px solid var(--border)">'
      +'<span class="ld"><span class="ld-dot" style="background:#94A3B8"></span>Under 80%</span>'
      +'<span class="ld"><span class="ld-dot" style="background:#10B981"></span>80-100%</span>'
      +'<span class="ld"><span class="ld-dot" style="background:#EF4444"></span>Over 100%</span>'
      +'</div>'
      +'</div></div>'
      +'<div class="gantt-wrap" style="margin-top:16px">'
      +'<table style="border-collapse:collapse;min-width:100%">'
      +'<thead>'
      +'<tr><th style="position:sticky;left:0;background:var(--s2);z-index:2;min-width:'+LABEL_W+'px;padding:5px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);border-right:2px solid var(--border2)">Project</th>'+monthHeaders+'</tr>'
      +'<tr><th style="position:sticky;left:0;background:var(--s2);z-index:2;border-bottom:1px solid var(--border);border-right:2px solid var(--border2)"></th>'+weekHeaders+'</tr>'
      +'</thead>'
      +'<tbody>'+projRows+'</tbody>'
      +'</table></div>';
    document.getElementById('view-gantt').innerHTML=html;
    return;
  }

  // ── MEMBER GANTT ──────────────────────────────────────────
  var LABEL_W2=180, COL_W2=28, ROW_H2=32;
  var sortedMembers=teamMembers.slice().sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
  var cap=computeCap();

  var monthHeaders2=yearMonths.map(function(m){
    return'<th colspan="'+m.weeks.length+'" style="text-align:center;padding:5px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--s2);border-bottom:1px solid var(--border);border-right:1px solid var(--border)">'+m.name.slice(0,3)+'</th>';
  }).join('');
  var weekHeaders2=yearMonths.map(function(m){
    return m.weeks.map(function(w){return'<th style="min-width:'+COL_W2+'px;max-width:'+COL_W2+'px;padding:3px 0;font-size:9px;text-align:center;color:var(--subtle);background:var(--s2);font-weight:400">'+w+'</th>';}).join('');
  }).join('');

  var memberRows2=sortedMembers.map(function(member){
    var meta=memberMeta[member]||{};
    var anyUnavailYear=yearWeeks.some(function(w){return wkInUnavail(member,w);});
    var cells=yearWeeks.map(function(wk){
      var v=cap[member]?cap[member][wk]||0:0;
      var cellUnavail=wkInUnavail(member,wk);
      if(cellUnavail){
        return'<td '+_oc('showUnavailCard',member,wk)+' title="'+esc(member)+' - UNAVAILABLE" style="cursor:pointer;min-width:'+COL_W2+'px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:'+ROW_H2+'px;padding:0;background:repeating-linear-gradient(45deg,#FFF7ED,#FFF7ED 3px,#FFE4C4 3px,#FFE4C4 6px)"></td>';
      }
      if(!(v>0))return'<td style="min-width:'+COL_W2+'px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:'+ROW_H2+'px;padding:0"></td>';
      var col=v>1.005?'#EF4444':v>=0.8?'#10B981':'#94A3B8';
      var opacity=Math.min(0.95,0.35+v*0.6);
      return'<td '+_oc('showGanttMemberBreakdown',member,wk)+' title="'+esc(member)+' - '+wk.replace(/_/g,' ')+': '+Math.round(v*100)+'%" style="cursor:pointer;min-width:'+COL_W2+'px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:'+ROW_H2+'px;padding:0;background:'+col+';opacity:'+opacity+'"></td>';

  var html2='<div class="sh" style="margin-bottom:0">'

function submitNote(){
  var text=(document.getElementById('note-text').value||'').trim();
  var owner=(document.getElementById('note-owner').value||'').trim();
  if(!text){document.getElementById('note-text').focus();return;}
  notes.push({id:mkid(),text:text,owner:owner,ts:new Date().toISOString()});
  saveState();renderNotes();
  _showToast('Note posted');
}

function deleteNote(id){
  _confirmModal(
    'Delete note?',
    'This note will be permanently removed and cannot be recovered.',
    'Delete',
    function(){
      notes=notes.filter(function(n){return n.id!==id;});
      saveState();renderNotes();
    }
  );
}

// ── ANALYTICS ────────────────────────────────────────────────
function renderAnalytics(){
  // ── compute insights ──
  // 1. Capacity utilisation per member (all time average)
  var memberUtil=teamMembers.map(function(mb){
    var vals=[];
    assignments.forEach(function(a){
      if(a.member!==mb)return;
      Object.keys(a.allocations).forEach(function(w){if(a.allocations[w]>0)vals.push(a.allocations[w]);});
    });
    var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;
    return{name:mb,avg:avg,weeks:vals.length};
  }).filter(function(x){return x.weeks>0;}).sort(function(a,b){return b.avg-a.avg;});

  // 2. Project duration (weeks with any allocation)
  var projDur=projects.map(function(p){
    var wkSet={};
    assignments.forEach(function(a){
      if(a.project!==p.name)return;
      Object.keys(a.allocations).forEach(function(w){if(a.allocations[w]>0)wkSet[w]=1;});
    });
    var wks=Object.keys(wkSet).length;
    var idxs=Object.keys(wkSet).map(function(w){return ALL_WEEKS.indexOf(w);}).filter(function(i){return i>=0;});
    var span=idxs.length?Math.max.apply(null,idxs)-Math.min.apply(null,idxs)+1:0;
    return{name:p.name,category:p.category,status:p.status,activeWeeks:wks,span:span};
  }).filter(function(x){return x.activeWeeks>0;}).sort(function(a,b){return b.activeWeeks-a.activeWeeks;});

  // 3. Category distribution — include ALL categories even if 0
  var natCount={};
  NATURES.forEach(function(n){natCount[n]=0;});
  projects.forEach(function(p){if(p.category)natCount[p.category]=(natCount[p.category]||0)+1;});
  var natTotal=projects.length||1;

  // 4. Status distribution
  var stCount={};
  STATUSES.forEach(function(s){stCount[s]=0;});
  projects.forEach(function(p){stCount[p.status]=(stCount[p.status]||0)+1;});

  // 5. Overload weeks per member
  var overWeeks=teamMembers.map(function(mb){
    var n=0;
    ALL_WEEKS.forEach(function(w){
      var tot=0;
      assignments.forEach(function(a){if(a.member===mb&&a.allocations[w]>0)tot+=a.allocations[w];});
      if(tot>1.005)n++;
    });
    return{name:mb,n:n};
  }).filter(function(x){return x.n>0;}).sort(function(a,b){return b.n-a.n;}).slice(0,8);

  // 6. Avg team utilisation per month (current year)
  var startIdx=(currentYear===2026)?2:0;
  var monthUtil=MONTH_DEFS.slice(startIdx).map(function(m){
    var wks=m.weeks.map(function(w){return currentYear+'_'+m.abbr+'_'+w;});
    var vals=[];
    teamMembers.forEach(function(mb){
      wks.forEach(function(wk){
        var tot=0;
        assignments.forEach(function(a){if(a.member===mb&&a.allocations[wk]>0)tot+=a.allocations[wk];});
        vals.push(tot);
      });
    });
    var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;
    return{name:m.name.slice(0,3),avg:avg};
  });

  // ── monthly utilisation bar chart ──
  var chartW=560,chartH=120,padL=28,padB=24,padT=14;
  var usableW=chartW-padL-8,usableH=chartH-padB-padT;
  var barW=Math.max(5,Math.floor(usableW/monthUtil.length)-4);
  var bars=monthUtil.map(function(d,i){
    var h=Math.max(1,Math.round(d.avg*usableH));
    var x=padL+i*(barW+4);
    var y=chartH-padB-h;
    var col=d.avg>1?'#EF4444':d.avg>=0.8?'#10B981':'#94A3B8';
    return'<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+h+'" rx="2" fill="'+col+'"/>'
      +'<text x="'+(x+barW/2)+'" y="'+(chartH-padB+13)+'" font-size="9" text-anchor="middle" fill="#94A3B8">'+d.name+'</text>'
      +(d.avg>=0.01?'<text x="'+(x+barW/2)+'" y="'+(y-3)+'" font-size="8" text-anchor="middle" fill="'+col+'">'+Math.round(d.avg*100)+'%</text>':'');
  }).join('');
  bars+='<line x1="'+padL+'" y1="'+(chartH-padB)+'" x2="'+(chartW-4)+'" y2="'+(chartH-padB)+'" stroke="#E4E8F0" stroke-width="1"/>';
  // annual avg line
  var annualAvg=monthUtil.length?monthUtil.reduce(function(s,d){return s+d.avg;},0)/monthUtil.length:0;
  if(annualAvg>0.01){
    var avgY=chartH-padB-Math.round(annualAvg*usableH);
    bars+='<line x1="'+padL+'" y1="'+avgY+'" x2="'+(chartW-4)+'" y2="'+avgY+'" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4 3" opacity=".7"/>'
      +'<text x="'+(chartW-6)+'" y="'+(avgY-3)+'" font-size="8" text-anchor="end" fill="#6366F1" opacity=".9">avg '+Math.round(annualAvg*100)+'%</text>';
  }
  var chartSvg='<svg viewBox="0 0 '+chartW+' '+chartH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">'+bars+'</svg>';

  // ── pie: HTML rows (no SVG clipping issues) ──
  var natCols={Product:'#0369A1',Transformation:'#7C3AED',Mixed:'#059669',Enterprise:'#C2410C',Agentic:'#0891B2',Unset:'#94A3B8'};
  var natKeys=Object.keys(natCount).sort(function(a,b){return natCount[b]-natCount[a];});  var pieTotalW=natTotal||1;
  var pieHtml=natKeys.map(function(k){
    var frac=natCount[k]/pieTotalW;
    var col=natCols[k]||'#94A3B8';
    var bg=k==='Product'?'#E0F2FE':k==='Transformation'?'#F3E8FF':k==='Mixed'?'#ECFDF5':k==='Enterprise'?'#FFF7ED':k==='Agentic'?'#ECFEFF':'#F1F5F9';
    return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
      +'<div style="width:12px;height:12px;border-radius:3px;background:'+col+';flex-shrink:0"></div>'
      +'<div style="font-size:12px;color:var(--text);flex:1;font-weight:500">'+esc(k)+'</div>'
      +'<div style="font-size:12px;font-weight:700;color:'+col+';min-width:18px;text-align:right">'+natCount[k]+'</div>'
      +'<div style="width:110px;height:10px;background:var(--bg);border-radius:5px;overflow:hidden;flex-shrink:0">'
      +'<div style="height:100%;width:'+Math.round(frac*100)+'%;background:'+col+';border-radius:5px"></div>'
      +'</div>'
      +'<div style="font-size:10px;color:var(--muted);width:30px;text-align:right;flex-shrink:0">'+Math.round(frac*100)+'%</div>'
      +'</div>';
  }).join('');

  // ── member capacity bars (HTML) ──
  var top12=memberUtil.slice(0,12);
  var maxAvg=top12.length?Math.max.apply(null,top12.map(function(d){return d.avg;})):1;
  var memHtml=top12.map(function(d){
    var pct2=Math.min(100,Math.round(d.avg/Math.max(maxAvg,0.01)*100));
    var col=d.avg>1?'#EF4444':d.avg>=0.8?'#10B981':'#94A3B8';
    var parts=d.name.trim().split(/\s+/);
    var label=parts[0]+(parts.length>1?' '+parts[parts.length-1][0]+'.':'');
    return'<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">'
      +'<div style="width:90px;font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0" title="'+esc(d.name)+'">'+esc(label)+'</div>'
      +'<div style="flex:1;height:12px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct2+'%;background:'+col+';border-radius:3px"></div></div>'
      +'<div style="width:34px;font-size:10px;font-weight:700;color:'+col+';text-align:right;flex-shrink:0">'+Math.round(d.avg*100)+'%</div>'
      +'</div>';
  }).join('');

  // ── overload bars (HTML) ──
  var maxOver=overWeeks.length?overWeeks[0].n:1;
  var ovBars=overWeeks.map(function(d){
    var pct3=Math.round(d.n/Math.max(maxOver,1)*100);
    return'<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">'
      +'<div style="width:80px;font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0" title="'+esc(d.name)+'">'+esc(d.name.split(' ')[0])+'</div>'
      +'<div style="flex:1;height:12px;background:#FEF2F2;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct3+'%;background:#EF4444;border-radius:3px"></div></div>'
      +'<div style="width:34px;font-size:10px;font-weight:700;color:#EF4444;text-align:right;flex-shrink:0">'+d.n+'w</div>'
      +'</div>';
  }).join('');

  // ── KPIs ──
  var totalUnassigned=assignments.filter(function(a){return !a.member;}).length;
  var avgDur=projDur.length?Math.round(projDur.reduce(function(s,x){return s+x.activeWeeks;},0)/projDur.length):0;
  var avgUtil=memberUtil.length?Math.round(memberUtil.reduce(function(s,x){return s+x.avg;},0)/memberUtil.length*100):0;

  var card=function(title,content){
    return'<div class="card" style="padding:12px 14px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">'+title+'</div>'
      +content+'</div>';
  };

  document.getElementById('view-analytics').innerHTML=
    '<div class="sh"><h2>Analytics</h2><span style="font-size:12px;color:var(--muted)">Team &amp; project intelligence overview</span></div>'
    +'<div class="stats-row" style="margin-bottom:14px">'
    +'<div class="stat"><div class="stat-lbl">Active projects</div><div class="stat-val">'+projects.filter(function(p){return p.status==='Confirmed';}).length+'</div><div class="stat-sub">confirmed</div></div>'
    +'<div class="stat"><div class="stat-lbl">Avg duration</div><div class="stat-val">'+avgDur+'</div><div class="stat-sub">active weeks</div></div>'
    +'<div class="stat"><div class="stat-lbl">Avg utilisation</div><div class="stat-val" style="color:'+(avgUtil>100?'#EF4444':avgUtil>=80?'#10B981':'#94A3B8')+'">'+avgUtil+'%</div><div class="stat-sub">across team</div></div>'
    +'<div class="stat"><div class="stat-lbl">Open roles</div><div class="stat-val" style="color:'+(totalUnassigned>0?'#EF4444':'#10B981')+'">'+totalUnassigned+'</div><div class="stat-sub">unassigned</div></div>'
    +'</div>'
    // Row 1: bar chart (spans 2) + category breakdown
    +'<div style="display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px;align-items:start">'
    +card('Team utilisation by month ('+currentYear+')',chartSvg)
    +card('Portfolio by category',pieHtml||'<div style="color:var(--muted);font-size:12px">No projects</div>')
    +'</div>'
    // Row 2: member capacity + overload
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:start">'
    +card('Avg capacity per member',memHtml||'<div style="color:var(--muted);font-size:12px">No data yet</div>')
    +card('Overload weeks &#9888;',overWeeks.length?ovBars:'<div style="text-align:center;color:#10B981;font-size:12px;padding:8px 0">&#10003; No overloads</div>')
    +'</div>'
    // Row 3: project table
    +'<div class="card" style="padding:0;margin-bottom:12px;overflow:hidden">'
    +'<div style="padding:10px 14px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Project duration ranking</div>'
    +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr>'
    +'<th style="text-align:left;padding:5px 12px;background:var(--s2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px">Project</th>'
    +'<th style="text-align:left;padding:5px 10px;background:var(--s2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px">Category</th>'
    +'<th style="text-align:left;padding:5px 10px;background:var(--s2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px">Status</th>'
    +'<th style="text-align:center;padding:5px 10px;background:var(--s2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--muted);font-weight:700;font-size:10px;white-space:nowrap">Wks</th>'
    +'<th style="padding:5px 10px;background:var(--s2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);min-width:90px"></th>'
    +'</tr></thead><tbody>'
    +projDur.slice(0,15).map(function(p){
      var maxWks=projDur[0].activeWeeks||1;
      var w=Math.round(p.activeWeeks/maxWks*100);
      var ncol={Product:'#0369A1',Transformation:'#7C3AED',Mixed:'#059669',Enterprise:'#C2410C',Agentic:'#0891B2'}[p.category]||'#94A3B8';
      var nbg={Product:'#E0F2FE',Transformation:'#F3E8FF',Mixed:'#ECFDF5',Enterprise:'#FFF7ED',Agentic:'#ECFEFF'}[p.category]||'#F1F5F9';
      return'<tr style="border-bottom:1px solid var(--border)">'
        +'<td style="padding:6px 12px;font-weight:500">'+esc(p.name)+'</td>'
        +'<td style="padding:6px 10px"><span style="font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;color:'+ncol+';background:'+nbg+'">'+esc(p.category||'—')+'</span></td>'
        +'<td style="padding:6px 10px">'+statusBadge(p.status)+'</td>'
        +'<td style="padding:6px 10px;text-align:center;font-weight:700;color:var(--text)">'+p.activeWeeks+'</td>'
        +'<td style="padding:6px 10px"><div style="height:5px;background:var(--bg);border-radius:3px"><div style="height:100%;width:'+w+'%;background:'+ncol+';border-radius:3px;opacity:.7"></div></div></td>'
        +'</tr>';
    }).join('')
    +'</tbody></table></div>';
}
function showUnavailCard(member, wkey){
  var meta=memberMeta[member]||{};

  var fromLabel=meta.unavailFrom?meta.unavailFrom.replace(/_/g,' '):'';
  var toLabel=meta.unavailTo?meta.unavailTo.replace(/_/g,' '):'';

    +'<div><div style="font-size:14px;font-weight:600">'+esc(member)+'</div>'
    +'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+esc(wLabel)+'</div></div>'
    +'<button class="btn-ghost" onclick="this.closest(\'.overlay\').remove()" style="font-size:16px">&#10005;</button>'
    +'</div>'
    +'<div class="modal-body">'
    +'<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:14px">'
    +'<span style="font-size:28px;line-height:1">&#9888;</span>'
    +'<div>'
    +'<div style="font-size:14px;font-weight:700;color:#C2410C">Unavailable</div>'
    +(meta.unavailReason?'<div style="font-size:12px;color:var(--muted);margin-top:2px">'+esc(meta.unavailReason)+'</div>':'')
    +'</div>'
    +'</div>'
    +(fromLabel?'<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px"><span style="color:var(--muted)">Period</span><span style="font-weight:600">'+esc(fromLabel)+' &rarr; '+esc(toLabel)+'</span></div>':'')

}

// ── FAQ ──────────────────────────────────────────────────────
function renderFaq(){
  var FAQS=[
    {
      section:'Getting started',
      items:[
        {q:'What is Medusa?',a:'Medusa is a capacity and staffing management tool for consulting and project-based teams. It lets you track project assignments, monitor team utilisation, identify overloads and gaps, and export capacity reports — all in one place.'},
        {q:'How do I log in?',a:'Use your credentials on the login screen. The default admin account is <strong>admin@medusa.app</strong> with password <strong>Medusa2026!</strong>. You can change both from the sign-in button menu at the top right.'},
        {q:'What does each section of the sidebar do?',a:'<strong>Dashboard</strong> — team KPIs, load alerts and unassigned flags for the selected month.<br><strong>By Project</strong> — all assignments grouped by project with weekly allocation cells.<br><strong>By Member</strong> — capacity chips per member per week, clickable for breakdown.<br><strong>Capacity Overview (Gantt)</strong> — visual timeline of all projects or members across the year.<br><strong>Analytics</strong> — utilisation charts, portfolio breakdown and overload ranking.<br><strong>Notes</strong> — shared team notes with owner and timestamp.<br><strong>Team Record</strong> — full project history per team member.<br><strong>Archive</strong> — deleted projects kept for reference.<br><strong>Export</strong> — downloadable capacity matrix as CSV or Excel.<br><strong>Settings</strong> — manage projects and team members.'}
      ]
    },
    {
      section:'Assignments',
      items:[
        {q:'How do I create a new assignment?',a:'Click the <strong>+</strong> floating button (bottom-right corner) and select <em>New assignment</em>. Fill in the project, team member (optional), role, allocation period (from/to week) and percentage. Click <em>Create assignment</em>. The allocation is immediately reflected across all views.'},
        {q:'How do I edit an existing allocation percentage?',a:'In <strong>By Project</strong>, click any week cell directly (the coloured chip or the + sign). A small input appears — type the new percentage (0–200) and press Enter or click away to save. Enter 0 to clear that week.'},
        {q:'Can I assign a role without a team member?',a:'Yes. Leave the <em>Team member</em> field as "Unassigned". The row will appear with a red flag (🚩) in By Project, and will be counted in the Unassigned Flags module on the Dashboard. You can assign a member later directly from the By Project table.'},
        {q:'How do I assign the same person to multiple projects?',a:'Create one assignment row per project. The same person can have multiple rows across different projects. Their total capacity per week is summed and shown in By Member — if it exceeds 100% a red OVERLOAD badge appears.'},
        {q:'How do I delete an assignment row?',a:'In <strong>By Project</strong>, click the ✕ button at the right end of any assignment row. A confirmation modal will appear before deletion.'},
        {q:'What does the allocation percentage mean?',a:'100% means full dedication to that project for that week. 50% means half a week. You can exceed 100% (up to 200%) if a person is working overtime across projects, though it will trigger an overload alert.'}
      ]
    },
    {
      section:'Projects',
      items:[
        {q:'How do I create a new project?',a:'Go to <strong>Settings</strong> → Projects section. Fill in the project name, category, status and optionally an owner and description, then click <em>+ Add</em>. The project immediately appears in By Project and in the assignment dropdowns.'},
        {q:'How do I edit a project name or description?',a:'In <strong>Settings → Projects</strong>, click directly on the project name or description cell — they are inline-editable. Click away or press Enter to save.'},
        {q:'How do I delete a project?',a:'In <strong>Settings → Projects</strong>, click the ✕ button on the project row. The project moves to the <strong>Archive</strong> along with a summary of members who worked on it. This action can be undone once via the Undo button.'},
        {q:'What are the project categories?',a:'<strong>Product</strong> — digital product development. <strong>Transformation</strong> — change management and organisational projects. <strong>Enterprise</strong> — large-scale enterprise engagements. <strong>Mixed</strong> — hybrid scope. <strong>Agentic</strong> — AI-driven or autonomous system projects. Each category has its own colour across all views.'},
        {q:'What do the project statuses mean?',a:'<strong>Confirmed</strong> (green) — active, contracted project. <strong>Probable</strong> (orange) — high likelihood, not yet signed. <strong>Paused</strong> (blue) — temporarily on hold. <strong>Cancelled</strong> (red) — project did not proceed. <strong>Finished</strong> (grey) — completed project.'},
        {q:'Can I recover a deleted project?',a:'Yes, immediately after deletion the <em>Undo</em> button appears in Settings. After navigating away it is no longer available. For permanent deletions see the Archive — projects there can be permanently removed by typing DELETE in the confirmation dialog.'}
      ]
    },
    {
      section:'Team members',
      items:[
        {q:'How do I add a team member?',a:'Go to <strong>Settings → Team members</strong>. Enter the full name and optionally a role, then click <em>+ Add</em>. The member is immediately available in all assignment dropdowns.'},
        {q:'How do I set someone as unavailable for a period?',a:'In <strong>Settings → Team members</strong>, change the Status dropdown to <em>Unavailable</em>. A modal will appear asking for the from/to week range and a reason (Vacation, Sick leave, Paternity/Maternity, etc.). During that range their cells appear hatched in orange across all views and clicking them shows the unavailability card.'},
        {q:'What is the difference between Unavailable and Inactive?',a:'<strong>Unavailable</strong> means temporarily away for a specific date range — their other weeks remain active. <strong>Inactive</strong> means they are no longer part of the team and they are greyed out across all views.'},
        {q:'How do I assign a role to a team member?',a:'In <strong>Settings → Team members</strong>, use the Role dropdown on their row. Available roles are: VP, Lead, Associated Lead, Senior Consultant, Consultant, Analyst, Intern. The role appears in By Member and in load alert details on the Dashboard.'}
      ]
    },
    {
      section:'Capacity & analytics',
      items:[
        {q:'How is capacity utilisation calculated?',a:'For each member and each week, Medusa sums all their allocation percentages across all projects. 100% = fully allocated. Values above 100% trigger an overload alert. The monthly average is the mean across all weeks of that month.'},
        {q:'What is the Team Record view?',a:'Select a team member to see their full project history — both current assignments and archived projects. Shows project name, status, role, number of weeks dedicated, and average allocation percentage.'},
        {q:'How do I read the Capacity Overview (Gantt)?',a:'Use the <em>Projects</em> toggle to see all projects as rows across the year, with coloured cells where there is activity. Use <em>Members</em> to see each person\'s load across the year. Click any coloured cell for a detailed breakdown. Hatched orange cells indicate unavailability.'},
        {q:'What does the Analytics tab show?',a:'Monthly utilisation bar chart with annual average line, portfolio distribution by category, member capacity ranking, overload weeks per member, and a project duration table ranked by active weeks.'}
      ]
    },
    {
      section:'Export & reports',
      items:[
        {q:'How do I export a capacity report?',a:'Go to <strong>Export</strong>. Select a From and To week range, then click <em>Generate</em>. A matrix is built with members as rows and projects as columns. Download as <strong>CSV</strong> (any spreadsheet app) or <strong>Excel (.xlsx)</strong> (with colour-coded chips).'},
        {q:'What does each colour in the export mean?',a:'<strong>Green chip</strong> — 80–100% utilisation. <strong>Grey chip</strong> — below 80%. <strong>Red chip</strong> — above 100% (overload). <strong>Dash</strong> — no allocation in that period.'},
        {q:'Can I filter the export by project or member?',a:'The export always shows all members with any allocation in the selected range. To focus on a subset, use the By Project filters and copy the relevant rows manually, or narrow the date range.'}
      ]
    },
    {
      section:'Data & navigation',
      items:[
        {q:'Where is the data stored?',a:'All data is stored in your browser\'s localStorage. This means it persists between sessions on the same browser and device, but is not shared across devices or browsers. A future version will connect to a cloud database.'},
        {q:'How do I navigate between months?',a:'Use the month tabs that appear at the top of views like Dashboard, By Project and By Member. Click any month name to switch the view. The Gantt and Analytics views span the full year.'},
        {q:'Can I use Medusa on mobile?',a:'Medusa is optimised for desktop. On mobile some table views may require horizontal scrolling. The FAB button and modal forms work on touch devices.'},
        {q:'How do I use the + floating button?',a:'The <strong>+</strong> button in the bottom-right corner opens three quick actions: <em>New assignment</em> (opens the full assignment form), <em>New project</em> (goes to Settings and focuses the project name field), <em>New member</em> (goes to Settings and focuses the member name field). It closes automatically when you navigate.'}
      ]
    }
  ];

  var accId=0;
  var sectionsHtml=FAQS.map(function(sec){
    var items=sec.items.map(function(item){
      var id='faq-'+accId++;
      return'<div style="border-bottom:1px solid var(--border)">'
        +'<button onclick="toggleFaqItem(\''+id+'\')" style="width:100%;text-align:left;padding:14px 18px;background:none;border:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px">'
        +'<span>'+item.q+'</span>'
        +'<span id="'+id+'-arrow" style="font-size:11px;color:var(--muted);flex-shrink:0;transition:transform .2s">&#9660;</span>'
        +'</button>'
        +'<div id="'+id+'" style="display:none;padding:0 18px 16px;font-size:13px;color:var(--muted);line-height:1.7">'+item.a+'</div>'
        +'</div>';
    }).join('');
    return'<div class="card" style="padding:0;margin-bottom:16px;overflow:hidden">'
      +'<div style="padding:12px 18px 10px;background:var(--s2);border-bottom:1px solid var(--border)">'
      +'<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent)">'+sec.section+'</span>'
      +'</div>'
      +items
      +'</div>';
  }).join('');

  document.getElementById('view-faq').innerHTML=
    '<div class="sh"><h2>Help &amp; FAQ</h2><span style="font-size:12px;color:var(--muted)">How to get the most out of Medusa</span></div>'
    +'<div style="max-width:780px">'
    +sectionsHtml
    +'</div>';
}

function toggleFaqItem(id){
  var el=document.getElementById(id);
  var arrow=document.getElementById(id+'-arrow');
  if(!el)return;
  var open=el.style.display==='block';
  el.style.display=open?'none':'block';
  if(arrow)arrow.style.transform=open?'':'rotate(180deg)';
}
function toggleFab(){
  var menu=document.getElementById('fab-menu');
  var btn=document.getElementById('fab-btn');
  var open=menu.style.display==='flex';
  menu.style.display=open?'none':'flex';
  btn.style.transform=open?'':'rotate(45deg)';
}
function closeFab(){
  var menu=document.getElementById('fab-menu');
  var btn=document.getElementById('fab-btn');
  if(menu){menu.style.display='none';}
  if(btn){btn.style.transform='';}
}

// ── TEAM RECORD ──────────────────────────────────────────────
var teamRecordMember='';
function renderTeamRecord(){
  var sel=teamRecordMember||teamMembers[0]||'';
  var memOpts='<option value="">-- Select member --</option>'+teamMembers.map(function(m){return'<option value="'+esc(m)+'"'+(sel===m?' selected':'')+'>'+esc(m)+'</option>';}).join('');
  // Gather all projects (active + archived) this member worked on
  var records=[];
  // Active projects from assignments
  var projSeen={};
  assignments.forEach(function(a){
    if(a.member!==sel)return;
    if(!projSeen[a.project])projSeen[a.project]={name:a.project,role:a.role||'',weeks:0,totalPct:0,wkCount:0,status:'',source:'active'};
    var proj=projects.filter(function(p){return p.name===a.project;})[0]||{};
    projSeen[a.project].status=a.status||proj.status||'';
    projSeen[a.project].role=projSeen[a.project].role||a.role||'';
    Object.keys(a.allocations).forEach(function(w){
      if(a.allocations[w]>0){
        projSeen[a.project].weeks++;
        projSeen[a.project].totalPct+=a.allocations[w];
        projSeen[a.project].wkCount++;
      }
    });
  });
  Object.keys(projSeen).forEach(function(k){records.push(projSeen[k]);});
  // Archived projects
  archivedProjects.forEach(function(ap){
    if(!ap.members)return;
    ap.members.forEach(function(m){
      if(m.name!==sel)return;
      records.push({name:ap.name,role:'',weeks:m.weeks||0,totalPct:null,wkCount:m.weeks||0,status:ap.status||'',source:'archived',archivedOn:ap.archivedOn||''});
    });
  });
  records.sort(function(a,b){
    // active first, then by weeks desc
    if(a.source!==b.source)return a.source==='active'?-1:1;
    return b.weeks-a.weeks;
  });
  var totalWeeks=records.reduce(function(s,r){return s+r.weeks;},0);
  var activeCount=records.filter(function(r){return r.source==='active';}).length;
  var archivedCount=records.filter(function(r){return r.source==='archived';}).length;
  var rows=records.length===0
    ?'<tr><td colspan="5" style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No project history found for this member.</td></tr>'
    :records.map(function(r){
      var avgPct=r.wkCount>0&&r.totalPct!==null?Math.round(r.totalPct/r.wkCount*100):null;
      return'<tr style="border-bottom:1px solid var(--border)">'
        +'<td style="padding:8px 12px;font-weight:500;font-size:13px">'+esc(r.name)
        +(r.source==='archived'?'<span style="margin-left:6px;font-size:9px;background:#F1F5F9;color:#64748B;padding:1px 5px;border-radius:10px;font-weight:700">ARCHIVED</span>':'')
        +'</td>'
        +'<td style="padding:8px 10px">'+statusBadge(r.status||'')+'</td>'
        +'<td style="padding:8px 10px;font-size:12px;color:var(--muted)">'+esc(r.role||'—')+'</td>'
        +'<td style="padding:8px 10px;text-align:center;font-weight:700">'+r.weeks+'</td>'
        +'<td style="padding:8px 10px;text-align:center;font-weight:700;color:'+(avgPct!==null?(avgPct>100?'#EF4444':avgPct>=80?'#10B981':'#94A3B8'):'#94A3B8')+'">'+(avgPct!==null?avgPct+'%':'—')+'</td>'
        +'</tr>';
    }).join('');
  document.getElementById('view-teamrecord').innerHTML=
    '<div class="sh"><h2>Team Record</h2><span style="font-size:12px;color:var(--muted)">Project history by team member</span></div>'
    +'<div class="card" style="padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px">'
    +'<label style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">Team member</label>'
    +'<select onchange="teamRecordMember=this.value;renderTeamRecord()" style="font-family:inherit;font-size:14px;padding:7px 12px;border:1.5px solid var(--border2);border-radius:var(--r2);background:var(--surface);color:var(--text);min-width:220px">'+memOpts+'</select>'
    +(sel?'<span style="font-size:12px;color:var(--muted)">'+totalWeeks+' total weeks &middot; '+activeCount+' active project'+(activeCount!==1?'s':'')+(archivedCount?' &middot; '+archivedCount+' archived':'')+'</span>':'')
    +'</div>'
    +(sel?'<div class="card" style="padding:0;overflow:hidden">'
    +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr style="background:var(--s2)">'
    +'<th style="text-align:left;padding:7px 12px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Project</th>'
    +'<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Status</th>'
    +'<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Role</th>'
    +'<th style="text-align:center;padding:7px 10px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Weeks</th>'
    +'<th style="text-align:center;padding:7px 10px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Avg %</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
    :'<div style="padding:48px 0;text-align:center;color:var(--muted);font-size:13px">Select a team member to view their project history.</div>');
}

function setView(v){currentView=v;closeFab();render();}
function setMonth(m){currentMonth=m;render();}

function render(){
  renderSidebar();renderTopbar();
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('on');});
  var t=document.getElementById('view-'+currentView);if(t)t.classList.add('on');
  if(currentView==='dashboard')renderDashboard();
  else if(currentView==='byproject')renderByProject();
  else if(currentView==='bymember')renderByMember();
  else if(currentView==='gantt')renderGantt();
  else if(currentView==='analytics')renderAnalytics();
  else if(currentView==='notes')renderNotes();
  else if(currentView==='teamrecord')renderTeamRecord();
  else if(currentView==='faq')renderFaq();
  else if(currentView==='master')renderMaster();
  else if(currentView==='archive')renderArchive();
  else if(currentView==='export')renderExport();
}

// ── BOOT ─────────────────────────────────────────────────────
if(typeof isLoggedIn==='function'&&isLoggedIn()){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-root').style.display='flex';
  render();
}
</script>
</body>
</html>
