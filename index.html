function buildMedusaContext(){
  var yr=currentYear;
  var lines=[];
  lines.push('=== MEDUSA CAPACITY PLATFORM — DATA SNAPSHOT ===');
  lines.push('Date context: '+new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'}));
  lines.push('\n--- TEAM MEMBERS ('+teamMembers.length+') ---');
  teamMembers.forEach(function(mb){
    var meta=memberMeta[mb]||{};
    var status=meta.active===false?'Inactive':'Active';
    var periods=getUnavailPeriods(mb);
    var unavailStr=periods.length?' | Unavailable: '+periods.map(function(p){return p.reason+' '+p.from.replace(/_/g,' ')+' to '+p.to.replace(/_/g,' ');}).join(', '):'';
    lines.push('• '+mb+' | '+esc(meta.role||'No role')+' | Team: '+(meta.team||'Unassigned')+' | '+status+unavailStr);
  });
  lines.push('\n--- PROJECTS ('+projects.length+') ---');
  projects.forEach(function(p){
    var budget=p.budget!=null?' | Budget: €'+p.budget:'';
    lines.push('• '+p.name+' | '+p.status+' | '+( p.category||'No category')+' | Owner: '+(p.owner||'—')+(p.startDate?' | '+p.startDate+' → '+(p.endDate||'?'):'')+budget+(p.desc?' | "'+p.desc+'"':''));
  });
  lines.push('\n--- ASSIGNMENTS ---');
  assignments.forEach(function(a){
    if(!a.member)return;
    var wks=Object.keys(a.allocations).filter(function(w){return a.allocations[w]>0;});
    if(!wks.length)return;
    wks.sort();
    var first=wks[0].replace(/_/g,' '),last=wks[wks.length-1].replace(/_/g,' ');
    var avgPct=Math.round(wks.reduce(function(s,w){return s+a.allocations[w];},0)/wks.length*100);
    lines.push('• '+a.member+' → '+a.project+' | '+avgPct+'% avg | '+first+' to '+last+(a.role?' | '+a.role:''));
  });
  lines.push('\n--- CAPACITY THIS MONTH ('+currentMonth+' '+yr+') ---');
  var cap=computeCap();
  var m=MONTH_DEFS.find(function(md){return md.name===currentMonth;})||MONTH_DEFS[new Date().getMonth()];
  if(m){
    var wk=m.weeks.map(function(w){return yr+'_'+m.abbr+'_'+w;});
    teamMembers.forEach(function(mb){
      var total=wk.reduce(function(s,w){return s+(cap[mb]&&cap[mb][w]||0);},0)/wk.length;
      if(total>0)lines.push('• '+mb+': '+Math.round(total*100)+'% avg this month'+(total>1?' ⚠ OVERLOADED':''));
    });
  }
  return lines.join('\n');
}

var GEMINI_SYSTEM = 'You are an AI assistant embedded inside Medusa, a capacity and staffing management platform. You have access to the team\'s current data. Answer questions clearly and concisely in the same language the user writes in (Spanish or English). When listing people or projects, use bullet points. Be specific with names, dates and percentages from the data. If you don\'t find the answer in the data, say so honestly.';

async function askGemini(question){
  if(!geminiKey)return'⚙ Please add your Gemini API key in Settings → AI Assistant to enable the assistant.';
  var context=buildMedusaContext();
  var fullPrompt=GEMINI_SYSTEM+'\n\n'+context+'\n\n---\nUser question: '+question;
  try{
    var res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+geminiKey,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:fullPrompt}]}],generationConfig:{temperature:0.3,maxOutputTokens:1024}})
    });
    if(!res.ok){var err=await res.json();return'API error: '+(err.error&&err.error.message||res.status);}
    var data=await res.json();
    return(data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||'No response from model.';
  }catch(e){return'Network error: '+e.message;}
}

    +'<div style="border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:flex-end">'
    +'<textarea id="chat-input" placeholder="Ask about your team, projects or capacity..." rows="2" style="flex:1;resize:none;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:13px;background:var(--surface);color:var(--text);line-height:1.5" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChatMessage();}"></textarea>'
    +'<button onclick="sendChatMessage()" style="padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">Send ↑</button>'
    +'</div></div>';

  // Scroll to bottom
  setTimeout(function(){var el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;},50);
}

async function sendChatMessage(){
  var inp=document.getElementById('chat-input');
  if(!inp)return;
  var text=inp.value.trim();
  if(!text)return;
  inp.value='';
  chatHistory.push({role:'user',text:text});
  renderAssistant();
  // Show typing indicator
  var msgs=document.getElementById('chat-messages');
  if(msgs){
    var typing=document.createElement('div');
    typing.id='chat-typing';
    typing.style.cssText='display:flex;gap:10px;margin-bottom:14px';
    typing.innerHTML='<div style="width:28px;height:28px;border-radius:50%;background:#10B981;display:flex;align-items:center;justify-content:center;font-size:13px">🤖</div>'
      +'<div style="padding:10px 14px;border-radius:2px 12px 12px 12px;background:var(--s2);border:1px solid var(--border);font-size:13px;color:var(--muted)">Thinking…</div>';
    msgs.appendChild(typing);
    msgs.scrollTop=msgs.scrollHeight;
  }
  var reply=await askGemini(text);
  var t=document.getElementById('chat-typing');if(t)t.remove();
  chatHistory.push({role:'model',text:reply});
  renderAssistant();
}

function renderPipeline(){
  var probable=projects.filter(function(p){return p.status==='Probable';});
  var cap=computeCap();
  var NCOL={Product:'#0369A1',Transformation:'#7C3AED',Mixed:'#059669',Enterprise:'#C2410C',Agentic:'#0891B2'};

  var rows=probable.map(function(p){
    var pAssign=assignments.filter(function(a){return a.project===p.name&&a.member;});
    var members=pAssign.map(function(a){return a.member;}).filter(function(v,i,arr){return arr.indexOf(v)===i;});

    var now=new Date();
    var futureWks=ALL_WEEKS.filter(function(w){
      var m=w.split('_');if(m.length<3)return false;
      var abbr=m[1];var yr=parseInt(m[0]);
      var mi=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'].indexOf(abbr);
      return yr>now.getFullYear()||(yr===now.getFullYear()&&mi>=now.getMonth());
    });

    var memberRows=pAssign.map(function(a){
      if(!a.member)return'';
      var futureVals=futureWks.map(function(w){return a.allocations[w]||0;}).filter(function(v){return v>0;});
      var avgPct=futureVals.length?Math.round(futureVals.reduce(function(x,y){return x+y;},0)/futureVals.length*100):0;
      var totalCap=futureWks.slice(0,4).reduce(function(sum,w){return sum+(cap[a.member]&&cap[a.member][w]||0);},0)/Math.min(4,futureWks.length||1);
      var available=Math.max(0,Math.round((1-totalCap)*100));
      var col=available>=50?'#059669':available>=20?'#C2410C':'#EF4444';
      return'<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px dashed var(--border)">'
        +'<span style="font-size:12px;flex:1;color:var(--text)">'+esc(a.member)+'</span>'
        +(a.role?'<span style="font-size:10px;color:var(--muted)">'+esc(a.role)+'</span>':'')
        +'<span style="font-size:11px;font-weight:600;color:var(--accent)">'+avgPct+'% alloc</span>'
        +'<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;background:'+(available>=50?'#ECFDF5':available>=20?'#FFF7ED':'#FEF2F2')+';color:'+col+'">'+available+'% free</span>'
        +'</div>';
    }).join('');

    var ncol=NCOL[p.category]||'#64748B';
    return'<div class="card" style="padding:0;margin-bottom:12px;overflow:hidden">'
      +'<div style="padding:12px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">'
      +'<span style="width:10px;height:10px;border-radius:50%;background:'+ncol+';flex-shrink:0"></span>'
      +'<div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--text)">'+esc(p.name)+'</div>'
      +(p.desc?'<div style="font-size:11px;color:var(--muted)">'+esc(p.desc)+'</div>':'')+'</div>'
      +(p.startDate||p.endDate?'<span style="font-size:11px;color:var(--muted);white-space:nowrap">'+(p.startDate||'')+(p.startDate&&p.endDate?' → ':'')+(p.endDate||'')+'</span>':'')
      +(p.owner?'<span style="font-size:11px;color:var(--muted)">👤 '+esc(p.owner)+'</span>':'')
      +'</div>'
      +(memberRows
        ?'<div style="padding:8px 16px">'+memberRows+'</div>'
        :'<div style="padding:10px 16px;font-size:12px;color:var(--muted);font-style:italic">No team assigned yet — add roles via New Assignment</div>')
      +'</div>';
  });

  var noTeamWarning=probable.length===0
    ?'<div style="padding:48px 0;text-align:center;color:var(--muted);font-size:13px">No projects with Probable status. Set a project status to <em>Probable</em> in Settings or By Project to see it here.</div>'
    :'';

  document.getElementById('view-pipeline').innerHTML=
    '<div class="sh"><h2>Pipeline &amp; Forecast</h2>'
    +'<span style="font-size:12px;color:var(--muted)">'+probable.length+' probable project'+(probable.length!==1?'s':'')+' &middot; upcoming capacity view</span>'
    +'</div>'
    +'<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#92400E">'
    +'&#9888; This view shows <strong>Probable</strong> projects only. <em>Avg allocation</em> is the mean % already planned for future weeks. <em>Free</em> is the estimated available capacity in the next 4 weeks based on current assignments.'
    +'</div>'
    +(noTeamWarning||rows.join(''));
}

function setView(v){currentView=v;closeFab();render();}
function setMonth(m){currentMonth=m;render();}

function render(){
  var VISITOR_VIEWS=['gantt'];
  if(window.currentRole==='visitor'&&VISITOR_VIEWS.indexOf(currentView)===-1){currentView='gantt';}
  renderSidebar();renderTopbar();
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('on');});
  var t=document.getElementById('view-'+currentView);if(t)t.classList.add('on');
  if(currentView==='dashboard')renderDashboard();
  else if(currentView==='byproject')renderByProject();
  else if(currentView==='bymember')renderByMember();
  else if(currentView==='gantt')renderGantt();
  else if(currentView==='analytics')renderAnalytics();
  else if(currentView==='notes')renderNotes();
  else if(currentView==='teamrecord')renderTeamRecord();
  else if(currentView==='faq')renderFaq();
  else if(currentView==='synclog')renderSyncLog();
  else if(currentView==='pipeline')renderPipeline();
  else if(currentView==='assistant')renderAssistant();
  else if(currentView==='master')renderMaster();
  else if(currentView==='archive')renderArchive();
  else if(currentView==='export')renderExport();
}

if(typeof isLoggedIn==='function'&&isLoggedIn()){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-root').style.display='flex';
  render();
}
</script>
