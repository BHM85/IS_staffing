<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medusa — Capacity Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F0F2F8;--surface:#fff;--s2:#F7F8FC;--border:#E4E8F0;--border2:#CBD5E1;--text:#1E293B;--muted:#64748B;--subtle:#94A3B8;--accent:#4F46E5;--acc-l:#EEF2FF;--acc-h:#4338CA;--sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);--r:10px;--r2:6px;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;min-height:100vh}
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 48px rgba(79,70,229,.12);width:100%;max-width:380px;padding:44px 40px 36px;display:flex;flex-direction:column;align-items:center}
.login-err{background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:9px 14px;font-size:12.5px;color:#991B1B;width:100%;text-align:center}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:10}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sb-nav{flex:1;padding:12px 8px}
.nv{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r2);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--muted);transition:.15s;margin-bottom:2px;user-select:none}
.nv:hover{background:var(--bg);color:var(--text)}
.nv.on{background:var(--acc-l);color:var(--accent)}
.nv-badge{margin-left:auto;background:#FEF2F2;color:#EF4444;font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px}
.sb-foot{padding:10px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--subtle);line-height:1.7}
.sb-actions{padding:8px 12px 14px;display:flex;flex-direction:column;gap:2px}
.main{margin-left:230px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px}
.content{padding:24px 28px}
.view{display:none}
.view.on{display:block}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:.15s;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:var(--acc-h)}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.btn-s:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:transparent;color:var(--muted);border:none;font-family:inherit;cursor:pointer;font-size:12px;padding:3px 7px;border-radius:4px}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-del{color:#EF4444!important}
.mtabs{display:flex;gap:4px;background:var(--surface);padding:3px;border-radius:var(--r2);border:1px solid var(--border);margin-bottom:18px;width:fit-content;flex-wrap:wrap}
.mtab{padding:5px 12px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:.15s;user-select:none}
.mtab:hover{color:var(--text)}
.mtab.on{background:var(--accent);color:#fff}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh h2{font-size:14.5px;font-weight:600}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--s2);color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left}
thead th.wh{background:#F1F4FF;color:var(--accent);text-align:center;min-width:52px;font-size:11px;padding:8px 4px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFBFE}
td{padding:8px 12px;vertical-align:middle}
td.wc{text-align:center;padding:4px;min-width:52px;vertical-align:middle}
.bp-table tr{height:38px}
.ac{display:inline-flex;align-items:center;justify-content:center;width:42px;height:26px;border-radius:4px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.1s}
.ac-e{color:var(--subtle)}
.ac-e:hover{background:var(--bg);border-color:var(--border)}
.ac-l{background:#ECFDF5;color:#059669;border-color:#6EE7B7}
.ac-l:hover{background:#D1FAE5}
.ac-m{background:#F1F5F9;color:#64748B;border-color:var(--border2)}
.ac-m:hover{background:#E2E8F0}
.ac-h{background:#FEF2F2;color:#EF4444;border-color:#FECACA}
.ac-h:hover{background:#FECACA}
.ac-input{width:42px;height:26px;border:1.5px solid var(--accent);border-radius:4px;font-size:11.5px;font-weight:600;text-align:center;outline:none;background:#fff;font-family:inherit;color:var(--accent)}
.cc{display:inline-flex;align-items:center;justify-content:center;width:48px;height:26px;border-radius:4px;font-size:12px;font-weight:700}
.cc-ok{background:#ECFDF5;color:#059669}
.cc-md{background:#F1F5F9;color:#64748B}
.cc-ov{background:#FEF2F2;color:#EF4444}
.cc-zz{background:var(--bg);color:var(--subtle);font-weight:400}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-co{background:#ECFDF5;color:#059669}
.b-pr{background:#FFF7ED;color:#C2410C}
.b-pa{background:var(--bg);color:var(--muted)}
.b-fi{background:#F1F5F9;color:var(--subtle)}
.nb{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
.n-pr{background:#E0F2FE;color:#0369A1}
.n-tr{background:#F3E8FF;color:#7C3AED}
.n-mi{background:#ECFDF5;color:#059669}
.n-en{background:#FFF7ED;color:#C2410C}
.isel{border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:inherit;padding:0;outline:none}
.stats-row{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;flex:1;min-width:140px}
.stat-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11.5px;color:var(--muted);margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pb-wrap{flex:1;background:#F1F5F9;border-radius:4px;height:7px;overflow:hidden}
.pb{height:100%;border-radius:4px;transition:width .4s}
.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.ld{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted)}
.ld-dot{width:10px;height:10px;border-radius:2px}
.alert-err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:13px;color:#991B1B;display:flex;align-items:center;gap:8px}
.add-bar{display:flex;gap:8px;padding:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:stretch}
.add-bar .fi{height:38px;box-sizing:border-box}
.cnt-badge{background:var(--acc-l);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:700}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--border2);border-radius:var(--r2);font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;background:var(--surface)}
.fi:focus{border-color:var(--accent)}
.fi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.18);width:500px;max-width:90vw;max-height:92vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:600}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.exp-wrap{overflow:auto;max-height:72vh}
.exp-table{border-collapse:collapse;font-size:12px;white-space:nowrap}
.exp-table th,.exp-table td{border:1px solid var(--border);padding:0}
.exp-table thead th{background:var(--s2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);position:sticky;top:0;z-index:2}
.exp-table thead th.proj-h{writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;padding:10px 6px;max-width:36px;min-width:36px;font-size:10px;font-weight:600;color:var(--text)}
.exp-table th.sticky-corner{position:sticky;left:0;z-index:3;background:var(--s2);min-width:150px;text-align:left;padding:6px 12px}
.exp-table td.member-cell{font-weight:500;font-size:12px;padding:6px 12px;background:var(--s2);position:sticky;left:0;z-index:1;border-right:2px solid var(--border2);min-width:150px}
.exp-chip{display:flex;align-items:center;justify-content:center;width:100%;height:32px;font-size:11px;font-weight:700}
.exp-chip-ok{background:#ECFDF5;color:#059669}
.exp-chip-md{background:#F1F5F9;color:#64748B}
.exp-chip-ov{background:#FEF2F2;color:#EF4444}
.exp-chip-zz{background:transparent;color:var(--subtle)}
.exp-total{background:#F8FAFF!important;font-weight:700;color:var(--accent)}
.login-dots{display:flex;gap:5px;margin-top:24px;margin-bottom:32px}
.login-dot{width:5px;height:5px;border-radius:50%;background:var(--border2)}
.login-dot.on{background:var(--accent)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
body.visitor-mode .ac{display:none!important}
body.visitor-mode .isel{pointer-events:none;opacity:.7}
body.visitor-mode button.btn-ghost.btn-del{display:none!important}
body.visitor-mode [onclick^="startEdit"]{pointer-events:none!important;cursor:default!important}
body.visitor-mode [onclick^="openModal"]{display:none!important}
body.visitor-mode [onclick^="delAsgn"]{display:none!important}
body.visitor-mode [onclick^="updField"]{pointer-events:none!important}
body.visitor-mode [onclick^="updFieldStatus"]{pointer-events:none!important}
body.visitor-mode .add-bar{display:none!important}
body.visitor-mode .cc{pointer-events:auto!important;display:inline-flex!important}
.visitor-badge{display:none}
body.visitor-mode .visitor-badge{display:inline-flex}
.gantt-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);border:1px solid var(--border);border-radius:var(--r)}
.gantt-wrap table{border-collapse:collapse;min-width:100%}
.gantt-wrap thead th{position:sticky;top:0;z-index:3;background:var(--s2)}
.gantt-wrap thead tr:nth-child(2) th{top:31px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="14.5" stroke="#4F46E5" stroke-width="1" stroke-dasharray="2.5 2.5" opacity=".4"/>
      <circle cx="16" cy="16" r="9" stroke="#4F46E5" stroke-width="1" opacity=".25"/>
      <line x1="16" y1="2" x2="16" y2="7" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="16" y1="25" x2="16" y2="30" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="2" y1="16" x2="7" y2="16" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="25" y1="16" x2="30" y2="16" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="5.1" y1="5.1" x2="8.6" y2="8.6" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity=".6"/>
      <line x1="23.4" y1="23.4" x2="26.9" y2="26.9" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity=".6"/>
      <line x1="26.9" y1="5.1" x2="23.4" y2="8.6" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity=".6"/>
      <line x1="8.6" y1="23.4" x2="5.1" y2="26.9" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity=".6"/>
      <polygon points="16,10.5 20.5,13 20.5,19 16,21.5 11.5,19 11.5,13" stroke="#4F46E5" stroke-width="1.2" fill="#EEF2FF" opacity=".9"/>
      <circle cx="16" cy="16" r="2" fill="#4F46E5"/>
      <circle cx="16" cy="7" r=".9" fill="#4F46E5" opacity=".5"/>
      <circle cx="16" cy="25" r=".9" fill="#4F46E5" opacity=".5"/>
      <circle cx="7" cy="16" r=".9" fill="#4F46E5" opacity=".5"/>
      <circle cx="25" cy="16" r=".9" fill="#4F46E5" opacity=".5"/>
    </svg>
    <div style="font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-top:10px;line-height:1">Medusa</div>
    <div style="font-size:11px;color:var(--subtle);letter-spacing:.7px;text-transform:uppercase;margin-top:4px">Capacity Platform</div>
    <div class="login-dots">
      <div class="login-dot on"></div>
      <div class="login-dot on"></div>
      <div class="login-dot"></div>
    </div>
    <div style="width:100%;display:flex;flex-direction:column;gap:12px">
      <div>
        <label class="fl">Email</label>
        <input class="fi" id="login-email" type="email" placeholder="your@company.com" autocomplete="username"
          onkeydown="if(event.key==='Enter')document.getElementById('login-pwd').focus()">
      </div>
      <div>
        <label class="fl">Password</label>
        <div style="position:relative">
          <input class="fi" id="login-pwd" type="password" placeholder="Password"
            autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"
            style="padding-right:42px">
          <button onclick="togglePwd()" tabindex="-1" id="pwd-eye"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--subtle);font-size:13px;padding:4px">&#128065;</button>
        </div>
      </div>
      <div id="login-err" style="display:none"></div>
      <button class="btn btn-p" onclick="doLogin()"
        style="width:100%;justify-content:center;padding:11px;font-size:14px;margin-top:4px;border-radius:8px">Sign in</button>
    </div>
    <div style="margin-top:20px;font-size:11px;color:var(--subtle);text-align:center;line-height:1.8">
      Medusa &mdash; internal use only<br>
      <span style="color:var(--border2)">Product created by <strong style="color:var(--muted)">Impact Studios</strong></span>
    </div>
  </div>
</div>

<!-- AUTH SCRIPT (independent block, runs before main app) -->
<script>
(function(){
  var AK='medusa_auth_hash', SK='medusa_session';
  function qh(s){
    var h1=5381,h2=52711,i=s.length;
    while(i--){var c=s.charCodeAt(i);h1=(h1*33)^c;h2=(h2*33)^c;}
    return (h1>>>0).toString(36)+'_'+(h2>>>0).toString(36);
  }
  var VISITOR_HASH=qh('visitor@medusa.app::Visitor2026!');
  window.currentRole='admin'; // 'admin' | 'visitor'
  window.isLoggedIn=function(){return sessionStorage.getItem(SK)==='1';};
  window.doLogin=function(){
    var em=(document.getElementById('login-email').value||'').trim().toLowerCase();
    var pw=document.getElementById('login-pwd').value||'';
    document.getElementById('login-err').style.display='none';
    if(!em||!pw){return _le('Please enter your email and password.');}
    var h=qh(em+'::'+pw),stored=localStorage.getItem(AK);
    if(h===VISITOR_HASH){window.currentRole='visitor';sessionStorage.setItem('medusa_role','visitor');_ok();return;}
    if(h===qh('admin@medusa.app::Medusa2026!')){window.currentRole='admin';sessionStorage.setItem('medusa_role','admin');_ok();return;}
    if(stored&&h===stored){window.currentRole='admin';sessionStorage.setItem('medusa_role','admin');_ok();}
    else{_le('Incorrect email or password.');}
  };
  function _ok(){
    sessionStorage.setItem(SK,'1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-root').style.display='flex';
    if(typeof render==='function')render();
    if(typeof loadFromSupabase==='function'){
      loadFromSupabase().then(function(loaded){
        if(loaded){saveState();if(typeof render==='function')render();}
      });
    }
  }
  function _le(msg){
    var el=document.getElementById('login-err');
    el.className='login-err';el.textContent=msg;el.style.display='block';
    document.getElementById('login-pwd').value='';
    setTimeout(function(){document.getElementById('login-pwd').focus();},0);
  }
  window.togglePwd=function(){
    var inp=document.getElementById('login-pwd'),eye=document.getElementById('pwd-eye');
    if(inp.type==='password'){inp.type='text';eye.style.color='var(--accent)';}
    else{inp.type='password';eye.style.color='var(--subtle)';}
  };
  window.openChangePwd=function(){
    var ov=document.createElement('div');ov.className='overlay';
    ov.innerHTML='<div class="modal" style="max-width:420px"><div class="modal-head"><h3>Change credentials</h3><button class="btn-ghost" onclick="this.closest(\'.overlay\').remove()" style="font-size:16px">&#10005;</button></div><div class="modal-body" style="display:flex;flex-direction:column;gap:12px"><div><label class="fl">Login email</label><input class="fi" id="cp-email" type="email"></div><div><label class="fl">New password (min 8)</label><input class="fi" id="cp-pwd1" type="password"></div><div><label class="fl">Confirm password</label><input class="fi" id="cp-pwd2" type="password"></div><div id="cp-err" style="display:none"></div></div><div class="modal-foot"><button class="btn btn-s" onclick="this.closest(\'.overlay\').remove()">Cancel</button><button class="btn btn-p" onclick="saveNewPwd()">Save</button></div></div>';
    ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
    document.body.appendChild(ov);
  };
  window.saveNewPwd=function(){
    var em=(document.getElementById('cp-email').value||'').trim().toLowerCase();
    var p1=document.getElementById('cp-pwd1').value;
    var p2=document.getElementById('cp-pwd2').value;
    var err=document.getElementById('cp-err');
    function ce(m){err.className='login-err';err.textContent=m;err.style.display='block';}
    if(!em||!p1)return ce('Email and password are required.');
    if(8>p1.length)return ce('Password must be at least 8 characters.');
    if(p1!==p2)return ce('Passwords do not match.');
    localStorage.setItem(AK,qh(em+'::'+p1));
    document.querySelector('.overlay').remove();
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1E293B;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999';
    t.textContent='Credentials updated';
    document.body.appendChild(t);
    setTimeout(function(){t.remove();},3000);
  };
  if(isLoggedIn()){
    window.currentRole=sessionStorage.getItem('medusa_role')||'admin';
    document.addEventListener('DOMContentLoaded',function(){
      var ls=document.getElementById('login-screen'),ar=document.getElementById('app-root');
      if(ls)ls.style.display='none';
      if(ar){ar.style.display='flex';if(typeof render==='function')render();}
    });
  }else{
    setTimeout(function(){var e=document.getElementById('login-email');if(e)e.focus();},80);
  }
  window.doLogout=function(){
    sessionStorage.removeItem(SK);
    sessionStorage.removeItem('medusa_role');
    window.currentRole='admin';
    document.getElementById('app-root').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('login-email').value='';
    document.getElementById('login-pwd').value='';
    document.getElementById('login-err').style.display='none';
    setTimeout(function(){var e=document.getElementById('login-email');if(e)e.focus();},80);
  };})();

async function syncToSupabase(){
  var sb=_getSb();
  if(!sb){
    _showDiag('❌ Supabase client failed to initialise. Check that the CDN loaded correctly.');
    return;
  }
  _showDiag('⏳ Connecting to Supabase...');
  var log=[];

  async function upsertTable(label,table,rows,conflict){
    if(!rows||rows.length===0){log.push('⬜ '+label+': 0 rows (skipped)');return true;}
    var r=await sb.from(table).upsert(rows,{onConflict:conflict});
    if(r.error){log.push('❌ '+label+': '+r.error.message+' (code '+r.error.code+')');return false;}
    log.push('✅ '+label+': '+rows.length+' rows written');
    return true;
  }

  try{
    await upsertTable('Projects','projects',
      projects.map(function(p){return{id:p.name,name:p.name,category:p.category||'',status:p.status||'',owner:p.owner||'',description:p.desc||'',start_date:p.startDate||'',end_date:p.endDate||'',budget:p.budget!=null?p.budget:null};}),
      'id');
    await upsertTable('Team members','team_members',
      teamMembers.map(function(m){var meta=memberMeta[m]||{};return{id:m,name:m,role:meta.role||'',member_status:meta.memberStatus||'Active',unavail_from:meta.unavailFrom||'',unavail_to:meta.unavailTo||'',unavail_reason:meta.unavailReason||'',active:meta.active!==false};}),
      'id');
    await upsertTable('Assignments','assignments',
      Object.values(assignments.reduce(function(acc,a){acc[String(a.id)]={id:String(a.id),project:a.project||'',member:a.member||'',role:a.role||'',status:a.status||'',comment:a.comment||'',category:a.category||'',allocations:a.allocations||{}};return acc;},{})),
      'id');
    await upsertTable('Member meta','member_meta',
      Object.keys(memberMeta).map(function(k){var m=memberMeta[k];return{member_name:k,role:m.role||'',active:m.active!==false,member_status:m.memberStatus||'Active',unavail_from:m.unavailFrom||'',unavail_to:m.unavailTo||'',unavail_reason:m.unavailReason||''};}),
      'member_name');
    await upsertTable('Notes','notes',
      notes.map(function(n){return{id:String(n.id),text:n.text||'',owner:n.owner||'',ts:n.ts||new Date().toISOString()};}),
      'id');
    await upsertTable('Archive','archived_projects',
      archivedProjects.map(function(p){return{id:p.name,name:p.name,category:p.category||'',status:p.status||'',owner:p.owner||'',archived_on:p.archivedOn||'',members:p.members||[]};}),
      'id');
  }catch(e){
    log.push('💥 Exception: '+e.message);
  }

  var allOk=log.every(function(l){return l[0]!=='❌'&&l[0]!=='💥';});
  var status=allOk?'✅ Sync complete':'⚠️ Sync had errors';
  var entry={ts:new Date().toISOString(),summary:status+' — '+projects.length+' projects, '+teamMembers.length+' members, '+assignments.length+' assignments',detail:log.join('\n')};
  syncLog.unshift(entry);
  if(syncLog.length>100)syncLog=syncLog.slice(0,100);
  saveState();
  renderSidebar();
  _showDiag(status+'\n\n'+log.join('\n'));
}

function renderDashboard(){

  teamMembers.forEach(function(mb){wk.forEach(function(w){tot+=(cap[mb][w]||0);cnt++;});});

  var mLabel=m.name.slice(0,3)+' '+currentYear;
  var sbar={Confirmed:'#10B981',Probable:'#F59E0B',Paused:'#CBD5E1',Finished:'#E2E8F0'};
  var scounts=STATUSES.map(function(s){
    var seen={},n=0;

    return {s:s,n:n};
  });
  var barRows=scounts.map(function(x){
    var w=allP.length?Math.round((x.n/allP.length)*100):0;
    return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
      +statusBadge(x.s)
      +'<div class="pb-wrap"><div class="pb" style="width:'+w+'%;background:'+sbar[x.s]+'"></div></div>'
      +'<span style="font-size:14px;font-weight:700;min-width:22px;text-align:right">'+x.n+'</span></div>';
  }).join('');
  var alerts=[];
  teamMembers.forEach(function(mb){
    var meta=memberMeta[mb]||{};

    var vals=wk.map(function(w){return cap[mb]?cap[mb][w]||0:0;});
    var avgV=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    if(avgV>1.005)alerts.push({m:mb,role:meta.role||'',avgV:avgV,type:'over'});
    else if(avgV>0.005&&avgV<0.8)alerts.push({m:mb,role:meta.role||'',avgV:avgV,type:'under'});

  });

  var overList=alerts.filter(function(x){return x.type==='over';}).sort(function(a,b){return b.avgV-a.avgV;});

function showTeamBreakdown(team){
  var ROLE_ORDER=['VP','Lead','Associated Lead','Senior Consultant','Consultant','Analyst','Intern'];
  var members=teamMembers.filter(function(m){
    var meta=memberMeta[m]||{};
    return meta.team===team&&meta.active!==false;
  }).sort(function(a,b){
    var ra=ROLE_ORDER.indexOf((memberMeta[a]||{}).role||'');
    var rb=ROLE_ORDER.indexOf((memberMeta[b]||{}).role||'');
    if(ra===-1)ra=99;if(rb===-1)rb=99;
    return ra!==rb?ra-rb:a.localeCompare(b);
  });
  if(!members.length)return;
  var TCOL={'Transformation AI':'#7C3AED','Enterprise AI':'#0891B2','Product':'#0369A1','Product UX':'#10B981','No team':'#64748B'};
  var col=TCOL[team]||'#64748B';
  var rows=members.map(function(m){
    var meta=memberMeta[m]||{};
    return'<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text)">'+esc(m)+'</div></div>'
      +(meta.role?'<span style="font-size:11px;color:var(--muted)">'+esc(meta.role)+'</span>':'')
      +'</div>';
  }).join('');
  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="modal" style="max-width:380px"><div class="modal-head">'
    +'<div><h3 style="color:'+col+'">&#9679; '+esc(team)+'</h3>'
    +'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+members.length+' member'+(members.length!==1?'s':'')+'</div></div>'
    +'<button class="btn-ghost" onclick="this.closest(\'.overlay\').remove()" style="font-size:16px">&#10005;</button>'
    +'</div><div class="modal-body" style="padding-top:0">'+rows+'</div>'
    +'<div class="modal-foot"><button class="btn btn-s" onclick="this.closest(\'.overlay\').remove()">Close</button></div>'
    +'</div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

function renderByMember(){
  var wk=wkeys(),m=mc(),cap=computeCap();

  var list=teamMembers.slice();
  if(filterByMemberTeam)list=list.filter(function(mb){return(memberMeta[mb]||{}).team===filterByMemberTeam;});
  if(sortMemberAlpha)list.sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
  var rows=list.map(function(member){
    var vals=wk.map(function(w){return cap[member][w]||0;});
    var avgV=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    var hasAct=vals.some(function(v){return v>0;});
    var meta=memberMeta[member]||{};
    var cells=vals.map(function(v,wi){
      var wkey=wk[wi];
      var cellUnavail=wkInUnavail(member,wkey);
      if(cellUnavail){
        return'<td class="wc"><div class="cc" '+_oc('showUnavailCard',member,wkey)+' style="background:repeating-linear-gradient(45deg,#FFF7ED,#FFF7ED 3px,#FFE4C4 3px,#FFE4C4 6px);color:#C2410C;font-size:11px;cursor:pointer" title="On leave this week">&#9888;</div></td>';
      }
      if(!(v>=0.005))return'<td class="wc"><div class="cc cc-zz">&mdash;</div></td>';
      return'<td class="wc"><div class="cc '+ccls(v)+'" style="cursor:pointer" '+_oc('showCapBreakdown',member,wkey)+' title="Click to see breakdown">'+Math.round(v*100)+'%</div></td>';
    }).join('');
    var roleStr=meta.role?'<div style="font-size:10px;color:var(--muted);margin-top:2px">'+esc(meta.role)+'</div>':'';
    var memberAssignments=assignments.filter(function(a){
      if(a.member!==member)return false;
      return wk.some(function(w){return a.allocations[w]>0;});
    });
    var assignmentDetail=memberAssignments.length?memberAssignments.map(function(a){
      var col=SCOL[a.status]||'#64748B';
      return'<div style="margin-top:4px;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px">'
        +'<span style="width:6px;height:6px;border-radius:50%;background:'+col+';flex-shrink:0"></span>'

        +(a.role?'<span style="color:var(--subtle)">· '+esc(a.role)+'</span>':'')
        +(a.comment?'<span style="color:var(--subtle);font-style:italic">· '+esc(a.comment)+'</span>':'')
        +'</div>';
    }).join(''):'';
    var nameCell='<td style="font-weight:500;min-width:200px;vertical-align:top;padding-top:8px">'
      +'<div style="display:flex;align-items:center;gap:4px">'+esc(member)+'</div>'
      +roleStr
      +assignmentDetail
      +'</td>';
    return'<tr style="'+(hasAct?'':'opacity:.4')+'">'
      +nameCell
      +cells
      +'<td class="wc"><div class="cc '+ccls(avgV)+'" style="font-weight:700">'+(avgV>=0.005?Math.round(avgV*100)+'%':'&mdash;')+'</div></td>'
      +'</tr>';
  }).join('');
  var sortBtn='<button class="btn btn-s btn-sm" onclick="sortMemberAlpha=!sortMemberAlpha;renderByMember()">'+(sortMemberAlpha?'&#8593; A&ndash;Z on':'&#8661; Sort A&ndash;Z')+'</button>';
  document.getElementById('view-bymember').innerHTML=
    '<div class="sh"><h2>Capacity by team member</h2>'
    +'<div style="display:flex;align-items:center;gap:8px">'+sortBtn
    +'<select onchange="filterByMemberTeam=this.value;renderByMember()" style="font-family:inherit;font-size:12px;padding:5px 10px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--surface);color:'+(filterByMemberTeam?'var(--text)':'var(--muted)')+'"><option value="">All teams</option>'+TEAMS.map(function(t){return'<option value="'+esc(t)+'"'+(filterByMemberTeam===t?' selected':'')+'>'+esc(t)+'</option>';}).join('')+'</select>'
    +(filterByMemberTeam?'<button class="btn btn-s btn-sm" onclick="filterByMemberTeam=\'\';renderByMember()" style="color:#EF4444;border-color:#FECACA">&#10005; Clear</button>':'')
    +'<div class="legend">'
    +'<span class="ld"><span class="ld-dot" style="background:#F1F5F9;border:1px solid var(--border2)"></span>Under 80%</span>'
    +'<span class="ld"><span class="ld-dot" style="background:#DCFCE7;border:1px solid #86EFAC"></span>80&ndash;100%</span>'
    +'<span class="ld"><span class="ld-dot" style="background:#FEF2F2;border:1px solid #FECACA"></span>Over 100%</span>'
    +'</div></div></div>'
    +(over>0?'<div class="alert-err">&#9888; <strong>'+over+' member'+(over>1?'s':'')+'</strong> over capacity in at least one week of '+m.name+' '+currentYear+'</div>':'')

function sortMembers(col){
  if(memberSortCol===col){memberSortDir=-memberSortDir;}else{memberSortCol=col;memberSortDir=1;}

}
function sortProjs(col){

}

function renderMaster(){
  function memberCapAvg(mb){
    var vals=[];
    assignments.forEach(function(a){if(a.member!==mb)return;Object.keys(a.allocations).forEach(function(w){vals.push(a.allocations[w]);});});
    if(!vals.length)return null;
    return vals.reduce(function(a,b){return a+b;},0)/vals.length;
  }
  function projCapAvg(name){
    var vals=[];
    assignments.forEach(function(a){if(a.project!==name)return;Object.keys(a.allocations).forEach(function(w){vals.push(a.allocations[w]);});});
    if(!vals.length)return null;
    return vals.reduce(function(a,b){return a+b;},0)/vals.length;
  }
  function numericSort(a,b){return isNaN(a)?1:isNaN(b)?-1:b-a;}

  var memberData=teamMembers.map(function(mb){
    var meta=memberMeta[mb]||{role:'',active:true};
    return{name:mb,role:meta.role||'',active:meta.active!==false,n:assignments.filter(function(a){return a.member===mb;}).length,avg:memberCapAvg(mb)};
  });
  memberData.sort(function(a,b){
    if(memberSortCol){
      var r=0;
      if(memberSortCol==='name')r=a.name.toLowerCase().localeCompare(b.name.toLowerCase());
      else if(memberSortCol==='n')r=(b.n-a.n);
      else if(memberSortCol==='avg')r=numericSort(a.avg,b.avg);
      else if(memberSortCol==='role')r=(a.role||'').toLowerCase().localeCompare((b.role||'').toLowerCase());
      else if(memberSortCol==='active')r=(a.active===b.active?0:a.active?-1:1);
      return r*memberSortDir;
    }
    return a.name.toLowerCase().localeCompare(b.name.toLowerCase()); // default A-Z
  });
  var roleOpts=ROLES.map(function(r){return'<option>'+r+'</option>';}).join('');

    var mb=d.name;

      +'<td><select style="font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid var(--border2);border-radius:4px;background:var(--surface);color:var(--text);width:100%" onchange="updMemberTeam(this)" data-m="'+esc(mb)+'">'+tOpts+'</select></td>'

function generateMatrix(){
  var fromWk=document.getElementById('ex-from').value;
  var toWk=document.getElementById('ex-to').value;
  var fromIdx=ALL_WEEKS.indexOf(fromWk);
  var toIdx=ALL_WEEKS.indexOf(toWk);
  var result=document.getElementById('ex-result');
  var hide=function(){document.getElementById('ex-csv-btn').style.display='none';document.getElementById('ex-xlsx-btn').style.display='none';};
  if(0>fromIdx||0>toIdx||fromIdx>toIdx){result.innerHTML='<div class="alert-err">&#9888; Invalid range.</div>';hide();return;}
  var filterVal=document.getElementById('ex-filter')?document.getElementById('ex-filter').value:'';
  var filteredMembers=teamMembers.slice().sort(function(a,b){return a.localeCompare(b);});
  if(filterVal.indexOf('mem:')===0){
    var solo=filterVal.slice(4);
    filteredMembers=filteredMembers.filter(function(m){return m===solo;});
  }else if(filterVal.indexOf('team:')===0){
    var teamName=filterVal.slice(5);
    filteredMembers=filteredMembers.filter(function(m){return(memberMeta[m]||{}).team===teamName;});
  }
  var projSet={};
  assignments.forEach(function(a){
    rangeWeeks.forEach(function(w){if(a.allocations[w]!=null&&a.allocations[w]>0)projSet[a.project]=1;});
  });
  var activeProjNames=Object.keys(projSet).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
  if(!activeProjNames.length){result.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No assignments found for this range.</div>';hide();return;}
  var matrix={};
  filteredMembers.forEach(function(m){matrix[m]={};activeProjNames.forEach(function(p){matrix[m][p]=null;});});
  assignments.forEach(function(a){
    if(!a.member||!matrix[a.member])return;
    if(!(a.project in matrix[a.member]))return;
    var vals=rangeWeeks.map(function(w){return a.allocations[w]!=null?a.allocations[w]:null;}).filter(function(v){return v!==null;});
    if(!vals.length)return;
    var avg=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    matrix[a.member][a.project]=(matrix[a.member][a.project]||0)+avg;
  });
  _exMatrix={members:teamMembers,projects:activeProjNames,data:matrix,range:fromWk.replace('_',' ')+' to '+toWk.replace('_',' '),weeks:rangeWeeks};
  function chip(v){
    if(v===null||v===0)return'<div class="exp-chip exp-chip-zz">&mdash;</div>';
    var cls=v>1.005?'exp-chip-ov':v>=0.8?'exp-chip-ok':'exp-chip-md';
    return'<div class="exp-chip '+cls+'">'+Math.round(v*100)+'%</div>';
  }
  var thead='<tr><th class="sticky-corner">Member &nbsp;<span style="font-weight:400;color:var(--subtle)">'+label+'</span></th>'
    +activeProjNames.map(function(p){return'<th class="proj-h" title="'+esc(p)+'"><span>'+esc(p)+'</span></th>';}).join('')
    +'<th style="position:sticky;top:0;background:#F1F4FF;color:var(--accent);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;text-align:center;min-width:56px;z-index:2">TOTAL</th></tr>';
  var tbody=teamMembers.map(function(member){
    var rowVals=activeProjNames.map(function(p){return matrix[member][p];});
    var nonNull=rowVals.filter(function(v){return v!==null&&v>0;});
    if(!nonNull.length)return'';
    var total=nonNull.reduce(function(a,b){return a+b;},0);
    var tcls=total>1.005?'exp-chip-ov':total>=0.8?'exp-chip-ok':'exp-chip-md';
    return'<tr><td class="member-cell">'+esc(member)+'</td>'
      +rowVals.map(function(v){return'<td style="padding:0;min-width:54px">'+chip(v)+'</td>';}).join('')
      +'<td style="padding:0;min-width:56px"><div class="exp-chip exp-total '+tcls+'">'+Math.round(total*100)+'%</div></td></tr>';
  }).filter(Boolean).join('');
  if(!tbody){result.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No member has allocations in this range.</div>';hide();return;}
  var activeMemCount=teamMembers.filter(function(m){return activeProjNames.some(function(p){return (matrix[m][p]||0)>0;});}).length;
  result.innerHTML='<div style="font-size:11px;color:var(--muted);margin-bottom:10px">'+activeProjNames.length+' projects &middot; '+activeMemCount+' members active in range</div>'
    +'<div class="exp-wrap card"><table class="exp-table"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
  document.getElementById('ex-csv-btn').style.display='';
  document.getElementById('ex-xlsx-btn').style.display='';
}

function exportCSV(){
  if(!_exMatrix)return;
  var rows=[['Member'].concat(_exMatrix.projects).concat(['TOTAL'])];
  _exMatrix.members.forEach(function(member){
    var rowVals=_exMatrix.projects.map(function(p){return _exMatrix.data[member][p];});
    var nonNull=rowVals.filter(function(v){return v!==null&&v>0;});
    if(!nonNull.length)return;
    var total=nonNull.reduce(function(a,b){return a+b;},0);
    rows.push([member].concat(rowVals.map(function(v){return (v===null||v===0)?'':Math.round(v*100)+'%';})).concat([Math.round(total*100)+'%']));
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='medusa_capacity_'+_exMatrix.range.replace(/ /g,'_')+'.csv';
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

function exportXLSX(){
  if(!_exMatrix||!window.XLSX)return;
  var headerRow=['Member'].concat(_exMatrix.projects).concat(['TOTAL']);
  var dataRows=[];
  _exMatrix.members.forEach(function(member){
    var rowVals=_exMatrix.projects.map(function(p){return _exMatrix.data[member][p];});
    var nonNull=rowVals.filter(function(v){return v!==null&&v>0;});
    if(!nonNull.length)return;
    var total=nonNull.reduce(function(a,b){return a+b;},0);
    dataRows.push([member]
      .concat(rowVals.map(function(v){return (v===null||v===0)?'':Math.round(v*100)+'%';}))
      .concat([Math.round(total*100)+'%']));
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([headerRow].concat(dataRows));
  var cols=[{wch:22}];
  _exMatrix.projects.forEach(function(p){cols.push({wch:Math.max(12,Math.min(p.length,28))});});
  cols.push({wch:10});
  ws['!cols']=cols;
  var metaWs=XLSX.utils.aoa_to_sheet([
    ['Medusa - Capacity Platform'],
    ['Range',_exMatrix.range],
    ['Generated',new Date().toLocaleDateString('en-GB')],
    ['Members',dataRows.length],
    ['Projects',_exMatrix.projects.length]
  ]);
  metaWs['!cols']=[{wch:16},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'Capacity Matrix');
  XLSX.utils.book_append_sheet(wb,metaWs,'Info');
  XLSX.writeFile(wb,'medusa_capacity_'+_exMatrix.range.replace(/ /g,'_')+'.xlsx');
}

function startEdit(el){
  var id=String(el.dataset.id),wk=el.dataset.wk;
  var asgn=null;assignments.forEach(function(a){if(String(a.id)===id)asgn=a;});
  var cur=asgn?(asgn.allocations[wk]!=null?asgn.allocations[wk]:null):null;
  var inp=document.createElement('input');
  inp.type='text';inp.className='ac-input';
  inp.value=cur!=null?String(Math.round(cur*100)):'';inp.placeholder='%';
  el.parentNode.replaceChild(inp,el);inp.focus();inp.select();
  var done=false;
  function commit(){
    if(done)return;done=true;
    var raw=inp.value.trim(),v=null;
    if(raw!==''){var n=parseFloat(raw);if(!isNaN(n)&&n>0)v=Math.min(2,Math.max(0,n/100));}
    var a2=null;assignments.forEach(function(a){if(String(a.id)===id)a2=a;});
    if(a2){if(v===null)delete a2.allocations[wk];else a2.allocations[wk]=v;}
    if(a2&&a2.member&&v!==null){
      var cap2=computeCap();
      var total=(cap2[a2.member]&&cap2[a2.member][wk])||0;
      if(total>1.005){
        _showToast('⚠ '+a2.member+' is now at '+Math.round(total*100)+'% in '+wk.replace(/_/g,' ')+' (overloaded)');
      }
    }
    saveState();if(a2)spSaveAssignment(a2);render();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){inp.removeEventListener('blur',commit);commit();}
    if(e.key==='Escape'){done=true;render();}
  });
}

function applyEditAlloc(sid){
  var a=null;assignments.forEach(function(x){if(String(x.id)===sid)a=x;});
  if(!a)return;
  var from=document.getElementById('ea-from').value;
  var to=document.getElementById('ea-to').value;
  var action=document.querySelector('input[name="ea-action"]:checked');
  var errEl=document.getElementById('ea-err');
  var fi=ALL_WEEKS.indexOf(from),ti=ALL_WEEKS.indexOf(to);
  if(fi<0||ti<0||fi>ti){if(errEl){errEl.textContent='"From" must be before or equal to "To".';errEl.style.display='block';}return;}
  var isSet=action&&action.value==='set';
  var pctRaw=parseFloat(document.getElementById('ea-pct').value);
  var pct=isNaN(pctRaw)?0:Math.min(2,Math.max(0,pctRaw/100));
  var wks=ALL_WEEKS.slice(fi,ti+1);
  wks.forEach(function(w){
    if(!isSet||pct===0)delete a.allocations[w];
    else a.allocations[w]=pct;
  });
  saveState();spSaveAssignment(a);
  var ov=document.querySelector('.overlay');if(ov)ov.remove();
  render();
  _showToast(isSet&&pct>0?'&#10003; Set to '+Math.round(pct*100)+'% for '+wks.length+' week'+(wks.length!==1?'s':''):'&#10003; Cleared '+wks.length+' week'+(wks.length!==1?'s':''));
}

function setPeriodMode(mode){
  var blockA=document.getElementById('period-block-a');
  var blockB=document.getElementById('period-block-b');
  var btnA=document.getElementById('period-mode-a');
  var btnB=document.getElementById('period-mode-b');
  if(!blockA||!blockB)return;
  if(mode==='a'){
    blockA.style.display='flex';blockB.style.display='none';
    if(btnA){btnA.style.background='var(--accent)';btnA.style.color='#fff';}
    if(btnB){btnB.style.background='transparent';btnB.style.color='var(--muted)';}
  }else{
    blockA.style.display='none';blockB.style.display='flex';
    if(btnB){btnB.style.background='var(--accent)';btnB.style.color='#fff';}
    if(btnA){btnA.style.background='transparent';btnA.style.color='var(--muted)';}
    // Sync from-b to current from-a value
    var fa=document.getElementById('m-from'),fb=document.getElementById('m-from-b');
    if(fa&&fb&&fa.value)fb.value=fa.value;
  }
  updateCapPreview();
}

function updateCapPreview(){
  var previewEl=document.getElementById('m-cap-preview');
  if(!previewEl)return;
  var memEl=document.getElementById('m-mem');
  var member=memEl?memEl.value:'';
  if(!member){previewEl.innerHTML='';return;}
  // Determine active mode
  var blockB=document.getElementById('period-block-b');
  var isModeB=blockB&&blockB.style.display!=='none';
  var fromWk,toWk,newPct;
  if(isModeB){
    var fbEl=document.getElementById('m-from-b');
    var nwEl=document.getElementById('m-nwks');
    var pEl=document.getElementById('m-pct-b');
    fromWk=fbEl?fbEl.value:'';
    var nw=parseInt(nwEl?nwEl.value:4)||4;
    var fi2=ALL_WEEKS.indexOf(fromWk);
    if(fi2<0){previewEl.innerHTML='';return;}
    toWk=ALL_WEEKS[Math.min(fi2+nw-1,ALL_WEEKS.length-1)];
    newPct=parseFloat(pEl?pEl.value:100)||0;
  }else{
    var fEl=document.getElementById('m-from');
    var tEl=document.getElementById('m-to');
    var pEl2=document.getElementById('m-pct');
    fromWk=fEl?fEl.value:'';toWk=tEl?tEl.value:'';
    newPct=parseFloat(pEl2?pEl2.value:100)||0;
  }
  var fi=ALL_WEEKS.indexOf(fromWk),ti=ALL_WEEKS.indexOf(toWk);
  if(fi<0||ti<0||fi>ti){previewEl.innerHTML='';return;}
  var rangeWks=ALL_WEEKS.slice(fi,ti+1);
  var cap=computeCap();
  var rows=rangeWks.map(function(w){
    var existing=(cap[member]&&cap[member][w])||0;
    var total=existing+newPct/100;
    var col=total>1.005?'#EF4444':total>=0.8?'#059669':'#64748B';
    return'<span style="display:inline-flex;align-items:center;gap:3px;margin-right:6px;margin-bottom:3px;font-size:10px">'
      +'<span style="color:var(--muted)">'+w.split('_').slice(1).join(' ')+':</span>'
      +'<span style="font-weight:700;color:'+col+'">'+Math.round(existing*100)+'%→'+Math.round(total*100)+'%</span>'
      +(total>1.005?'<span style="color:#EF4444;font-size:9px">⚠</span>':'')
      +'</span>';
  }).join('');
  previewEl.innerHTML='<div style="font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px">Capacity after this assignment ('+rangeWks.length+' week'+(rangeWks.length!==1?'s':'')+')</div>'+rows;
}

function submitAdd(){
  var errEl=document.getElementById('m-period-err');
  if(errEl)errEl.style.display='none';
  var selMember=document.getElementById('m-mem').value;
  var selProject=document.getElementById('m-proj').value;
  var blockB=document.getElementById('period-block-b');
  var isModeB=blockB&&blockB.style.display!=='none';
  var fromWk,toWk,pctRaw;
  if(isModeB){
    var fbEl=document.getElementById('m-from-b');
    var nwEl=document.getElementById('m-nwks');
    var pbEl=document.getElementById('m-pct-b');
    fromWk=fbEl?fbEl.value:'';
    var nw=Math.max(1,parseInt(nwEl?nwEl.value:4)||4);
    var fi2=ALL_WEEKS.indexOf(fromWk);
    if(fi2<0){if(errEl){errEl.textContent='Please select a valid start week.';errEl.style.display='block';}return;}
    toWk=ALL_WEEKS[Math.min(fi2+nw-1,ALL_WEEKS.length-1)];
    pctRaw=parseFloat(pbEl?pbEl.value:100);
  }else{
    var fEl=document.getElementById('m-from');
    var tEl=document.getElementById('m-to');
    var pEl=document.getElementById('m-pct');
    fromWk=fEl?fEl.value:'';toWk=tEl?tEl.value:'';
    pctRaw=parseFloat(pEl?pEl.value:100);
    var fi=ALL_WEEKS.indexOf(fromWk),ti=ALL_WEEKS.indexOf(toWk);
    if(fromWk&&toWk&&fi>ti){
      if(errEl){errEl.textContent='"From" week must be before or equal to "To" week.';errEl.style.display='block';}
      return;
    }
  }
  var pct=isNaN(pctRaw)?1:Math.min(2,Math.max(0,pctRaw/100));
  var fi3=ALL_WEEKS.indexOf(fromWk),ti3=ALL_WEEKS.indexOf(toWk);
  var newWks=fi3>=0&&ti3>=0?ALL_WEEKS.slice(fi3,ti3+1):[];
  // Overlap check: if member already on project, merge if no overlap, block if overlap
  if(selMember){
    var existingRows=assignments.filter(function(a){return a.member===selMember&&a.project===selProject;});
    if(existingRows.length>0){
      var hasOverlap=existingRows.some(function(a){return newWks.some(function(w){return(a.allocations[w]||0)>0;});});
      if(hasOverlap){
        if(errEl){errEl.textContent=selMember+' already has allocation in some of these weeks on "'+selProject+'". Edit directly in By Project or choose non-overlapping weeks.';errEl.style.display='block';}
        return;
      }
      // No overlap — merge into existing assignment row
      var ex=existingRows[0];
      newWks.forEach(function(w){ex.allocations[w]=pct;});
      var ov0=document.querySelector('.overlay');if(ov0)ov0.remove();
      saveState();spSaveAssignment(ex);render();
      _showToast('Weeks added to existing assignment — '+fromWk.replace(/_/g,' ')+' to '+toWk.replace(/_/g,' '));
      return;
    }
  }
  var allocs={};
  newWks.forEach(function(w){allocs[w]=pct;});
  var roleEl=document.getElementById('m-role');
  var row={id:mkid(),project:selProject,category:document.getElementById('m-nat').value,
    status:document.getElementById('m-st').value,member:selMember,
    role:roleEl?roleEl.value:'',
    comment:document.getElementById('m-com').value,allocations:allocs};
  assignments.push(row);
  var ov=document.querySelector('.overlay');if(ov)ov.remove();
  saveState();spSaveAssignment(row);render();
  _showToast('Assignment created — '+fromWk.replace(/_/g,' ')+' to '+toWk.replace(/_/g,' '));
}

function getUnavailPeriods(member){
  var meta=memberMeta[member];
  if(!meta)return[];
  if(meta.unavailPeriods&&meta.unavailPeriods.length)return meta.unavailPeriods;
  if(meta.memberStatus==='Unavailable'&&meta.unavailFrom&&meta.unavailTo){
    return[{from:meta.unavailFrom,to:meta.unavailTo,reason:meta.unavailReason||''}];
  }
  return[];
}

function wkInUnavail(member,wkey){
  var wi=ALL_WEEKS.indexOf(wkey);
  if(wi<0)return false;
  var periods=getUnavailPeriods(member);
  return periods.some(function(p){
    var fi=ALL_WEEKS.indexOf(p.from),ti=ALL_WEEKS.indexOf(p.to);
    if(fi<0||ti<0)return false;
    return wi>=fi&&wi<=ti;
  });
}

function memberIsUnavailInWeeks(member,wkArr){
  if(!wkArr||!wkArr.length)return false;
  return wkArr.some(function(w){return wkInUnavail(member,w);});
}

  _confirmModal(

function updMemberRole(sel){
  var m=sel.getAttribute('data-m'),role=sel.value;
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].role=role;saveState();
}

function updMemberStatus(sel){
  var m=sel.getAttribute('data-m'),status=sel.value;
  if(status==='Unavailable'){
    _showUnavailModal(m,sel);
    return;
  }
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].memberStatus=status;
  memberMeta[m].active=(status==='Active');
  delete memberMeta[m].unavailFrom;
  delete memberMeta[m].unavailTo;
  delete memberMeta[m].unavailReason;
  saveState();renderMaster();
}

    +'<div class="modal-body" style="display:flex;flex-direction:column;gap:14px">'
    +'<div class="fi-grid">'
    +'<div><label class="fl">From week</label><select class="fi" id="unavail-from">'+wkOpts+'</select></div>'
    +'<div><label class="fl">To week</label><select class="fi" id="unavail-to">'+wkOpts+'</select></div>'
    +'</div>'
    +'<div><label class="fl">Reason</label><select class="fi" id="unavail-reason">'+reasonOpts+'</select></div>'

function confirmUnavail(m){
  var from=document.getElementById('unavail-from').value;
  var to=document.getElementById('unavail-to').value;
  var reason=document.getElementById('unavail-reason').value;
  var err=document.getElementById('unavail-err');
  var fi=ALL_WEEKS.indexOf(from),ti=ALL_WEEKS.indexOf(to);
  if(fi>ti){err.textContent='"From" week must be before "To" week.';err.style.display='block';return;}
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].memberStatus='Unavailable';
  memberMeta[m].active=false;
  memberMeta[m].unavailFrom=from;
  memberMeta[m].unavailTo=to;
  memberMeta[m].unavailReason=reason;
  var ov=document.querySelector('.overlay');if(ov)ov.remove();
  saveState();renderMaster();
  _showToast(esc(m)+' marked unavailable: '+reason);
}

function toggleMemberActive(el){
  var m=el.getAttribute('data-m');
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].active=!memberMeta[m].active;
  saveState();renderMaster();
}

function updProjDesc(inp){
  var name=inp.getAttribute('data-name'),desc=inp.value.slice(0,200);
  projects.forEach(function(p){if(p.name===name)p.desc=desc;});
  saveState();
}

function renameProject(inp){
  var oldName=inp.getAttribute('data-original');
  var newName=inp.value.trim();
  if(!newName||newName===oldName)return;
  var exists=false;projects.forEach(function(p){if(p.name===newName)exists=true;});
  if(exists){inp.value=oldName;_showToast('A project with that name already exists');return;}
  projects.forEach(function(p){if(p.name===oldName)p.name=newName;});
  assignments.forEach(function(a){if(a.project===oldName)a.project=newName;});
  inp.setAttribute('data-original',newName);
  saveState();renderMaster();
}

function addMember(){
  var el=document.getElementById('inp-member'),v=el.value.trim();
  var roleEl=document.getElementById('inp-role');
  var teamEl=document.getElementById('inp-team');
  var role=roleEl?roleEl.value:'';
  var team=teamEl?teamEl.value:'';
  if(v&&teamMembers.indexOf(v)===-1){
    _undoMember={member:v,wasAdd:true};
    teamMembers.push(v);
    memberMeta[v]={role:role,team:team,active:true};
    el.value='';if(roleEl)roleEl.value='';if(teamEl)teamEl.value='';
    saveState();spSaveMember(v);render();
  }
}

function updMemberTeam(sel){
  var m=sel.getAttribute('data-m'),team=sel.value;
  if(!memberMeta[m])memberMeta[m]={role:'',active:true};
  memberMeta[m].team=team;
  saveState();spSaveMember(m);
}

function undoMember(){
  if(!_undoMember)return;
  if(_undoMember.wasAdd){
    var m=_undoMember.member;
    teamMembers=teamMembers.filter(function(x){return x!==m;});
    assignments=assignments.filter(function(a){return a.member!==m;});
  } else {
    var m2=_undoMember.member;
    if(teamMembers.indexOf(m2)===-1)teamMembers.push(m2);
    _undoMember.assignments.forEach(function(a){
      var exists=false;assignments.forEach(function(x){if(x.id===a.id)exists=true;});
      if(!exists)assignments.push(a);
    });
  }
  _undoMember=null;saveState();render();
}

function undoProject(){
  if(!_undoProject)return;
  if(_undoProject.wasAdd){
    var n=_undoProject.project.name;
    projects=projects.filter(function(x){return x.name!==n;});
    assignments=assignments.filter(function(a){return a.project!==n;});
  } else {
    var rp=_undoProject.project;
    var exists=false;projects.forEach(function(x){if(x.name===rp.name)exists=true;});
    if(!exists)projects.push(rp);
    _undoProject.assignments.forEach(function(a){
      var ex=false;assignments.forEach(function(x){if(x.id===a.id)ex=true;});
      if(!ex)assignments.push(a);
    });
    archivedProjects=archivedProjects.filter(function(x){return x.name!==rp.name;});
  }
  _undoProject=null;saveState();render();
}

    +'<h3>Permanently delete project?</h3>'

    +'<label class="fl" style="color:#EF4444">Type DELETE to confirm</label>'

    +'</div>'
    +'<div id="del-confirm-err" style="display:none;font-size:12px;color:#EF4444;margin-top:6px"></div>'
    +'</div>'
    +'<div class="modal-foot">'
    +'<button class="btn btn-s" onclick="this.closest(\'.overlay\').remove()">Cancel</button>'
    +'<button class="btn" style="background:#EF4444;color:#fff" onclick="confirmDeleteArchived(\''+esc(name)+'\')">Delete permanently</button>'
    +'</div>'

function confirmDeleteArchived(name){
  var inp=document.getElementById('del-confirm-inp');
  var err=document.getElementById('del-confirm-err');
  if(!inp)return;
  if(inp.value.trim()!=='DELETE'){
    err.textContent='Please type DELETE exactly (case-sensitive) to confirm.';
    err.style.display='block';
    inp.focus();inp.select();
    return;
  }
  archivedProjects=archivedProjects.filter(function(p){return p.name!==name;});
  var ov=document.querySelector('.overlay');if(ov)ov.remove();
  saveState();renderArchive();
  _showToast('"'+name+'" permanently deleted');
}

function addProject(){
  var n=document.getElementById('inp-proj').value.trim();
  var exists=false;projects.forEach(function(p){if(p.name===n)exists=true;});
  if(n&&!exists){
    var descEl=document.getElementById('inp-desc');
    var startEl=document.getElementById('inp-start');
    var endEl=document.getElementById('inp-end');
    var budgetEl=document.getElementById('inp-budget');
    var np={name:n,
      category:document.getElementById('inp-category').value,
      status:document.getElementById('inp-status').value,

      startDate:startEl?startEl.value.trim():'',
      endDate:endEl?endEl.value.trim():'',
      budget:budgetEl&&budgetEl.value!==''?parseFloat(budgetEl.value.replace(/\./g,''))||null:null,
      desc:descEl?(descEl.value.slice(0,200)):''};
    _undoProject={project:JSON.parse(JSON.stringify(np)),assignments:[],wasAdd:true};
    projects.push(np);
    document.getElementById('inp-proj').value='';
    if(descEl)descEl.value='';
    if(startEl)startEl.value='';
    if(endEl)endEl.value='';
    if(budgetEl)budgetEl.value='';

  }
}

function delProject(btn){
  var name=btn.getAttribute('data-name');
  _confirmModal(
    'Archive project?',
    'This will move <strong>'+esc(name)+'</strong> to the Archive tab with full member history. This action can be undone once.',
    'Archive',
    function(){
      var p=null;projects.forEach(function(x){if(x.name===name)p=x;});
      var projAsgns=assignments.filter(function(a){return a.project===name;});
      var memberStats={};
      projAsgns.forEach(function(a){
        if(!a.member)return;
        if(!memberStats[a.member])memberStats[a.member]={weeks:0,first:null,last:null};
        Object.keys(a.allocations).forEach(function(wk){
          if(!(a.allocations[wk]>0))return;
          memberStats[a.member].weeks++;
          var idx=ALL_WEEKS.indexOf(wk);
          if(memberStats[a.member].first===null||idx!==-1&&ALL_WEEKS.indexOf(memberStats[a.member].first)>idx)memberStats[a.member].first=wk;
          if(memberStats[a.member].last===null||idx!==-1&&ALL_WEEKS.indexOf(memberStats[a.member].last)<=idx)memberStats[a.member].last=wk;
        });
      });
      var members=[];
      Object.keys(memberStats).forEach(function(m){
        var s=memberStats[m];
        members.push({name:m,weeks:s.weeks,period:s.first&&s.last?wkLabel(s.first)+' - '+wkLabel(s.last):''});
      });
      _undoProject={project:JSON.parse(JSON.stringify(p||{name:name})),assignments:projAsgns.map(function(a){return JSON.parse(JSON.stringify(a));})};
      var now=new Date();
      var ts=now.toLocaleDateString('en-GB')+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      archivedProjects.push({name:name,category:p?p.category:'',status:p?p.status:'',owner:p?p.owner:'',archivedOn:ts,members:members});
      if(p)spDeleteProject(p._spId);
      projAsgns.forEach(function(a){spDeleteAssignment(a._spId);});
      projects=projects.filter(function(x){return x.name!==name;});
      assignments=assignments.filter(function(a){return a.project!==name;});
      saveState();render();
      _showToast('"'+name+'" moved to Archive');
    }
  );
}

function updProjStatus(sel){
  var name=sel.getAttribute('data-name'),status=sel.value;
  var p=null;projects.forEach(function(x){if(x.name===name){x.status=status;p=x;}});
  assignments.forEach(function(a){if(a.project===name)a.status=status;});
  if(p&&status==='Confirmed'&&!p.startDate&&!p.endDate){
    _showToast('📅 "'+name+'" has no start/end dates. Add them in Settings for better timeline visibility.');
  }
  if(p)spSaveProject(p);saveState();renderTopbar();renderSidebar();
  sel.style.color=SCOL[status]||'#64748B';
}

function updProjCategory(sel){

function updProjDate(inp,field){

  if(p)spSaveProject(p);saveState();
}

function updProjBudget(inp){
  var name=inp.getAttribute('data-name');
  var raw=inp.value.replace(/\./g,'').trim();
  var val=raw!==''?parseFloat(raw):null;
  if(isNaN(val))val=null;
  var p=null;projects.forEach(function(x){if(x.name===name){x.budget=val;p=x;}});
  if(p)spSaveProject(p);saveState();
}

function updProjOwner(sel){
  var name=sel.getAttribute('data-name'),owner=sel.value;
  var p=null;projects.forEach(function(x){if(x.name===name){x.owner=owner;p=x;}});
  if(p)spSaveProject(p);saveState();
}

function bulkAssign(){
  var member=document.getElementById('ba-member').value;
  var proj=document.getElementById('ba-proj').value;
  var roleEl=document.getElementById('ba-role');
  var role=roleEl?roleEl.value:'';
  var fromWk=document.getElementById('ba-from').value;
  var toWk=document.getElementById('ba-to').value;
  var pctRaw=parseFloat(document.getElementById('ba-pct').value);
  var msg=document.getElementById('ba-msg');
  if(!proj||!fromWk||!toWk||isNaN(pctRaw)){
    msg.innerHTML='<span style="color:#EF4444">&#9888; Please fill in project, week range and percentage.</span>';return;
  }
  if(!member&&!role){
    msg.innerHTML='<span style="color:#EF4444">&#9888; Please fill in at least Member or Role.</span>';return;
  }
  var v=Math.min(2,Math.max(0,pctRaw/100));
  var fromIdx=ALL_WEEKS.indexOf(fromWk),toIdx=ALL_WEEKS.indexOf(toWk);
  if(0>fromIdx||0>toIdx||fromIdx>toIdx){
    msg.innerHTML='<span style="color:#EF4444">&#9888; "From" must be before "To".</span>';return;
  }
  var rangeWeeks=ALL_WEEKS.slice(fromIdx,toIdx+1);
  var existing=null;
  assignments.forEach(function(a){if(a.member===member&&a.project===proj)existing=a;});
  if(!existing){
    var p=null;projects.forEach(function(x){if(x.name===proj)p=x;});
    existing={id:mkid(),project:proj,category:p?p.category:'',status:p?p.status:'Confirmed',member:member,role:role,comment:'',allocations:{}};
    assignments.push(existing);
  } else if(role){
    existing.role=role;
  }
  rangeWeeks.forEach(function(w){existing.allocations[w]=v;});
  var label=fromWk.replace('_',' ')+' to '+toWk.replace('_',' ');
  msg.innerHTML='<span style="color:#059669">&#10003; Assigned <strong>'+esc(member)+'</strong> to <strong>'+esc(proj)+'</strong>'+(role?' as <strong>'+esc(role)+'</strong>':'')+' at <strong>'+Math.round(pctRaw)+'%</strong> from '+label+' ('+rangeWeeks.length+' weeks).</span>';
  saveState();spSaveAssignment(existing);render();
}

var ganttYear=2026;
var ganttMode='members'; // 'projects' or 'members'
var ganttTeamFilter='';

function renderGantt(){
  var startIdx=(ganttYear===2026)?2:0;
  var yearMonths=MONTH_DEFS.slice(startIdx);

  var yearWeeks=[];
  yearMonths.forEach(function(m){
    m.weeks.forEach(function(w){yearWeeks.push(ganttYear+'_'+m.abbr+'_'+w);});
  });

  function barColor(v){
    if(!(v>0))return'transparent';
    if(v>1.005)return'#EF4444';
    if(v>=0.8)return'#10B981';
    return'#94A3B8';
  }
  function barOpacity(v){
    if(!(v>0))return 0;
    return Math.min(0.9,0.4+v*0.5);
  }

  if(ganttMode==='projects'){
    var projActivity={};
    assignments.forEach(function(a){
      if(!a.project)return;
      yearWeeks.forEach(function(wk){
        if(a.allocations[wk]>0){
          if(!projActivity[a.project])projActivity[a.project]={first:yearWeeks.length,last:-1,members:{}};
          var idx=yearWeeks.indexOf(wk);
          if(idx>=0){
            if(idx<projActivity[a.project].first)projActivity[a.project].first=idx;
            if(idx>projActivity[a.project].last)projActivity[a.project].last=idx;
          }
          if(a.member)projActivity[a.project].members[a.member]=1;

    });

    var sortedProjs=projects.slice().sort(function(a,b){return a.name.toLowerCase().localeCompare(b.name.toLowerCase());});

    var LABEL_W=180;

    var monthHeaders=yearMonths.map(function(m){
      return'<th colspan="'+m.weeks.length+'" style="text-align:center;padding:5px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--s2);border-bottom:1px solid var(--border);border-right:1px solid var(--border)">'+m.name.slice(0,3)+'</th>';
    }).join('');
    var weekHeaders=yearMonths.map(function(m){
      return m.weeks.map(function(w){return'<th style="min-width:'+COL_W+'px;max-width:'+COL_W+'px;padding:3px 0;font-size:9px;text-align:center;color:var(--subtle);background:var(--s2);font-weight:400">'+w+'</th>';}).join('');
    }).join('');

    var projRows=sortedProjs.map(function(p){

      var cells=yearWeeks.map(function(wk,idx){
        var hasActivity=false;
        var totalAlloc=0,memberCount=0;
        assignments.forEach(function(a){
          if(a.project===p.name&&a.allocations[wk]>0){hasActivity=true;totalAlloc+=a.allocations[wk];memberCount++;}
        });
        if(!hasActivity)return'<td style="min-width:'+COL_W+'px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:0;height:'+ROW_H+'px"></td>';

        return'<td '+_oc('showGanttProjBreakdown',p.name,wk)+' title="'+esc(p.name)+' &mdash; '+memberCount+' member'+(memberCount!==1?'s':'')+'" style="cursor:pointer;min-width:'+COL_W+'px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:0;height:'+ROW_H+'px;background:'+bg+';opacity:'+(0.3+intensity*0.7)+'">'+'</td>';
      }).join('');
      var memCount=act?Object.keys(act.members).length:0;
      var projWkSet={};
      assignments.forEach(function(a){
        if(a.project!==p.name)return;
        Object.keys(a.allocations).forEach(function(w){if(a.allocations[w]>0)projWkSet[w]=1;});
      });
      var projWks=Object.keys(projWkSet).length;
      return'<tr>'

        +'</td>'+cells+'</tr>';

    var html='<div class="sh" style="margin-bottom:0">'

function saveCapBreakdown(member,wkey){

        if(v===0)delete a.allocations[wkey];
        else a.allocations[wkey]=v;
        spSaveAssignment(a);
      }
    });
  });
  saveState();

function submitNote(){
  var text=(document.getElementById('note-text').value||'').trim();
  var owner=(document.getElementById('note-owner').value||'').trim();
  if(!text){document.getElementById('note-text').focus();return;}
  notes.push({id:mkid(),text:text,owner:owner,ts:new Date().toISOString()});
  saveState();renderNotes();
  _showToast('Note posted');
}

    }
  );
}

function renderAnalytics(){
  var memberUtil=teamMembers.map(function(mb){
    var vals=[];
    assignments.forEach(function(a){
      if(a.member!==mb)return;
      Object.keys(a.allocations).forEach(function(w){if(a.allocations[w]>0)vals.push(a.allocations[w]);});
    });
    var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;
    return{name:mb,avg:avg,weeks:vals.length};
  }).filter(function(x){return x.weeks>0;}).sort(function(a,b){return b.avg-a.avg;});

  var projDur=projects.map(function(p){
    var wkSet={};
    assignments.forEach(function(a){
      if(a.project!==p.name)return;
      Object.keys(a.allocations).forEach(function(w){if(a.allocations[w]>0)wkSet[w]=1;});
    });
    var wks=Object.keys(wkSet).length;
    var idxs=Object.keys(wkSet).map(function(w){return ALL_WEEKS.indexOf(w);}).filter(function(i){return i>=0;});
    var span=idxs.length?Math.max.apply(null,idxs)-Math.min.apply(null,idxs)+1:0;
    return{name:p.name,category:p.category,status:p.status,activeWeeks:wks,span:span};
  })
  .filter(function(x){
    if(x.activeWeeks===0)return false;
    var cat=(x.category||'').toLowerCase();
    var name=(x.name||'').toLowerCase();
    if(cat==='proposal'||cat==='management'||cat==='proposals'||cat==='mgmt')return false;
    if(name.indexOf('proposal')===0||name.indexOf('management')===0)return false;
    return true;
  })
  .sort(function(a,b){return b.activeWeeks-a.activeWeeks;});

  var natCount={};
  NATURES.forEach(function(n){natCount[n]=0;});
  projects.forEach(function(p){if(p.category)natCount[p.category]=(natCount[p.category]||0)+1;});
  var natTotal=projects.length||1;

  var stCount={};
  STATUSES.forEach(function(s){stCount[s]=0;});
  projects.forEach(function(p){stCount[p.status]=(stCount[p.status]||0)+1;});

  var overWeeks=teamMembers.map(function(mb){
    var n=0;
    ALL_WEEKS.forEach(function(w){
      var tot=0;
      assignments.forEach(function(a){if(a.member===mb&&a.allocations[w]>0)tot+=a.allocations[w];});
      if(tot>1.005)n++;
    });
    return{name:mb,n:n};
  }).filter(function(x){return x.n>0;}).sort(function(a,b){return b.n-a.n;}).slice(0,8);

  var startIdx=(currentYear===2026)?2:0;
  var monthUtil=MONTH_DEFS.slice(startIdx).map(function(m){
    var wks=m.weeks.map(function(w){return currentYear+'_'+m.abbr+'_'+w;});
    var vals=[];
    teamMembers.forEach(function(mb){
      wks.forEach(function(wk){
        var tot=0;
        assignments.forEach(function(a){if(a.member===mb&&a.allocations[wk]>0)tot+=a.allocations[wk];});
        vals.push(tot);
      });
    });
    var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;
    return{name:m.name.slice(0,3),avg:avg};
  });

  var chartW=560,chartH=120,padL=28,padB=24,padT=14;
  var usableW=chartW-padL-8,usableH=chartH-padB-padT;
  var barW=Math.max(5,Math.floor(usableW/monthUtil.length)-4);
  var bars=monthUtil.map(function(d,i){
    var h=Math.max(1,Math.round(d.avg*usableH));
    var x=padL+i*(barW+4);
    var y=chartH-padB-h;

function delUnavailPeriod(member,idx){
  if(!memberMeta[member])return;
  var periods=getUnavailPeriods(member);
  periods.splice(idx,1);
  memberMeta[member].unavailPeriods=periods;
  if(!periods.length){
    memberMeta[member].memberStatus='Active';
    memberMeta[member].unavailFrom='';memberMeta[member].unavailTo='';memberMeta[member].unavailReason='';
  }
  saveState();spSaveMember(member);render();
  _showToast('Period removed for '+member);
}

function clearUnavail(member){
  if(!memberMeta[member])return;
  memberMeta[member].memberStatus='Active';
  memberMeta[member].unavailPeriods=[];
  memberMeta[member].unavailFrom='';memberMeta[member].unavailTo='';memberMeta[member].unavailReason='';
  saveState();spSaveMember(member);render();
  _showToast(member+' is now Active — all unavailability cleared');
}

function openUnavailModalFor(member){
  openUnavailModal();
  setTimeout(function(){
    var el=document.getElementById('uv-mem');if(el)el.value=member;
  },50);
}

function editPeriodModal(member,idx){

  ov.innerHTML='<div class="modal" style="max-width:400px"><div class="modal-head">'

    +'</div><div class="modal-body">'

    +'<div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px">'

    +'</div>'

    +'<button class="btn btn-s" onclick="this.closest(\'.overlay\').remove()">Cancel</button>'
    +'<button class="btn" style="background:#C2410C;color:#fff;border-color:#C2410C" onclick="saveEditPeriod(\''+member.replace(/'/g,'\\u0027')+'\','+idx+')">Save changes</button>'
    +'</div></div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);

function saveEditPeriod(member,idx){
  var reason=document.getElementById('ep-reason').value;
  var from=document.getElementById('ep-from').value;
  var to=document.getElementById('ep-to').value;
  var errEl=document.getElementById('ep-err');
  if(ALL_WEEKS.indexOf(from)>ALL_WEEKS.indexOf(to)){
    if(errEl){errEl.textContent='"From" must be before "To".';errEl.style.display='block';}return;
  }
  var periods=getUnavailPeriods(member);
  periods[idx]={from:from,to:to,reason:reason};
  if(!memberMeta[member])memberMeta[member]={role:'',active:true};
  memberMeta[member].unavailPeriods=periods;
  saveState();spSaveMember(member);
  var ov=document.querySelector('.overlay');if(ov)ov.remove();
  render();
  _showToast('&#9888; Period updated for '+member);
}

        {q:'How do I delete a project?',a:'In <strong>Settings → Projects</strong>, click ✕ on the project row. The project moves to the <strong>Archive</strong>. An Undo button appears immediately after deletion. Permanent deletion is available from the Archive by typing DELETE.'}

    {
      section:'Team members',
      items:[
        {q:'How do I add a team member?',a:'Go to <strong>Settings → Team members</strong>. Enter the full name, select a Role and a Team (Transformation AI, Enterprise AI, Product, Product UX), then click <em>+ Add</em>. The member is immediately available in all assignment dropdowns.'},
        {q:'What teams are available?',a:'Members can be assigned to one of four teams: <strong>Transformation AI</strong>, <strong>Enterprise AI</strong>, <strong>Product</strong>, or <strong>Product UX</strong>. Team assignment is used for filtering in By Member, Capacity Overview and Export.'},
        {q:'How do I set someone as unavailable?',a:'In <strong>Settings → Team members</strong>, change the Status to <em>Unavailable</em>. A modal will ask for the from/to week and a reason. During that range their cells appear hatched in orange across all views.'},
        {q:'What is the difference between Unavailable and Inactive?',a:'<strong>Unavailable</strong> means temporarily away for a specific date range. <strong>Inactive</strong> means they are no longer part of the team — they are greyed out and excluded from load alerts.'}

    {
      section:'Capacity & analytics',
      items:[
        {q:'How is capacity utilisation calculated?',a:'For each member and each week, Medusa sums all allocation percentages across all projects. 100% = fully allocated. The monthly average is the mean across all weeks. Load alerts use the monthly average: above 100% is Overload, below 80% is Underused, 0% is Unallocated.'},
        {q:'How do I read the Dashboard load alerts?',a:'Load alerts are grouped into three boxes: <strong>Overload</strong> (monthly avg above 100%), <strong>Underused</strong> (avg between 0% and 80%), and <strong>Unallocated</strong> (avg at 0%). Each box is sorted from highest to lowest. Members with Inactive status are excluded.'},
        {q:'How do I read the Capacity Overview (Gantt)?',a:'Use the <em>Projects</em> toggle to see all projects as rows across the year. Use <em>Members</em> to see each person\u0027s load. Use the Team filter to focus on a specific team. Hatched orange cells indicate unavailability. Click any cell for a breakdown.'},

        {q:'What does each colour in the export mean?',a:'<strong>Green</strong> — 80–100% utilisation. <strong>Grey</strong> — below 80%. <strong>Red</strong> — above 100% (overload). <strong>Dash</strong> — no allocation in that period.'}

var teamRecordMember='';
function renderTeamRecord(){
  var sel=teamRecordMember||'';
  var memOpts='<option value="">-- Select a team member --</option>'+teamMembers.slice().sort(function(a,b){return a.localeCompare(b);}).map(function(m){return'<option value="'+esc(m)+'"'+(sel===m?' selected':'')+'>'+esc(m)+'</option>';}).join('');
  var records=[];
  var projSeen={};
  assignments.forEach(function(a){
    if(a.member!==sel)return;
    if(!projSeen[a.project])projSeen[a.project]={name:a.project,role:a.role||'',weeks:0,totalPct:0,wkCount:0,status:'',source:'active'};
    var proj=projects.filter(function(p){return p.name===a.project;})[0]||{};
    projSeen[a.project].status=a.status||proj.status||'';
    projSeen[a.project].role=projSeen[a.project].role||a.role||'';
    Object.keys(a.allocations).forEach(function(w){
      if(a.allocations[w]>0){
        projSeen[a.project].weeks++;
        projSeen[a.project].totalPct+=a.allocations[w];
        projSeen[a.project].wkCount++;
      }
    });
  });
  Object.keys(projSeen).forEach(function(k){records.push(projSeen[k]);});
  archivedProjects.forEach(function(ap){
    if(!ap.members)return;
    ap.members.forEach(function(m){
      if(m.name!==sel)return;
      records.push({name:ap.name,role:'',weeks:m.weeks||0,totalPct:null,wkCount:m.weeks||0,status:ap.status||'',source:'archived',archivedOn:ap.archivedOn||''});
    });
  });
  records.sort(function(a,b){
    if(a.source!==b.source)return a.source==='active'?-1:1;
    return b.weeks-a.weeks;
  });
  var totalWeeks=records.reduce(function(s,r){return s+r.weeks;},0);
  var activeCount=records.filter(function(r){return r.source==='active';}).length;
  var archivedCount=records.filter(function(r){return r.source==='archived';}).length;

    ?'<tr><td colspan="5" style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No project history found for this member.</td></tr>'
    :records.map(function(r){
      var avgPct=r.wkCount>0&&r.totalPct!==null?Math.round(r.totalPct/r.wkCount*100):null;
      return'<tr style="border-bottom:1px solid var(--border)">'

        +(r.source==='archived'?'<span style="margin-left:6px;font-size:9px;background:#F1F5F9;color:#64748B;padding:1px 5px;border-radius:10px;font-weight:700">ARCHIVED</span>':'')

        +'<td style="padding:8px 10px">'+statusBadge(r.status||'')+'</td>'
        +'<td style="padding:8px 10px;font-size:12px;color:var(--muted)">'+esc(r.role||'—')+'</td>'
        +'<td style="padding:8px 10px;text-align:center;font-weight:700">'+r.weeks+'</td>'
        +'<td style="padding:8px 10px;text-align:center;font-weight:700;color:'+(avgPct!==null?(avgPct>100?'#EF4444':avgPct>=80?'#10B981':'#94A3B8'):'#94A3B8')+'">'+(avgPct!==null?avgPct+'%':'—')+'</td>'
        +'</tr>';
    }).join('');
  document.getElementById('view-teamrecord').innerHTML=
    '<div class="sh"><h2>Team Record</h2><span style="font-size:12px;color:var(--muted)">Project history by team member</span></div>'
    +'<div class="card" style="padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px">'
    +'<label style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">Team member</label>'
    +'<select onchange="teamRecordMember=this.value;renderTeamRecord()" style="font-family:inherit;font-size:14px;padding:7px 12px;border:1.5px solid var(--border2);border-radius:var(--r2);background:var(--surface);color:var(--text);min-width:220px">'+memOpts+'</select>'
    +(sel?'<span style="font-size:12px;color:var(--muted)">'+totalWeeks+' total weeks &middot; '+activeCount+' active project'+(activeCount!==1?'s':'')+(archivedCount?' &middot; '+archivedCount+' archived':'')+'</span>':'')
    +'</div>'
    +(sel?'<div class="card" style="padding:0;overflow:hidden">'
    +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr style="background:var(--s2)">'
    +'<th style="text-align:left;padding:7px 12px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Project</th>'
    +'<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Status</th>'

var geminiKey=localStorage.getItem('medusa_gemini_key')||'';
